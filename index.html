function getDrugData(){
  const d=editStore["drug_info"];
  // Full reset if missing or pre-v2
  if(!d||!d.columns||!d._v||d._v<2){
    editStore["drug_info"]=_defaultDrugData();
    persistStore();
    return editStore["drug_info"];
  }
  // v2→v3 / v3→v4 migration: patch corrected fields by NDC
  // Each entry: NDC → [[colIndex, value], ...]
  if(d._v<4){
    const NDC_IDX=4;
    const fixes={
      // Drug Strength corrections (col 6)
      '57894006003':[[6,'45 mg/0.5 mL']], '57894006104':[[6,'90 mg/mL']],
      '57894020107':[[6,'200 mg/1']],      '57894020130':[[6,'200 mg/1']],
      '57894050520':[[6,'100 mg/5 mL']],
      '57894065002':[[6,'200 mg/20 mL']], '57894065102':[[6,'200 mg/2 mL']],
      '57894065104':[[6,'200 mg/2 mL']],  '57894065122':[[6,'200 mg/2 mL']],
      '57894065192':[[6,'200 mg/2 mL']], '59676060014':[[6,'240 mg/1']],
      // Nucala: CPT (col 3) + Dosage Form (col 5) + Drug Strength (col 6)
      '00173088101':[[3,'96372 / 96401'],[5,'Lyophilized Vial (LYO)'],[6,'100 mg']],
      '00173089201':[[5,'Autoinjector (AI)'],[6,'100 mg']],
      '00173089242':[[5,'Prefilled Syringe (PFS)'],[6,'100 mg']],
      '00173090442':[[3,'96372 / 96401'],[5,'Prefilled Syringe (PFS)'],[6,'40 mg/0.4 mL']],
    };
    d.rows.forEach(r=>{
      const f=fixes[r.cells[NDC_IDX]];
      if(f) f.forEach(([idx,val])=>{r.cells[idx]=val;});
    });
    d._v=4;
    persistStore();
  }
  // v4→v5 migration: move Callback Number to last column (swap cols 8 & 9)
  if(d._v<5){
    d.columns=[...d.columns.slice(0,8),'Quantity','Callback Number'];
    d.rows.forEach(r=>{const tmp=r.cells[8];r.cells[8]=r.cells[9];r.cells[9]=tmp;});
    d._v=5;
    persistStore();
  }
  // v6→v7 migration: reorder columns to match new display order
  if(d._v<7){
    const ord=[0,1,5,10,11,2,3,4,6,7,8,9];
    d.columns=["Drug Name","Program Name","Dosage Form","Drug Type","Specialty","J-Code / Q-Code","CPT Code","NDC","Drug Strength","Days Supply","Quantity","Callback Number"];
    d.rows.forEach(r=>{r.cells=ord.map(i=>r.cells[i]||'');});
    d._v=7;
    persistStore();
  }
  // v5→v6 migration: add Drug Type (col 10) and Specialty (col 11)
  if(d._v<6){
    d.columns=[...d.columns.slice(0,10),'Drug Type','Specialty'];
    const dtMap={
      'Caplyta':['Oral Medication','Psychiatry / Neurology'],
      'Darzalex Faspro':['Monoclonal Antibody / Immunotherapy','Oncology (Hematology)'],
      'Dextenza':['Ocular Drug Delivery Implant','Ophthalmology'],
      'Dysport':['Neurotoxin (Botulinum Toxin Type A)','Neurology'],
      'Elmiron':['Oral Medication','Urology'],
      'Erleada':['Oral Targeted Therapy / Androgen Receptor Inhibitor','Oncology (Urology / Prostate)'],
      'Icotyde':['Biologic / Monoclonal Antibody','Immunology / Rheumatology'],
      'Imaavy':['Biologic / Monoclonal Antibody / IV Infusion','Immunology'],
      'Jubbonti':['Biologic Biosimilar (Denosumab)','Rheumatology / Oncology / Endocrinology'],
      'Nucala':['Biologic / Monoclonal Antibody','Pulmonology / Allergy & Immunology'],
      'Onivyde':['Chemotherapy (Liposomal Irinotecan)','Oncology (GI / Pancreatic)'],
      'Orgovyx':['Oral Hormone Therapy / GnRH Receptor Antagonist','Oncology (Urology / Prostate)'],
      'Remicade':['Biologic / Monoclonal Antibody / IV Infusion','Immunology / Rheumatology / Gastroenterology'],
      'Simponi':['Biologic / Monoclonal Antibody','Immunology / Rheumatology'],
      'Simponi Aria':['Biologic / Monoclonal Antibody / IV Infusion','Immunology / Rheumatology'],
      'Somatuline Depot':['Somatostatin Analog Injection','Endocrinology / Oncology (Neuroendocrine)'],
      'Spravato':['Intranasal NMDA Receptor Antagonist (Esketamine)','Psychiatry / Neurology'],
      'Stelara':['Biologic / Monoclonal Antibody (IL-12/23 Inhibitor)','Immunology / Gastroenterology / Dermatology'],
      'Symtuza':['Oral Antiretroviral Combination Therapy','HIV / Infectious Disease'],
      'Tazverik':['Oral Targeted Therapy / EZH2 Inhibitor','Oncology (Hematology)'],
      'Tremfya':['Biologic / Monoclonal Antibody (IL-23 Inhibitor)','Immunology / Dermatology / Gastroenterology'],
      'Tyenne':['Biologic Biosimilar (Tocilizumab) / IL-6 Inhibitor','Immunology / Rheumatology'],
      'Vyepti':['Monoclonal Antibody / CGRP Inhibitor','Neurology (Migraine)'],
      'Wyost':['Biologic Biosimilar (Denosumab)','Rheumatology / Oncology / Endocrinology'],
      'Xarelto':['Oral Anticoagulant (Factor Xa Inhibitor)','Cardiology / Hematology'],
    };
    d.rows.forEach(r=>{
      const m=dtMap[r.cells[0]]||['',''];
      if(r.cells.length<11) r.cells[10]=m[0];
      if(r.cells.length<12) r.cells[11]=m[1];
    });
    d._v=6;
    persistStore();
  }
  return editStore["drug_info"];
}
function saveDrugData(data){editStore["drug_info"]=data;persistStore();}

function showDrugInfo(){
  currentView="druginfo";currentProgId="";
  document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".sidebar-nav-item").forEach(el=>el.classList.remove("active"));
  const n=document.getElementById("navDrugInfo");if(n)n.classList.add("active");
  document.getElementById("main").innerHTML=renderDrugInfo();
}

function renderDrugInfo(){
  const data=getDrugData();
  const cols=data.columns;
  const rows=data.rows;
  const headers=cols.map((col,ci)=>`<th><div class="th-inner"><span id="thLabel_${ci}" class="th-label" onclick="editColHeader(${ci})" title="Click to rename">${col}</span><div class="th-acts"><button class="th-btn th-btn-del" onclick="removeDrugColumn(${ci})" title="Remove column">&#10006;</button></div></div></th>`).join("")+`<th class="th-action"></th>`;
  const bodyRows=rows.length===0
    ?`<tr class="drug-empty-row"><td colspan="${cols.length+1}">No drugs added yet — click <strong>+ Add Drug</strong> to get started.</td></tr>`
    :rows.map(row=>{
      const cells=cols.map((col,ci)=>{
        const val=(row.cells[ci]||"").toString();
        const display=val?`<span class="dt-cell-val">${val}</span>`:`<span class="dt-cell-val empty-cell">&#8212;</span>`;
        return `<td><span id="dc_${row.id}_${ci}" onclick="editDrugCell(${row.id},${ci})">${display}</span></td>`;
      }).join("");
      return `<tr data-rid="${row.id}">${cells}<td class="td-action"><button class="dt-row-del" onclick="removeDrugRow(${row.id})" title="Remove drug">&#10006;</button></td></tr>`;
    }).join("");
  return `<div class="drug-info-header"><div><div class="drug-info-title">&#128138; Drug Reference</div><div class="drug-info-meta">${rows.length} drug${rows.length!==1?"s":""} &middot; ${cols.length} columns</div></div><div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div class="dl-dropdown"><button class="btn-dl" onclick="toggleDlMenu(this)">&#8659; Download &#9662;</button><div class="dl-menu"><button class="dl-menu-item" onclick="printToPDF('drugref');closeDlMenus()">&#128196;&nbsp; PDF</button><button class="dl-menu-item" onclick="downloadExcel('drugref');closeDlMenus()">&#128202;&nbsp; Excel</button></div></div><button class="btn-add-drug-col" onclick="showAddColForm()">&#43; Add Column</button><button class="btn-add-drug-row" onclick="addDrugRow()">&#43; Add Drug</button></div></div><div class="drug-search-bar"><div class="drug-search-inner"><span class="drug-search-icon">&#128269;</span><input class="drug-search-input" id="drugSearchInput" placeholder="Search by drug name or program…" oninput="filterDrugTable()" onkeydown="if(event.key==='Escape'){this.value='';filterDrugTable();}"><button class="drug-search-clear" id="drugSearchClear" onclick="clearDrugSearch()" title="Clear search">&#10005;</button></div><span class="drug-search-count" id="drugSearchCount">${rows.length} entries</span></div><div class="drug-col-add-form" id="addColForm"><input class="drug-col-add-input" id="addColInput" placeholder="Column name…" onkeydown="if(event.key==='Enter')confirmAddCol();if(event.key==='Escape')hideAddColForm()"><button class="btn-save" onclick="confirmAddCol()">Add</button><button class="btn-cancel" onclick="hideAddColForm()">Cancel</button></div><div class="drug-table-wrap"><table class="drug-table"><thead><tr>${headers}</tr></thead><tbody>${bodyRows}</tbody></table></div><div class="drug-info-note">Click any cell to edit &nbsp;&middot;&nbsp; Click a column header to rename it &nbsp;&middot;&nbsp; Hover a row to remove it &nbsp;&middot;&nbsp; Hover a column header to remove it</div>`;
}

function showAddColForm(){

  const f=document.getElementById("addColForm");
  if(f){f.classList.add("show");const inp=document.getElementById("addColInput");if(inp){inp.value="";inp.focus();}}
}
function hideAddColForm(){const f=document.getElementById("addColForm");if(f)f.classList.remove("show");}
function confirmAddCol(){
  const inp=document.getElementById("addColInput");if(!inp)return;
  const name=inp.value.trim();if(!name){inp.focus();return;}
  const data=getDrugData();
  data.columns.push(name);
  data.rows.forEach(r=>{while(r.cells.length<data.columns.length)r.cells.push("");});
  saveDrugData(data);
  document.getElementById("main").innerHTML=renderDrugInfo();
}
function removeDrugColumn(ci){

  const data=getDrugData();
  if(data.columns.length<=1){alert("At least one column is required.");return;}
  if(!confirm('Remove column "'+data.columns[ci]+'"?\nAll data in this column will be deleted.'))return;
  data.columns.splice(ci,1);
  data.rows.forEach(r=>r.cells.splice(ci,1));
  saveDrugData(data);
  document.getElementById("main").innerHTML=renderDrugInfo();
}
function editColHeader(ci){

  const span=document.getElementById("thLabel_"+ci);if(!span)return;
  const data=getDrugData();
  const cur=(data.columns[ci]||"").replace(/"/g,"&quot;");
  span.outerHTML=`<input class="th-input" id="thInput_${ci}" value="${cur}" onblur="saveColHeader(${ci})" onkeydown="if(event.key==='Enter')saveColHeader(${ci});if(event.key==='Escape')cancelColHeader(${ci})">`;
  setTimeout(()=>{const inp=document.getElementById("thInput_"+ci);if(inp){inp.focus();inp.select();}},20);
}
function saveColHeader(ci){
  const inp=document.getElementById("thInput_"+ci);if(!inp)return;
  const val=inp.value.trim();if(!val){inp.focus();return;}
  const data=getDrugData();data.columns[ci]=val;saveDrugData(data);
  inp.outerHTML=`<span id="thLabel_${ci}" class="th-label" onclick="editColHeader(${ci})" title="Click to rename">${val}</span>`;
}
function cancelColHeader(ci){
  const inp=document.getElementById("thInput_"+ci);if(!inp)return;
  const val=getDrugData().columns[ci]||"";
  inp.outerHTML=`<span id="thLabel_${ci}" class="th-label" onclick="editColHeader(${ci})" title="Click to rename">${val}</span>`;
}
function editDrugCell(rowId,ci){

  const wrap=document.getElementById("dc_"+rowId+"_"+ci);if(!wrap)return;
  const data=getDrugData();
  const row=data.rows.find(r=>r.id===rowId);
  const cur=row?(row.cells[ci]||""):"";
  wrap.innerHTML=`<input class="dt-cell-input" id="dci_${rowId}_${ci}" value="${cur.replace(/"/g,"&quot;")}" onblur="saveDrugCell(${rowId},${ci})" onkeydown="if(event.key==='Enter')saveDrugCell(${rowId},${ci});if(event.key==='Escape')cancelDrugCell(${rowId},${ci})">`;
  setTimeout(()=>{const inp=document.getElementById("dci_"+rowId+"_"+ci);if(inp){inp.focus();inp.select();}},20);
}
function saveDrugCell(rowId,ci){
  const inp=document.getElementById("dci_"+rowId+"_"+ci);if(!inp)return;
  const val=inp.value;
  const data=getDrugData();
  const row=data.rows.find(r=>r.id===rowId);
  if(row){while(row.cells.length<=ci)row.cells.push("");row.cells[ci]=val;saveDrugData(data);}
  const display=val?`<span class="dt-cell-val">${val}</span>`:`<span class="dt-cell-val empty-cell">&#8212;</span>`;
  const wrap=document.getElementById("dc_"+rowId+"_"+ci);if(wrap)wrap.innerHTML=display;
}
function cancelDrugCell(rowId,ci){
  const data=getDrugData();
  const row=data.rows.find(r=>r.id===rowId);
  const val=(row&&row.cells[ci])||"";
  const display=val?`<span class="dt-cell-val">${val}</span>`:`<span class="dt-cell-val empty-cell">&#8212;</span>`;
  const wrap=document.getElementById("dc_"+rowId+"_"+ci);if(wrap)wrap.innerHTML=display;
}
function addDrugRow(){

  const data=getDrugData();
  const newRow={id:Date.now(),cells:new Array(data.columns.length).fill("")};
  data.rows.push(newRow);saveDrugData(data);
  document.getElementById("main").innerHTML=renderDrugInfo();
  setTimeout(()=>editDrugCell(newRow.id,0),60);
}
function removeDrugRow(rowId){

  if(!confirm("Remove this drug entry?"))return;
  const data=getDrugData();
  data.rows=data.rows.filter(r=>r.id!==rowId);
  saveDrugData(data);
  document.getElementById("main").innerHTML=renderDrugInfo();
}

function filterDrugTable(){
  const inp=document.getElementById("drugSearchInput");
  const q=inp?inp.value.trim().toLowerCase():"";
  const trs=document.querySelectorAll(".drug-table tbody tr[data-rid]");
  let visible=0;
  trs.forEach(tr=>{
    const cells=tr.querySelectorAll("td");
    // Drug Name = col 0, Program Name = col 1
    const drugName=(cells[0]?cells[0].textContent:"").toLowerCase();
    const progName=(cells[1]?cells[1].textContent:"").toLowerCase();
    const match=!q||drugName.includes(q)||progName.includes(q);
    tr.style.display=match?"":"none";
    if(match)visible++;
  });
  const count=document.getElementById("drugSearchCount");
  const total=trs.length;
  if(count)count.textContent=q?`${visible} of ${total} shown`:`${total} entries`;
  const clearBtn=document.getElementById("drugSearchClear");
  if(clearBtn)clearBtn.style.display=q?"inline":"none";
}
function clearDrugSearch(){
  const inp=document.getElementById("drugSearchInput");
  if(inp){inp.value="";inp.focus();}
  filterDrugTable();
}

const TERM_CATS=['General','Authorization','Benefits','Plan','Pharmacy','Medicare','Appeals','Transportation'];
const TERM_CAT_COLORS={General:'#4361ee',Authorization:'#f97316',Benefits:'#22c55e',Plan:'#8b5cf6',Pharmacy:'#0ea5e9',Medicare:'#ef4444',Appeals:'#ec4899',Transportation:'#0d9488'};

function _defaultTermsData(){
  return {_v:1,terms:[
    // ── General ──
    {name:'Benefits Investigation',acronym:'BI',def:'The process of verifying a patient\'s insurance coverage details for a specific medication or treatment, including plan status, coverage, cost-sharing, and authorization requirements.',context:'Every case starts with a BI. As a PAM, you are conducting the BI when you call the payer/PBM to gather all required data points.',category:'General'},
    {name:'Eligibility Verification',acronym:'',def:'Confirming that a patient is currently enrolled in an active insurance plan and eligible to receive covered benefits at the time of service.',context:'Always verify plan status and effective date first — if the plan is terminated, most other data points are moot.',category:'General'},
    {name:'Payer',acronym:'',def:'The insurance company or organization responsible for paying claims. Examples: Aetna, UnitedHealth, Cigna, BCBS, Humana.',context:'You will call the payer\'s member services line to verify benefits. Always get the payer rep\'s name and reference number before ending.',category:'General'},
    {name:'HIPAA',acronym:'',def:'Health Insurance Portability and Accountability Act — federal law protecting the privacy and security of patient health information. Agents must verify patient identity with 3 identifiers before disclosing any PHI.',context:'Failing to complete HIPAA verification before sharing patient info is a serious compliance violation. Always complete this step first.',category:'General'},
    {name:'Protected Health Information',acronym:'PHI',def:'Any information about health status, provision of health care, or payment for care that can be linked to a specific patient.',context:'Do not share any PHI with the payer until HIPAA verification (3 identifiers) is complete.',category:'General'},
    // ── Authorization ──
    {name:'Prior Authorization',acronym:'PA',def:'A requirement by the payer that the provider obtain approval before prescribing a specific drug or service. Without PA approval, the claim may be denied.',context:'Always ask: Is PA required? → Is PA on file? If on file: collect PA Ref ID, effective/end dates. If not on file: collect PA dept name, phone, submission method, and TAT.',category:'Authorization'},
    {name:'Pre-determination',acronym:'Pre-D',def:'A voluntary process where the provider submits clinical information to the payer in advance to estimate coverage and payment — similar to PA but not always required.',context:'If PA is NOT required, always ask if Pre-determination is recommended. Collect the same details as PA if applicable.',category:'Authorization'},
    {name:'Turn Around Time',acronym:'TAT',def:'The expected processing time for a prior authorization or pre-determination decision. Payers typically have a Standard TAT (5–14 days) and Urgent/Expedited TAT (24–72 hours).',context:'Always collect both Standard and Urgent TAT when PA is not on file. This helps the provider plan treatment timelines.',category:'Authorization'},
    {name:'Step Therapy',acronym:'',def:'A coverage policy requiring patients to try one or more lower-cost/preferred drugs before the payer will approve coverage for the requested (usually higher-cost) medication.',context:'If step therapy is required, collect the required step therapy drug names. This information is critical for the provider to develop a compliant treatment plan.',category:'Authorization'},
    {name:'Formulary Exception',acronym:'FE',def:'A request to cover a drug that is not on the plan\'s formulary (drug list), usually requiring clinical justification.',context:'In PBM calls: If PA is not required, ask if a Formulary Exception is available as an alternative pathway to coverage.',category:'Authorization'},
    // ── Benefits ──
    {name:'Deductible',acronym:'DED',def:'The amount a patient must pay out-of-pocket for covered services before the insurance plan begins to pay. Resets annually.',context:'Collect: Individual Deductible amount + amount met so far. Also ask if deductible applies to the specific drug/admin code, and if it is included in the OOP maximum.',category:'Benefits'},
    {name:'Out-of-Pocket Maximum',acronym:'OOP',def:'The maximum total amount a patient will pay in cost-sharing (deductibles, copays, coinsurance) in a plan year. Once met, the plan covers 100% of covered services.',context:'Collect: Individual OOP Max + amount met. Ask: "Is the drug/CPT covered at 100% after OOP is met?" — critical for patient financial counseling.',category:'Benefits'},
    {name:'Copay',acronym:'',def:'A fixed dollar amount the patient pays for a specific covered service or prescription, regardless of the total cost.',context:'Collect copay amounts for both J-code (drug) and CPT code (administration) separately. Always ask if copay is included in OOP.',category:'Benefits'},
    {name:'Coinsurance',acronym:'Coins',def:'A percentage of the allowed amount for covered services that the patient pays after the deductible is met. Example: 20% coinsurance = patient pays 20%, insurance pays 80%.',context:'Medicare coinsurance is always 20% (80/20 split after deductible). For commercial plans, collect the applicable coinsurance percentage without an office visit being billed.',category:'Benefits'},
    {name:'Estimated Patient Pay',acronym:'EPP',def:'The estimated out-of-pocket cost for the patient for a specific drug at a specific specialty pharmacy. Also called Estimated Patient Pay or Patient Pay Amount.',context:'Collect EPP from preferred specialty pharmacy. If EPP not available, collect copay or coinsurance instead.',category:'Benefits'},
    {name:'True Out-of-Pocket',acronym:'TrOOP',def:'Medicare Part D specific — the amount a patient has spent out of pocket on covered drugs that counts toward the catastrophic coverage threshold. Different from the OOP max in commercial plans.',context:'Collect TrOOP amount and amount met for Medicare Part D cases. This helps identify patients approaching catastrophic coverage.',category:'Benefits'},
    {name:'Annual Benefit Cap',acronym:'',def:'A limit on the total dollar amount a plan will pay for covered services in a plan year. Once reached, the patient is responsible for all additional costs.',context:'Ask: Does Annual Benefit Cap exist? If YES: collect cap amount, total amount, amount met. If rep says "don\'t know" → mark as "No" in dashboard.',category:'Benefits'},
    {name:'Lifetime Maximum',acronym:'',def:'The maximum total amount an insurance plan will pay for covered services over the lifetime of the policy or the patient\'s enrollment.',context:'Ask: Does Lifetime Maximum exist? If YES: collect amounts. If rep says unknown → mark "No" in dashboard. (Note: ACA eliminated lifetime maximums for essential health benefits in most plans.)',category:'Benefits'},
    {name:'Copay Accumulator / Maximizer',acronym:'',def:'Programs used by payers to prevent manufacturer copay assistance (coupons/cards) from counting toward a patient\'s deductible or OOP maximum.',context:'Always ask if a Copay Accumulator or Maximizer is attached to the policy — particularly for Dysport (commercial plans). This affects the value of manufacturer assistance programs.',category:'Benefits'},
    {name:'Spend Down',acronym:'',def:'A Medicaid concept where patients with income above the Medicaid limit must spend a certain amount on medical costs before Medicaid coverage kicks in — similar to a deductible.',context:'For Medicaid cases: ask if patient has a spend down. If YES → collect spend down amount. If NO → DED/OOP/Coins/Copay = $0.',category:'Benefits'},
    // ── Plan ──
    {name:'Health Maintenance Organization',acronym:'HMO',def:'A plan that requires patients to select a Primary Care Physician (PCP) and get referrals for specialists. Coverage is generally limited to in-network providers.',context:'HMO plans typically require PCP referrals. Always ask if referral is required and if one is on file before verifying specialty drug benefits.',category:'Plan'},
    {name:'Preferred Provider Organization',acronym:'PPO',def:'A plan that allows patients to see any in-network or out-of-network provider without a referral. In-network care costs less.',context:'PPOs generally do not require PCP referrals. Verify provider network status (in-network vs OON) to determine applicable benefit levels.',category:'Plan'},
    {name:'Exclusive Provider Organization',acronym:'EPO',def:'A hybrid plan where patients can see specialists without referrals but ONLY within the plan\'s network (no OON coverage except emergencies).',context:'If provider is OON on an EPO, the drug/admin may not be covered at all. Verify network status carefully.',category:'Plan'},
    {name:'Coordination of Benefits',acronym:'COB',def:'The process that determines which plan pays first (primary) when a patient has more than one insurance plan. Primary pays first, then secondary pays remaining costs.',context:'Always ask COB status: Primary / Secondary / Tertiary. If secondary and primary is unknown or not in the dashboard → end the call and escalate.',category:'Plan'},
    {name:'Tricare',acronym:'',def:'Health care program for U.S. military members, retirees, and their dependents. Administered by the Department of Defense.',context:'Tricare follows similar BI steps as commercial plans. Identify as Military/Tricare during plan type verification.',category:'Plan'},
    // ── Pharmacy ──
    {name:'Pharmacy Benefit Manager',acronym:'PBM',def:'A third-party administrator that manages prescription drug benefits on behalf of health insurers, Medicare Part D plans, or employers. Major PBMs: CVS Caremark, Express Scripts, OptumRx, Prime Therapeutics.',context:'PBM calls focus on drug formulary coverage, tier status, PA requirements, and specialty pharmacy routing.',category:'Pharmacy'},
    {name:'Specialty Pharmacy',acronym:'SP',def:'A pharmacy specializing in high-cost, complex medications requiring special handling, storage, or patient support. Examples: CVS Specialty, Accredo, AcariaHealth.',context:'Collect SP name and phone number for all cases. For LDD drugs (Onivyde, Tazverik) verify SP network status. Ask if SP is preferred/exclusive to the patient\'s plan.',category:'Pharmacy'},
    {name:'Limited Distribution Drug',acronym:'LDD',def:'A specialty drug that is only distributed through a select network of specialty pharmacies, not available at retail pharmacies or all SPs.',context:'Ipsen LDDs: Onivyde (CVS Caremark, Humana, BriovaRx-Optum) and Tazverik (Onco360, On-site Dispensing Pharmacy). Always verify SP network status for LDDs.',category:'Pharmacy'},
    {name:'Buy and Bill',acronym:'B&B',def:'A dispensing model where the provider purchases the drug directly, administers it in-office, and then bills the payer for the drug plus administration.',context:'For MM (Medical Benefit) drugs: ask "Can the provider do buy and bill?" For Medicare: Product Acquisition is ALWAYS Buy & Bill only — SP not allowed under Major Medical Benefits.',category:'Pharmacy'},
    {name:'Assignment of Benefits',acronym:'AOB',def:'When a patient authorizes the payer to pay benefits directly to the provider or pharmacy rather than to the patient.',context:'For SP under Medical Benefit: ask "Is SP with AOB covered?" and collect Specialty Pharmacy required for AOB + AOB Coverage specifics.',category:'Pharmacy'},
    {name:'Formulary',acronym:'',def:'A list of prescription drugs covered by a health insurance plan, organized into tiers that determine patient cost-sharing.',context:'Ask about drug tier level (1–5 typically, where Tier 1 = lowest cost). Higher tiers = higher patient cost. If drug is not on formulary, a Formulary Exception may be needed.',category:'Pharmacy'},
    {name:'J-Code',acronym:'',def:'A HCPCS Level II procedure code used to report injectable drugs and other non-oral medications billed under the medical benefit.',context:'Used in MM (Medical Benefit) calls. Verify coverage of the drug\'s specific J-code with the applicable diagnosis code (DX code).',category:'Pharmacy'},
    {name:'CPT Code',acronym:'',def:'Current Procedural Terminology code — used to report medical, surgical, and diagnostic procedures and services (including drug administration).',context:'In MM calls, verify the admin CPT code (e.g., 96413 for infusion) separately from the drug J-code. Always clarify that codes are being billed SEPARATELY.',category:'Pharmacy'},
    {name:'NDC Code',acronym:'',def:'National Drug Code — a unique 10 or 11-digit number identifying every medication\'s manufacturer, product, and package size.',context:'In PBM calls, always verify the drug by NDC when running a test claim. NDC ensures you are checking the exact drug and strength.',category:'Pharmacy'},
    {name:'Rx BIN / PCN / Group',acronym:'',def:'BIN (Bank Identification Number), PCN (Processor Control Number), and Rx Group # — routing numbers used by pharmacies to process insurance claims for prescription drugs.',context:'In PBM calls, these may appear in system but agents do NOT need to ask for these — they are system-populated.',category:'Pharmacy'},
    // ── Medicare ──
    {name:'Medicare Part D',acronym:'',def:'The federal prescription drug benefit program for Medicare beneficiaries, administered by private insurers/PBMs. Covers outpatient prescription drugs at retail and specialty pharmacies.',context:'For Part D: always check formulary coverage, tier level, LIS status, TrOOP, and preferred specialty pharmacy. Drug coverage checked via CMS.gov for Medicare cases.',category:'Medicare'},
    {name:'Medicare Advantage',acronym:'MA',def:'Medicare Part C — an alternative to Original Medicare offered by private insurers, often bundling Parts A, B, and D coverage.',context:'MA plans may have different benefit structures than Original Medicare. Treat like commercial for BI purposes but note that many MA plans use Medicare cost-sharing rules.',category:'Medicare'},
    {name:'Medicare Supplement',acronym:'Medigap',def:'Supplemental insurance that covers cost-sharing gaps (deductibles, coinsurance, copays) left by Original Medicare. Always secondary to Medicare.',context:'For Medigap: DED/OOP/Coinsurance/Copay is always $0 for the patient. Plan covers coinsurance only, DED+coinsurance, or a % of coinsurance. PA/referral not required. Buy & Bill only.',category:'Medicare'},
    {name:'Low Income Subsidy',acronym:'LIS',def:'A Medicare program (also called "Extra Help") that assists low-income beneficiaries with Part D costs including premiums, deductibles, and copays. Levels 1–4.',context:'For Part D: always ask if LIS applies. If YES → collect LIS Level (1–4 or Unknown). If NO → mark LIS Level as Not Applicable.',category:'Medicare'},
    // ── Appeals ──
    {name:'Appeal',acronym:'',def:'A formal request to the payer to reconsider a denied claim or coverage decision. Patients/providers can file appeals when a drug is not covered or PA is denied.',context:'When drug is NOT covered: ask "Is appeal available?" → collect appeal status (Approved/Denied/Pending/Not on file) + reference #, submission date, and available/submitted appeal counts.',category:'Appeals'},
    {name:'Denial Reason',acronym:'',def:'The payer\'s stated reason for denying coverage of a drug or service. Common reasons: not on formulary, medical necessity not established, step therapy required, PA not approved.',context:'For denied appeals: collect the denial reason. This is critical for the provider to prepare a re-appeal or alternative treatment plan.',category:'Appeals'},
    {name:'Available Appeal Count',acronym:'',def:'The number of appeals the patient or provider still has available to submit for a denied decision.',context:'Always collect available AND submitted appeal counts. This tells the provider how many chances remain to reverse a denial.',category:'Appeals'},
    // ── Plan / Benefits additions ──
    {name:'Alternate Funding Plan',acronym:'AFP',def:'A cost-management strategy used by self-funded employers in place of traditional fully-insured plans. Instead of paying fixed premiums to an insurer, the employer directly funds member claims and uses mechanisms such as level-funding, captive arrangements, or reference-based pricing to control costs. AFP plans are typically paired with stop-loss insurance to cap catastrophic claim exposure, and often include pharmaceutical carve-outs or strategies that restrict or leverage manufacturer patient assistance programs.',context:'Always ask during Plan Details: "Is this plan enrolled in any type of Alternate Funding Plan (e.g., PayerRx, PrudentRx)?" AFP plans may carve out or exclude manufacturer copay assistance from counting toward the member\'s deductible or OOP — this directly impacts PAP eligibility and copay card strategy. Flag for case manager review whenever an AFP is identified.',category:'Plan'},
    {name:'Copay Accumulator',acronym:'',def:'A plan design where manufacturer copay assistance — such as copay cards or manufacturer coupons — does not count toward the member\'s deductible or out-of-pocket maximum. The manufacturer covers the member\'s cost-share at the pharmacy, but those payments are not credited to the member\'s cost-sharing accumulators. When assistance runs out mid-year, the member is suddenly responsible for the full remaining deductible and OOP as if they had paid nothing out of pocket all year.',context:'Always ask whether a Copay Accumulator is attached to the policy — especially for specialty and high-cost drugs on commercial plans. When identified, alert the case manager immediately: the patient may face a significant mid-year cost shock once manufacturer assistance is exhausted. Document and flag — this affects the net value of any copay card program for the patient.',category:'Benefits'},
    {name:'Copay Maximizer',acronym:'',def:'A more aggressive form of copay management than the Copay Accumulator. The plan places the drug on a high-cost specialty tier, inflating the member\'s cost-share to match or approach the cap of the manufacturer\'s copay assistance program. The inflated cost-share is covered by the copay card each month, systematically draining the full value of manufacturer funding across the plan year. Unlike an accumulator, a maximizer actively engineers the member\'s cost-sharing tier to extract the maximum possible amount from the manufacturer — the member typically pays little while assistance lasts but faces a steep bill once it runs out.',context:'Ask whether a Copay Maximizer (sometimes called a copay optimization program) is in place. When identified, notify the case manager — the manufacturer\'s assistance will be fully consumed by plan design, leaving the patient exposed at year-end. Key distinction from a Copay Accumulator: accumulators prevent copay payments from counting toward OOP; maximizers go further by inflating cost-sharing specifically to drain manufacturer funds.',category:'Benefits'},
  ]};
}

    {name:'Non-Emergency Medical Transportation',acronym:'NEMT',def:'A covered benefit under certain insurance plans (Medicaid, Medicare Advantage, and some commercial plans) that provides or reimburses transportation for members traveling to and from non-urgent medical appointments, treatments, or infusion sites. Distinct from emergency ambulance transport.',context:'Always ask if the member has coverage for transportation or reimbursement of transportation expenses. If the rep seems unsure, prompt with alternate labels — ride services, medical transport, or travel reimbursement — to confirm whether any NEMT benefit exists.',category:'Transportation'},
    {name:'Reimbursement for NEMT',acronym:'',def:'A benefit model in which the member self-arranges their own transportation and submits documentation to the plan to be paid back for eligible expenses, up to the plan\'s defined limits.',context:'Confirm whether the plan follows a reimbursement model, vendor model, or both (hybrid). If reimbursement applies, collect: reimbursable expense types, rate, documentation requirements, submission method (phone/mail/fax/portal), and TAT.',category:'Transportation'},
    {name:'Ride Services for NEMT',acronym:'',def:'A term used by some payers to describe pre-arranged, plan-coordinated transportation for members — often used interchangeably with NEMT or vendor transport. May include sedans, wheelchair vans, or rideshare programs depending on the plan.',context:'If the plan rep does not recognize "transportation coverage" or "NEMT," prompt with "ride services" as an alternate label. Ask: "Do you see anything listed as ride services or scheduled transport?"',category:'Transportation'},

    {name:'Mileage Limit in NEMT',acronym:'',def:'A restriction on how many miles per trip, or in total per coverage period, are eligible for NEMT coverage or reimbursement. Trips or portions of trips exceeding the mileage limit may be denied or only partially reimbursed.',context:'Ask: "Is there a mileage limit per trip or overall?" Document whether the limit is per-leg, per-trip (round), or cumulative for the year. Long-distance treatment trips are most commonly affected by this restriction.',category:'Transportation'},
    {name:'Dollar Cap in NEMT',acronym:'',def:'The maximum dollar amount the plan will pay for transportation — either per individual trip or across the full plan year. Once the cap is reached, the member is responsible for all remaining transportation costs out of pocket.',context:'Ask separately about per-trip cap and annual cap — they are different limits. Both are critical for patients requiring frequent or long-distance transport. Document both amounts clearly for patient financial counseling.',category:'Transportation'},
    {name:'Geographic Restriction in NEMT',acronym:'',def:'A plan-imposed limitation that restricts NEMT coverage based on the location of the trip or the distance between the member\'s home and the treatment site. Coverage may be denied for out-of-state travel or trips beyond a defined radius.',context:'Always ask: "Are there any geographic restrictions?" If yes, clarify whether it is an in-state-only rule, a distance-based limit, or both — and document the specific threshold. Flag this for patients traveling to specialized or out-of-state treatment centers.',category:'Transportation'},
    {name:'In-State Restriction in NEMT',acronym:'',def:'A geographic rule that limits NEMT coverage to transportation occurring entirely within the member\'s state of enrollment. Travel to treatment centers in another state is typically not covered under this restriction.',context:'If a geographic restriction applies, confirm whether it is in-state only. This is especially important for members seeking specialized care, clinical trials, or treatments unavailable in their home state. Document the state restriction explicitly.',category:'Transportation'},
    {name:'Within a Certain Distance Restriction in NEMT',acronym:'',def:'A geographic rule that limits NEMT coverage to trips within a specific mileage radius from the member\'s home address (e.g., within 50 miles). Trips beyond the stated distance may not be covered or may require prior approval.',context:'Ask: "Is there a maximum distance limit per trip?" If yes, collect the exact mile threshold. For patients whose treatment site is outside the radius, document this as a coverage gap and flag for provider awareness.',category:'Transportation'},
    {name:'Schedule a Ride in NEMT',acronym:'',def:'The process by which a member books transportation through the plan\'s vendor or broker — typically by phone, mobile app, or online portal. Most plans require advance notice (e.g., 24–72 hours) and have a separate process for urgent or same-day rides.',context:'For vendor model plans, collect: scheduling method (phone/app/portal), vendor phone number, how far in advance the ride must be booked, and the urgent ride policy. Pass this to the provider so they can relay it to the patient before the appointment.',category:'Transportation'},
    {name:'Coverage Amount and Receipts in NEMT',acronym:'',def:'The total dollar amount a plan will reimburse for a specific travel expense (lodging, airfare, etc.) and the documentation — typically itemized original receipts — that must be submitted as proof of cost for reimbursement to be processed.',context:'When any travel expense is covered, always ask: "What is the coverage amount, and are original receipts required?" Document both the dollar amount and the receipt requirement. Missing receipts are the most common reason NEMT reimbursements are denied.',category:'Transportation'},
    {name:'Lodging in NEMT',acronym:'',def:'A supplemental NEMT benefit that covers or reimburses the cost of overnight accommodation when a member must travel a significant distance for medical treatment. Typically paid as a flat nightly rate and may require a physician letter confirming medical necessity of travel.',context:'Ask: "Is lodging covered if the member needs to travel overnight for treatment?" Collect: coverage amount per night, whether receipts are required, any night limit, and whether an accompanying caregiver\'s lodging is also included.',category:'Transportation'},
    {name:'Local Transportation Reimbursement in NEMT',acronym:'',def:'Coverage for transportation costs incurred at the destination — such as taxi, rideshare, or public transit used to travel between a hotel and a treatment center during a multi-day treatment visit. Separate from the primary trip transportation benefit.',context:'Ask: "Is local transportation at the destination reimbursed?" If yes, collect the rate, eligible transport types, and any documentation requirements. This applies most commonly to patients staying near a distant treatment center for consecutive treatment days.',category:'Transportation'},
    {name:'Meal Coverage in NEMT',acronym:'',def:'A supplemental NEMT travel benefit that reimburses or provides a daily allowance for food expenses incurred during a medical travel trip. Usually provided as a fixed daily amount and may or may not extend to an accompanying caregiver.',context:'Ask: "Are meals covered during travel?" Collect the daily meal amount, whether it applies to the patient only or also to a caregiver, and whether receipts are required or it is paid as a flat allowance.',category:'Transportation'},
    {name:'Allowance in NEMT',acronym:'',def:'A fixed, predetermined dollar amount provided by the plan for a specific ancillary travel expense (meals, lodging, or incidentals) per day or per trip — rather than actual-cost reimbursement. The member receives the set amount regardless of what they actually spent.',context:'Distinguish between "allowance" (flat rate, no receipts needed) and "reimbursement" (actual cost, receipts required) when collecting NEMT benefits. Document the exact allowance amount per day or per trip and confirm no receipt submission is required.',category:'Transportation'},
    {name:'Caregiver in NEMT',acronym:'',def:'An accompanying person — family member, friend, or professional aide — who travels with the patient to the treatment site. Some plans extend NEMT coverage (transportation, lodging, and meals) to one designated caregiver; others cover the patient only.',context:'Always ask: "Can a caregiver also be reimbursed, or is coverage patient only?" If a caregiver is covered, confirm whether all benefit types (transport, lodging, meals, local transport) extend to the caregiver and whether any separate limits apply.',category:'Transportation'},
    {name:'Set Reimbursement Rate in NEMT',acronym:'',def:'A fixed, predetermined dollar amount per mile or per trip that the plan pays for NEMT reimbursement, regardless of actual costs incurred. This rate is established in the member\'s plan and may align with the IRS standard mileage rate or be a plan-specific figure.',context:'Ask: "Is there a set reimbursement rate — per mile or per trip?" If yes, collect the exact rate. For long-distance trips where actual expenses may exceed the plan\'s rate, document the gap so the patient can be counseled on expected out-of-pocket costs.',category:'Transportation'},
    {name:'Per-Mile Rate Reimbursement in NEMT',acronym:'',def:'A reimbursement method in which the plan pays a fixed amount for each mile the member or caregiver travels to and from the treatment site using a personal vehicle. Requires a mileage log as supporting documentation showing dates, origin, destination, and total miles driven.',context:'Collect the per-mile rate and confirm whether it applies to both legs of the trip (to and from) or one-way only. Ask if round trips are calculated automatically or if each leg must be submitted separately. A mileage log is typically required.',category:'Transportation'},
    {name:'IRS Mileage Reimbursement in NEMT',acronym:'',def:'The use of the Internal Revenue Service\'s standard medical mileage rate (updated annually by the IRS) as the basis for reimbursing members who use personal vehicles for medical travel. Some plans adopt this rate directly; others set their own lower or higher rate.',context:'Ask: "Is the reimbursement rate based on the IRS mileage rate?" If yes, note that this rate is updated annually — advise the patient to confirm the current rate at time of submission. If the plan uses its own rate, collect and document that specific rate instead.',category:'Transportation'},
    {name:'Cap Per Trip in NEMT',acronym:'',def:'The maximum amount a plan will pay for a single transportation trip, regardless of actual distance or cost. Any expenses above the per-trip cap are the member\'s financial responsibility. This is a separate limit from the annual transportation cap.',context:'Ask: "Is there a maximum reimbursement cap per trip?" Collect the dollar amount and confirm whether it applies per leg (one-way) or per round trip. For patients with frequent long-distance travel needs, document both the per-trip and annual cap to give a complete picture of coverage.',category:'Transportation'},
  ];
  let _changed=false;
  _inject.forEach(nt=>{if(!td.terms.find(t=>t.name===nt.name)){td.terms.push(nt);_changed=true;}});
  if(_changed){persistStore();}
  return td;
}
function saveTermsData(d){editStore['terms_data']=d;persistStore();}

function showTerminology(){
  currentView='terminology';currentProgId='';
  document.querySelectorAll('.sidebar-nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('navTerms');if(n)n.classList.add('active');
  document.getElementById('main').innerHTML=renderTerminology();
}

function renderTerminology(filter){
  const q=(filter||'').toLowerCase().trim();
  const data=getTermsData();
  const all=data.terms;
  let totalShown=0;
  let sectionsHtml='';
  TERM_CATS.forEach(cat=>{
    const items=all.filter((t,i)=>{
      t._idx=i;
      return t.category===cat&&(!q||t.name.toLowerCase().includes(q)||(t.acronym||'').toLowerCase().includes(q)||t.def.toLowerCase().includes(q)||t.context.toLowerCase().includes(q));
    });
    if(!items.length)return;
    totalShown+=items.length;
    const color=TERM_CAT_COLORS[cat]||'#4361ee';
    const cards=items.map(t=>{
      const idx=all.indexOf(t);
      const acr=t.acronym?`<span class="term-acronym-badge">${t.acronym}</span>`:'';
      return `<div class="term-card">
        <div class="term-card-top">
          <div class="term-name">${t.name}</div>
          <div class="term-right">${acr}<div class="term-card-acts"><button class="term-act-btn" onclick="event.stopPropagation();openEditTermModal(${idx})" title="Edit">&#9999;</button><button class="term-act-btn del" onclick="event.stopPropagation();deleteTermEntry(${idx})" title="Delete">&#10006;</button></div></div>
        </div>
        <div class="term-def">${t.def}</div>
        <div class="term-context-box"><strong>In BI/Eligibility:</strong> ${t.context}</div>
      </div>`;
    }).join('');
    sectionsHtml+=`<div class="term-cat-section"><div class="term-cat-hdr"><span class="term-cat-dot" style="background:${color}"></span><span class="term-cat-label">${cat}</span></div><div class="term-grid">${cards}</div></div>`;
  });
  if(!sectionsHtml)sectionsHtml=`<div class="term-no-results">No terms match "<strong>${q}</strong>"</div>`;
  const countTxt=q?`${totalShown} of ${all.length} terms shown`:`${all.length} terms`;
  return `<div class="term-view-header"><div><div class="term-view-title">&#128218; Healthcare Terminologies</div><div class="term-view-meta">${all.length} terms &middot; 7 categories</div></div><div style="margin-left:auto;display:flex;gap:8px;align-items:center"><div class="dl-dropdown"><button class="btn-dl" onclick="toggleDlMenu(this)">&#8659; Download &#9662;</button><div class="dl-menu"><button class="dl-menu-item" onclick="printToPDF('terms');closeDlMenus()">&#128196;&nbsp; PDF</button><button class="dl-menu-item" onclick="downloadExcel('terms');closeDlMenus()">&#128202;&nbsp; Excel</button></div></div><button class="btn-add-term" onclick="openAddTermModal()">&#43; Add Term</button></div></div><div class="term-search-bar"><div class="term-search-inner"><span style="color:#aab;font-size:14px;flex-shrink:0">&#128269;</span><input class="term-search-input" id="termSearchInput" placeholder="Search terms, acronyms, definitions…" value="${q.replace(/"/g,'&quot;')}" oninput="filterTerminology()" onkeydown="if(event.key==='Escape'){this.value='';filterTerminology();}"><button class="term-search-clear" id="termSearchClear" onclick="clearTermSearch()" title="Clear" style="display:${q?'inline':'none'}">&#10005;</button></div><span class="term-search-count" id="termSearchCount">${countTxt}</span></div>${sectionsHtml}`;
}

function filterTerminology(){
  const v=(document.getElementById('termSearchInput')||{value:''}).value;
  document.getElementById('main').innerHTML=renderTerminology(v);
  // Re-focus search input after re-render
  const inp=document.getElementById('termSearchInput');if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
}
function clearTermSearch(){
  document.getElementById('main').innerHTML=renderTerminology('');
  const inp=document.getElementById('termSearchInput');if(inp)inp.focus();
}

let _frefSec={mandatory:true,conditional:true,optional:false,naref:true};
function toggleFrefSection(sec){
  _frefSec[sec]=!_frefSec[sec];
  const body=document.getElementById('frefSec_'+sec);
  const btn=document.getElementById('frefSecBtn_'+sec);
  if(body) body.style.display=_frefSec[sec]?'':'none';

function filterFieldRef(){
  const v=(document.getElementById('frefSearch')||{value:''}).value;
  const main=document.getElementById('main');
  if(main) main.innerHTML=renderFieldRef(v);
  const inp=document.getElementById('frefSearch');if(inp){inp.focus();const l=inp.value.length;inp.setSelectionRange(l,l);}
}

function renderFieldRef(filter){
  const q=(filter||'').toLowerCase().trim();
  const all=FIELD_REF;
  const visible=q?all.filter(f=>f.field.toLowerCase().includes(q)||f.group.toLowerCase().includes(q)||f.condition.toLowerCase().includes(q)||f.note.toLowerCase().includes(q)):all;
  const required=visible.filter(f=>f.status==='REQUIRED');
  const conditional=visible.filter(f=>f.status==='CONDITIONAL');
  const optional=visible.filter(f=>f.status==='OPTIONAL');
  const totalVisible=visible.length;

  const statusLabel=s=>s==='REQUIRED'?'Mandatory':s==='CONDITIONAL'?'Conditional':'Optional';
  const statusClass=s=>s==='REQUIRED'?'req':s==='CONDITIONAL'?'cond':'opt';

  // ── Section 1: Always Mandatory ──
  const reqRows=required.map(f=>`<tr>
    <td style="font-weight:600;color:#1e293b">${f.field}</td>
    <td><span style="font-size:11px;color:#64748b">${f.group}</span></td>
    <td>${f.acceptNA?'<span class="fref-badge na-yes">✓ Accepted</span>':'<span class="fref-badge na-no">✗ Not Accepted</span>'}</td>
    <td style="color:#475569;font-size:12px">${f.note||'—'}</td>
  </tr>`).join('');
  const reqTable=required.length?`<table class="fref-table"><thead><tr><th>Field</th><th>Data Group</th><th>Accept "N/A"</th><th>Key Rule</th></tr></thead><tbody>${reqRows}</tbody></table>`:`<div style="color:#94a3b8;font-size:13px;padding:10px 0">No mandatory fields match your search.</div>`;

  // ── Section 2: Conditional Fields grouped by Data Group ──
  const makeGroupedTable=(list,col2hdr)=>{
    const groups=[...new Set(list.map(f=>f.group))];
    const html=groups.map(grp=>{
      const items=list.filter(f=>f.group===grp);
      const rows=items.map(f=>`<tr>
        <td style="font-weight:600;color:#1e293b">${f.field}</td>
        <td style="color:#475569;font-size:12px">${f.condition}</td>
        <td>${f.acceptNA?'<span class="fref-badge na-yes">✓ Accepted</span>':'<span class="fref-badge na-no">✗ Not Accepted</span>'}</td>
        <td style="color:#475569;font-size:12px">${f.note||'—'}</td>
      </tr>`).join('');
      return `<tr class="fref-group-row"><td colspan="4">📂 ${grp}</td></tr>${rows}`;
    }).join('');
    return list.length?`<table class="fref-table"><thead><tr><th>Field</th><th>${col2hdr}</th><th>Accept "N/A"</th><th>Key Rule</th></tr></thead><tbody>${html}</tbody></table>`:`<div style="color:#94a3b8;font-size:13px;padding:10px 0">No fields match your search.</div>`;
  };
  const condTable=makeGroupedTable(conditional,'Required When');
  const optTable=makeGroupedTable(optional,'When to Capture');

  // ── Section 4: N/A Quick Reference ──
  const naNo=all.filter(f=>!f.acceptNA);
  const naYes=all.filter(f=>f.acceptNA);
  const naNoGroups=[...new Set(naNo.map(f=>f.group))];
  const naYesGroups=[...new Set(naYes.map(f=>f.group))];
  const naNoHtml=naNoGroups.map(grp=>{
    const items=naNo.filter(f=>f.group===grp);
    return `<div class="fref-na-group">${grp}</div>`+items.map(f=>`<div class="fref-na-item"><span>${f.field}</span><span class="fref-badge ${statusClass(f.status)}">${statusLabel(f.status)}</span></div>`).join('');
  }).join('');
  const naYesHtml=naYesGroups.map(grp=>{
    const items=naYes.filter(f=>f.group===grp);
    return `<div class="fref-na-group">${grp}</div>`+items.map(f=>`<div class="fref-na-item"><span>${f.field}</span><span class="fref-badge ${statusClass(f.status)}">${statusLabel(f.status)}</span></div>`).join('');
  }).join('');

  const searchBar=`<div class="fref-search-bar"><span style="color:#b0bac9;font-size:15px">&#128269;</span><input class="fref-search-input" id="frefSearch" type="text" placeholder="Search fields, groups, conditions…" value="${(filter||'').replace(/"/g,'&quot;')}" oninput="filterFieldRef()" autocomplete="off"><button class="fref-search-clear" onclick="document.getElementById('frefSearch').value='';filterFieldRef()" title="Clear">&#10005;</button><span class="fref-search-count">${q?`${totalVisible} of ${all.length} fields`:`${all.length} fields`}</span></div>`;

  return `<div class="fref-header"><div><div class="fref-title">📋 PBM Field Reference</div><div class="fref-meta">${all.filter(f=>f.status==='REQUIRED').length} mandatory &middot; ${all.filter(f=>f.status==='CONDITIONAL').length} conditional &middot; ${all.filter(f=>f.status==='OPTIONAL').length} optional &middot; Active scenarios (S1–S4)</div></div></div>${searchBar}<div class="fref-body">
  <div class="fref-section">
    <div class="fref-section-hdr mandatory" onclick="toggleFrefSection('mandatory')">🔴 Always Mandatory — Required in Every Active Call<button class="fref-sec-toggle" id="frefSecBtn_mandatory" onclick="event.stopPropagation();toggleFrefSection('mandatory')">${_frefSec.mandatory?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_mandatory" style="display:${_frefSec.mandatory?'':'none'}">${reqTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr conditional" onclick="toggleFrefSection('conditional')">🟡 Conditional Fields — Required Under Specific Scenarios<button class="fref-sec-toggle" id="frefSecBtn_conditional" onclick="event.stopPropagation();toggleFrefSection('conditional')">${_frefSec.conditional?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_conditional" style="display:${_frefSec.conditional?'':'none'}">${condTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr optional" onclick="toggleFrefSection('optional')">🔵 Optional Fields — Capture If Payer Mentions<button class="fref-sec-toggle" id="frefSecBtn_optional" onclick="event.stopPropagation();toggleFrefSection('optional')">${_frefSec.optional?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_optional" style="display:${_frefSec.optional?'':'none'}">${optTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr naref" onclick="toggleFrefSection('naref')">🟢 "Not Available" Acceptance — Quick Reference<button class="fref-sec-toggle" id="frefSecBtn_naref" onclick="event.stopPropagation();toggleFrefSection('naref')">${_frefSec.naref?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_naref" style="display:${_frefSec.naref?'':'none'}">
    <div style="font-size:12px;color:#475569;margin-bottom:10px">When the payer rep says a value is "not available" — which fields must you push back on vs. which can you accept?</div>
    <div class="fref-na-grid">
      <div class="fref-na-col">
        <div class="fref-na-col-hdr no">❌ Cannot Accept "Not Available" (${naNo.length} fields)</div>
        ${naNoHtml}
      </div>
      <div class="fref-na-col">
        <div class="fref-na-col-hdr yes">✅ Can Accept "Not Available" (${naYes.length} fields)</div>
        ${naYesHtml}
      </div>
    </div>
    </div>
  </div>
  </div>`;
}

function stripHtml(html){
  return (html||'').replace(/<[^>]*>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/&middot;/g,'·').replace(/&#8211;/g,'–').replace(/&#8212;/g,'—')
    .replace(/&#9654;/g,'').replace(/→/g,'→').trim();
}

function toggleDlMenu(btn){
  const menu=btn.nextElementSibling;
  const isOpen=menu.classList.contains('open');
  closeDlMenus();
  if(!isOpen) menu.classList.add('open');
}
function closeDlMenus(){
  document.querySelectorAll('.dl-menu.open').forEach(m=>m.classList.remove('open'));
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.dl-dropdown')) closeDlMenus();
});

function downloadExcel(type){
  if(typeof XLSX==='undefined'){
    alert('Excel library not loaded.\nPlease check your internet connection and reload the page.');
    return;
  }
  const wb=XLSX.utils.book_new();
  const today=new Date().toISOString().slice(0,10);

  if(type==='script'){
    const p=programs.find(x=>x.id===currentProgId);
    if(!p){alert('No script selected.');return;}
    const script=currentTab==='pbm'?p.pbm:currentTab==='other'?p.other:p.mm;
    if(!script){alert('No script available for this tab.');return;}
    const aoa=[['Section #','Section Title','Step #','Type','Label','Text','Field / Answer']];
    script.forEach((sec,si)=>{
      sec.steps.forEach((step,ti)=>{
        aoa.push([si+1,sec.title||'',ti+1,step.type||'',stripHtml(step.label||''),stripHtml(step.text||''),step.field||'']);
      });
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[10,28,8,12,14,70,35].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,(p.label+' '+currentTab.toUpperCase()).slice(0,31));
    XLSX.writeFile(wb,'Valeris_'+p.label.replace(/[^a-z0-9]/gi,'_')+'_'+currentTab.toUpperCase()+'_'+today+'.xlsx');
  }
  else if(type==='drugref'){
    const drugData=getDrugData();
    const aoa=[drugData.columns,...drugData.rows.map(r=>r.cells.map(c=>c||''))];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[20,18,18,30,30,18,12,14,16,12,10,18].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Drug Reference');
    XLSX.writeFile(wb,'Valeris_Drug_Reference_'+today+'.xlsx');
  }
  else if(type==='terms'){
    const termsData=getTermsData();
    const aoa=[['Category','Name','Acronym','Definition','Context / Script']];
    termsData.terms.forEach(t=>{
      aoa.push([t.category||'',t.name||'',t.acronym||'',stripHtml(t.def||''),stripHtml(t.context||'')]);
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[20,30,14,55,55].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Terminologies');
    XLSX.writeFile(wb,'Valeris_Terminologies_'+today+'.xlsx');
  }
}

      body=entries.length?entries.map(e=>{
        const co=LOG_CATEGORIES.find(x=>x.key===e.category);
        return `<div class="log-entry"><div class="log-hdr"><span class="log-date">&#128197; ${e.date}</span><span class="log-time">${e.time}</span>${co?`<span class="log-cat ${co.cls}">${co.label}</span>`:''}</div><div class="log-text">${escHtml(e.text)}</div></div>`;
      }).join(''):`<p style="color:#888;text-align:center;padding:40px 0">No log entries recorded.</p>`;
    }
    else{
      const raw=currentTab==='pbm'?p.pbm:currentTab==='other'?p.other:p.mm;
      if(!raw)return;
      const removedSec=new Set(editStore[`${p.id}__${currentTab}__removed_sections`]||[]);
      const storedOrd=editStore[`${p.id}__${currentTab}__section_order`];
      let allIdx=raw.map((_,i)=>i).filter(i=>!removedSec.has(i));
      let ordIdx=allIdx;
      if(storedOrd&&storedOrd.length){const v=new Set(allIdx);ordIdx=storedOrd.filter(i=>v.has(i));const o=new Set(ordIdx);allIdx.forEach(i=>{if(!o.has(i))ordIdx.push(i);});}
      ordIdx.forEach(si=>{
        const sec=raw[si];
        const secTitle=editStore[`${p.id}__${currentTab}__${si}__title`]||sec.title;
        const added=editStore[`${p.id}__${currentTab}__${si}__added`]||[];
        const steps=[...sec.steps,...added];
        const big=steps.length>9;
        const stps=steps.map(s=>{
          const lc=s.type==='question'?'lbl-q':s.type==='statement'?'lbl-s':s.type==='instruction'?'lbl-i':s.type==='warning'?'lbl-w':'lbl-b';
          return `<div class="step"><span class="lbl ${lc}">${s.label||s.type}</span>${s.text}${s.field?`<div class="step-field">${s.field}</div>`:''}</div>`;
        }).join('');
        body+=`<div class="section${big?' lg':''}"><div class="section-hdr ${sec.hdr||'hdr-plan'}">${secTitle}</div>${stps}</div>`;
      });
    }
    content=`<div class="doc-hdr"><div class="doc-title">${p.icon} ${p.label}</div><div class="doc-sub">${p.subtitle}${jStr}${cbStr}</div><div class="doc-meta">${p.programName} &nbsp;·&nbsp; ${tabLabel} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div>${body}`;
  }

  /* ══ DRUG REFERENCE ══ */
  else if(type==='drugref'){
    pageCSS=PAGE_LAND; title='Drug Reference';
    const data=getDrugData();const cols=data.columns,rows=data.rows;
    const q=((document.getElementById('drugSearchInput')||{}).value||'').trim().toLowerCase();
    const filtered=q?rows.filter(r=>(r.cells[0]||'').toLowerCase().includes(q)||(r.cells[1]||'').toLowerCase().includes(q)):rows;
    const W=['13%','9%','9%','7%','11%','8%','9%','7%','12%','6%'];
    const cg=`<colgroup>${cols.map((_,i)=>`<col style="width:${W[i]||'auto'}">`).join('')}</colgroup>`;
    const thead=`<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    const tbody=filtered.map(r=>`<tr>${cols.map((_,ci)=>`<td>${r.cells[ci]||''}</td>`).join('')}</tr>`).join('');
    content=`<div class="doc-hdr"><div class="doc-title">&#128138; Drug Reference</div><div class="doc-meta">${filtered.length} of ${rows.length} entries${q?' — filtered: "'+q+'"':' — all entries'} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div><table class="drug-tbl">${cg}<thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  }

  /* ══ TERMINOLOGIES ══ */
  else if(type==='terms'){
    title='Healthcare Terminologies';
    const data=getTermsData();
    const q=((document.getElementById('termSearchInput')||{}).value||'').trim().toLowerCase();
    let body='',shown=0;
    TERM_CATS.forEach(cat=>{
      const items=data.terms.filter(t=>t.category===cat&&(!q||t.name.toLowerCase().includes(q)||(t.acronym||'').toLowerCase().includes(q)||t.def.toLowerCase().includes(q)||t.context.toLowerCase().includes(q)));
      if(!items.length)return; shown+=items.length;
      body+=`<div class="term-sect"><div class="term-cat-hdr">${cat}</div>${items.map(t=>`<div class="term-item"><div class="term-name">${t.name}${t.acronym?`<span class="term-acr">${t.acronym}</span>`:''}</div><div class="term-def">${t.def}</div><div class="term-ctx"><strong>In BI/Eligibility:</strong> ${t.context}</div></div>`).join('')}</div>`;
    });
    content=`<div class="doc-hdr"><div class="doc-title">&#128218; Healthcare Terminologies</div><div class="doc-meta">${shown} terms${q?' — filtered: "'+q+'"':' — all terms'} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div>${body}`;
  }

  const win=window.open('','_blank','width=980,height=800');
  if(!win){alert('Please allow pop-ups in your browser to use this feature.');return;}
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>${BASE}${pageCSS}</style></head><body>${content}</body></html>`);
  win.document.close();
  setTimeout(()=>{win.focus();win.print();},500);
}

selectProgram(programs[0].id);
</script>
<div class="term-modal-overlay" id="termModalOverlay" onclick="if(event.target===this)closeTermModal()">
  <div class="term-modal-box">
    <div class="term-modal-title">
      <span id="termModalHeading">Add Term</span>
      <button class="term-modal-close" onclick="closeTermModal()">&#10005;</button>
    </div>
    <label class="term-modal-label">Term Name</label>
    <input class="term-modal-input" id="tmName" placeholder="e.g. Prior Authorization">
    <label class="term-modal-label">Acronym (optional)</label>
    <input class="term-modal-input" id="tmAcronym" placeholder="e.g. PA">
    <label class="term-modal-label">Definition</label>
    <textarea class="term-modal-textarea" id="tmDef" placeholder="Clear definition of this term…"></textarea>
    <label class="term-modal-label">How it applies to BI / Eligibility</label>
    <textarea class="term-modal-textarea" id="tmContext" placeholder="How agents should use or collect this information…"></textarea>
    <label class="term-modal-label">Category</label>
    <select class="term-modal-select" id="tmCat">
      <option value="General">General</option>
      <option value="Authorization">Authorization</option>
      <option value="Benefits">Benefits</option>
      <option value="Plan">Plan</option>
      <option value="Pharmacy">Pharmacy</option>
      <option value="Medicare">Medicare</option>
      <option value="Appeals">Appeals</option>
      <option value="Transportation">Transportation</option>
    </select>
    <div class="term-modal-actions">
      <button class="btn-cancel" onclick="closeTermModal()">Cancel</button>
      <button class="btn-save" onclick="saveTermModal()">Save</button>
    </div>
  </div>
</div>
</body>
</html>
