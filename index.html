function qcSyncFormValuesIntoClone(liveRoot,cloneRoot){
  // outerHTML/cloneNode serialize the *attributes* an element was rendered with, not the
  // live DOM property a user's typing/selecting updates — so a naive clone always shows
  // stale text values and the original "Select…" option, no matter what's on screen.
  // Copy the live .value (and, for <select>, which <option> is actually selected) onto the
  // clone's matching elements — same tag order in both trees since it's a deep clone.
  const liveEls=liveRoot.querySelectorAll('input, select, textarea');
  const cloneEls=cloneRoot.querySelectorAll('input, select, textarea');
  liveEls.forEach((liveEl,i)=>{
    const cloneEl=cloneEls[i];
    if(!cloneEl)return;
    if(liveEl.tagName==='SELECT'){
      [...cloneEl.options].forEach((opt,oi)=>{
        if(oi===liveEl.selectedIndex) opt.setAttribute('selected','selected');
        else opt.removeAttribute('selected');
      });
    } else if(liveEl.tagName==='TEXTAREA'){
      cloneEl.textContent=liveEl.value;
    } else {
      cloneEl.setAttribute('value',liveEl.value);
    }
  });
}

function printToPDF(type){
  /* ══ QC SCORECARD (MM/PBM) — print an EXACT clone of the on-screen page, no restyling ══ */
  if(type==='qc'){
    const mainEl=document.getElementById('main');
    if(!mainEl){alert('Nothing to print.');return;}
    const mainClone=mainEl.cloneNode(true);
    qcSyncFormValuesIntoClone(mainEl,mainClone);
    const qcTitle=QC_KIND_META[currentQCKind].title;
    const styleHtml=[...document.querySelectorAll('link[rel="stylesheet"], link[rel="preconnect"], style')].map(el=>el.outerHTML).join('\n');
    const win=window.open('','_blank','width=1100,height=900');
    if(!win){alert('Please allow pop-ups in your browser to use this feature.');return;}
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${qcTitle}</title>${styleHtml}<style>
      /* Technical resets only — the app's body/#main use height:100vh + overflow:hidden for the
         in-app scroll panes, which would clip everything in a static print window. Nothing here
         changes colors, fonts, spacing, or layout — it only lets the full content render/print. */
      body{height:auto!important;overflow:visible!important;display:block!important;padding:24px}
      #main{height:auto!important;overflow:visible!important;padding:0}
      @page{size:A4 landscape;margin:10mm}
      /* A print page is narrower than a browser window, which would otherwise trigger this same
         stylesheet's own max-width:1100px responsive breakpoint and collapse the grid to a mobile
         layout. Re-assert the desktop grid unconditionally so print always matches the screen. */
      .qc-table-hdr{display:grid!important;grid-template-columns:180px 1fr 100px 100px 50px 1fr!important}
      .qc-row{display:grid!important;grid-template-columns:180px 1fr 100px 100px 50px 1fr!important}
      .qc-row-label,.qc-row-question,.qc-comment-input{grid-column:auto!important}
    </style></head><body>${mainClone.outerHTML}</body></html>`);
    win.document.close();
    setTimeout(()=>{win.focus();win.print();},700);
    return;
  }
  /* ══ QC ANALYTICS — print an exact clone of the current drill level's
     cards/charts (respecting whatever search/checkbox filtering is
     currently hiding cards, same "print what you see" fidelity as the
     scorecard above), with the interactive-only controls stripped out
     since they're meaningless on paper. ══ */
  if(type==='qcAnalytics'){
    const bodyEl=document.getElementById('qcAnalyticsBody');
    if(!bodyEl){alert('Nothing to print.');return;}
    const clone=bodyEl.cloneNode(true);
    clone.querySelectorAll('.qc-analytics-search-row, .qc-analytics-expand-btn, .qc-analytics-dropdown-panel').forEach(el=>el.remove());
    const kindLabel=QC_KIND_META[_qcAnalyticsKind].shortLabel;

    const isWorkflowAgentTab=d.level==='kind'&&_qcAnalyticsWorkflowTab==='agent';
    // The team leader filter only hides cards live — it never touches the
    // drill level/title above — so without this the exported PDF would show
    // a filtered subset of agents under a title that still just says "By
    // Agent (All Programs)", with no record of which filter produced it.
    const tlFilterSuffix=(isWorkflowAgentTab&&_qcAnalyticsWorkflowTLFilter.size)
      ?' — Team Leader: '+Array.from(_qcAnalyticsWorkflowTLFilter).sort().join(', ')
      :'';
    const title=d.level==='teamLeader'?kindLabel+' QC Analytics — '+d.program+' — By Team Leader'
      :d.level==='agent'?kindLabel+' QC Analytics — '+d.program+' — '+d.teamLeader+' — By Agent'
      :d.level==='workflowAgentDetail'?kindLabel+' QC Analytics — '+d.agent+' — All Programs'
      :d.level==='workflowMultiAgent'?kindLabel+' QC Analytics — Selected Agents — All Programs'
      :isWorkflowAgentTab?kindLabel+' QC Analytics — By Agent (All Programs)'+tlFilterSuffix
      :kindLabel+' QC Analytics — By Program';
    const styleHtml=[...document.querySelectorAll('link[rel="stylesheet"], link[rel="preconnect"], style')].map(el=>el.outerHTML).join('\n');
    const win=window.open('','_blank','width=1100,height=900');
    if(!win){alert('Please allow pop-ups in your browser to use this feature.');return;}
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>${styleHtml}<style>
      body{height:auto!important;overflow:visible!important;display:block!important;padding:24px}
      #qcAnalyticsBody{height:auto!important;overflow:visible!important}
      @page{size:A4 landscape;margin:10mm}

    </style></head><body><h2 style="font-family:Arial,Helvetica,sans-serif;margin-bottom:16px">${title}</h2>${clone.outerHTML}</body></html>`);
    win.document.close();
    setTimeout(()=>{win.focus();win.print();},700);
    return;
  }
  /* ── Base CSS (all types) ── */
  const BASE=`
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;font-size:10.5pt;color:#111;background:#fff}
    /* Document header */
    .doc-hdr{padding-bottom:12px;margin-bottom:16px;border-bottom:2.5px solid #1a1a2e}
    .doc-title{font-size:16pt;font-weight:700;color:#1a1a2e;margin-bottom:3px}
    .doc-sub{font-size:9.5pt;color:#555;margin-bottom:5px;line-height:1.4}
    .doc-meta{font-size:8.5pt;color:#888;padding-top:6px;border-top:1px solid #e0e0e0;margin-top:6px}
    /* Sections */
    .section{margin-bottom:10px;border:1px solid #d8dce8;border-radius:4px;break-inside:avoid;page-break-inside:avoid}
    .section.lg{break-inside:auto;page-break-inside:auto}
    .section-hdr{padding:7px 12px;font-size:10pt;font-weight:700;border-bottom:1px solid #d8dce8;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .hdr-opening{background:#eef2ff;color:#1e3a8a}
    .hdr-plan{background:#fff8e0;color:#78350f}
    .hdr-coverage{background:#e8f8ee;color:#14532d}

    .log-hdr{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px;font-size:9pt}

    .log-cat-note{background:#dcfce7;color:#166534}.log-cat-update{background:#fef9c3;color:#854d0e}

    const tabLabel=TAB[currentTab]||currentTab.toUpperCase();
    title=`${p.label} — ${tabLabel}`;
    const jcodes=p.drugs?[...new Set(p.drugs.map(d=>d.jcode).filter(j=>j&&j!=='—'))]:[];
    const cbNums=p.callbacks?[...new Set(p.callbacks.map(c=>c.number).filter(Boolean))]:p.programPhone?[p.programPhone]:[];
    const jStr=jcodes.length?` &nbsp;·&nbsp; <strong>J-Code:</strong> ${jcodes.join(', ')}`:'' ;
    const cbStr=cbNums.length?` &nbsp;·&nbsp; <strong>Callback:</strong> ${cbNums.join(' | ')}`:'' ;
    let body='';

    if(currentTab==='compliance'){
      const removed=new Set(editStore['compliance__removed']||[]);
      const added=editStore['compliance__added']||[];
      body=complianceItems.map((ci,idx)=>{
        if(removed.has(idx))return '';
        const s=editStore[`compliance__${idx}`];
        return `<div class="comp-item"><h4>${s?s.h:ci.h}</h4><p>${s?s.t:ci.t}</p></div>`;
      }).join('')+added.map(a=>`<div class="comp-item"><h4>${a.h}</h4><p>${a.t}</p></div>`).join('');
    }
    else if(currentTab==='log'){
      const entries=[...(editStore[`${p.id}__daily_log`]||[])].reverse();
      body=entries.length?entries.map(e=>{
        const co=LOG_CATEGORIES.find(x=>x.key===e.category);
        return `<div class="log-entry"><div class="log-hdr"><span class="log-date">&#128197; ${e.date}</span><span class="log-time">${e.time}</span>${co?`<span class="log-cat ${co.cls}">${co.label}</span>`:''}</div><div class="log-text">${escHtml(e.text)}</div></div>`;
      }).join(''):`<p style="color:#888;text-align:center;padding:40px 0">No log entries recorded.</p>`;
    }
    else{
      const raw=currentTab==='pbm'?p.pbm:currentTab==='other'?p.other:p.mm;
      if(!raw)return;
      const removedSec=new Set(editStore[`${p.id}__${currentTab}__removed_sections`]||[]);
      const storedOrd=editStore[`${p.id}__${currentTab}__section_order`];
      let allIdx=raw.map((_,i)=>i).filter(i=>!removedSec.has(i));
      let ordIdx=allIdx;
      if(storedOrd&&storedOrd.length){const v=new Set(allIdx);ordIdx=storedOrd.filter(i=>v.has(i));const o=new Set(ordIdx);allIdx.forEach(i=>{if(!o.has(i))ordIdx.push(i);});}
      ordIdx.forEach(si=>{
        const sec=raw[si];
        const secTitle=editStore[`${p.id}__${currentTab}__${si}__title`]||sec.title;
        const added=editStore[`${p.id}__${currentTab}__${si}__added`]||[];
        const steps=[...sec.steps,...added];
        const big=steps.length>9;
        const stps=steps.map(s=>{
          const lc=s.type==='question'?'lbl-q':s.type==='statement'?'lbl-s':s.type==='instruction'?'lbl-i':s.type==='warning'?'lbl-w':'lbl-b';
          return `<div class="step"><span class="lbl ${lc}">${s.label||s.type}</span>${s.text}${s.field?`<div class="step-field">${s.field}</div>`:''}</div>`;
        }).join('');
        body+=`<div class="section${big?' lg':''}"><div class="section-hdr ${sec.hdr||'hdr-plan'}">${secTitle}</div>${stps}</div>`;
      });
    }
    content=`<div class="doc-hdr"><div class="doc-title">${p.icon} ${p.label}</div><div class="doc-sub">${p.subtitle}${jStr}${cbStr}</div><div class="doc-meta">${p.programName} &nbsp;·&nbsp; ${tabLabel} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div>${body}`;
  }

  /* ══ DRUG REFERENCE ══ */
  else if(type==='drugref'){
    pageCSS=PAGE_LAND; title='Drug Reference';
    const data=getDrugData();const cols=data.columns,rows=data.rows;
    const q=((document.getElementById('drugSearchInput')||{}).value||'').trim().toLowerCase();
    const filtered=q?rows.filter(r=>(r.cells[0]||'').toLowerCase().includes(q)||(r.cells[1]||'').toLowerCase().includes(q)):rows;
    const W=['13%','9%','9%','7%','11%','8%','9%','7%','12%','6%'];
    const cg=`<colgroup>${cols.map((_,i)=>`<col style="width:${W[i]||'auto'}">`).join('')}</colgroup>`;
    const thead=`<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
    const tbody=filtered.map(r=>`<tr>${cols.map((_,ci)=>`<td>${r.cells[ci]||''}</td>`).join('')}</tr>`).join('');
    content=`<div class="doc-hdr"><div class="doc-title">&#128138; Drug Reference</div><div class="doc-meta">${filtered.length} of ${rows.length} entries${q?' — filtered: "'+q+'"':' — all entries'} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div><table class="drug-tbl">${cg}<thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  }

  /* ══ TERMINOLOGIES ══ */
  else if(type==='terms'){
    title='Healthcare Terminologies';
    const data=getTermsData();
    const q=((document.getElementById('termSearchInput')||{}).value||'').trim().toLowerCase();
    let body='',shown=0;
    TERM_CATS.forEach(cat=>{
      const items=data.terms.filter(t=>t.category===cat&&(!q||t.name.toLowerCase().includes(q)||(t.acronym||'').toLowerCase().includes(q)||t.def.toLowerCase().includes(q)||t.context.toLowerCase().includes(q)));
      if(!items.length)return; shown+=items.length;
      body+=`<div class="term-sect"><div class="term-cat-hdr">${cat}</div>${items.map(t=>`<div class="term-item"><div class="term-name">${t.name}${t.acronym?`<span class="term-acr">${t.acronym}</span>`:''}</div><div class="term-def">${t.def}</div><div class="term-ctx"><strong>In BI/Eligibility:</strong> ${t.context}</div></div>`).join('')}</div>`;
    });
    content=`<div class="doc-hdr"><div class="doc-title">&#128218; Healthcare Terminologies</div><div class="doc-meta">${shown} terms${q?' — filtered: "'+q+'"':' — all terms'} &nbsp;·&nbsp; Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div></div>${body}`;
  }

  const win=window.open('','_blank','width=980,height=800');
  if(!win){alert('Please allow pop-ups in your browser to use this feature.');return;}
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title><style>${BASE}${pageCSS}</style></head><body>${content}</body></html>`);
  win.document.close();
  setTimeout(()=>{win.focus();win.print();},500);
}

// Poll rather than rely on script onload ordering — the GIS <script> tag is
// async, so it can finish loading either before or after this inline script.
(function qcWaitForGoogleAuth(){
  if(typeof google!=='undefined' && google.accounts && google.accounts.id){
    qcInitGoogleAuth();
    qcRefreshAuthUI();
  } else {
    setTimeout(qcWaitForGoogleAuth, 150);
  }
})();

// Detects when a newer build has been deployed while this tab is still open
// (e.g. running a stale QC_WEBHOOK_URL against an outdated Apps Script
// deployment) and prompts a reload rather than silently misbehaving.
function qcCheckForUpdate(){
  fetch('version.txt?_='+Date.now(),{cache:'no-store'})
    .then(r=>r.ok?r.text():null)
    .then(v=>{ if(v && v.trim() && v.trim()!==APP_VERSION) qcShowUpdateBanner(); })
    .catch(()=>{});
}
// Deliberately a hard gate, not a dismissible nudge — this tool feeds a
// shared Google Sheet through a specific Apps Script deployment, and a tab
// left running old code can silently write misaligned rows (see the
// Team Leader/timezone bugs this was built to catch). Blocking all use
// until reload guarantees nobody acts on stale code without noticing.
function qcShowUpdateBanner(){
  if(document.getElementById('qcUpdateBanner')) return;
  const bar=document.createElement('div');
  bar.id='qcUpdateBanner';
  bar.innerHTML='<span>A new version of Valeris is available — reload to continue.</span><button onclick="location.reload()">Reload now</button>';
  document.body.appendChild(bar);
  const overlay=document.createElement('div');
  overlay.id='qcUpdateBlockOverlay';
  document.body.appendChild(overlay);
  document.body.style.overflow='hidden';
}
setTimeout(qcCheckForUpdate, 4000);
setInterval(qcCheckForUpdate, 3*60*1000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) qcCheckForUpdate(); });
