function renderFieldRef(filter){
  const q=(filter||'').toLowerCase().trim();
  const all=FIELD_REF;
  const visible=q?all.filter(f=>f.field.toLowerCase().includes(q)||f.group.toLowerCase().includes(q)||f.condition.toLowerCase().includes(q)||f.note.toLowerCase().includes(q)):all;
  const required=visible.filter(f=>f.status==='REQUIRED');
  const conditional=visible.filter(f=>f.status==='CONDITIONAL');
  const optional=visible.filter(f=>f.status==='OPTIONAL');
  const totalVisible=visible.length;

  const statusLabel=s=>s==='REQUIRED'?'Mandatory':s==='CONDITIONAL'?'Conditional':'Optional';
  const statusClass=s=>s==='REQUIRED'?'req':s==='CONDITIONAL'?'cond':'opt';

  // ── Section 1: Always Mandatory ──
  const reqRows=required.map(f=>`<tr>
    <td style="font-weight:600;color:#1e293b">${f.field}</td>
    <td><span style="font-size:11px;color:#64748b">${f.group}</span></td>
    <td>${f.acceptNA?'<span class="fref-badge na-yes">✓ Accepted</span>':'<span class="fref-badge na-no">✗ Not Accepted</span>'}</td>
    <td style="color:#475569;font-size:12px">${f.note||'—'}</td>
  </tr>`).join('');
  const reqTable=required.length?`<table class="fref-table"><thead><tr><th>Field</th><th>Data Group</th><th>Accept "N/A"</th><th>Key Rule</th></tr></thead><tbody>${reqRows}</tbody></table>`:`<div style="color:#94a3b8;font-size:13px;padding:10px 0">No mandatory fields match your search.</div>`;

  // ── Section 2: Conditional Fields grouped by Data Group ──
  const makeGroupedTable=(list,col2hdr)=>{
    const groups=[...new Set(list.map(f=>f.group))];
    const html=groups.map(grp=>{
      const items=list.filter(f=>f.group===grp);
      const rows=items.map(f=>`<tr>
        <td style="font-weight:600;color:#1e293b">${f.field}</td>
        <td style="color:#475569;font-size:12px">${f.condition}</td>
        <td>${f.acceptNA?'<span class="fref-badge na-yes">✓ Accepted</span>':'<span class="fref-badge na-no">✗ Not Accepted</span>'}</td>
        <td style="color:#475569;font-size:12px">${f.note||'—'}</td>
      </tr>`).join('');
      return `<tr class="fref-group-row"><td colspan="4">📂 ${grp}</td></tr>${rows}`;
    }).join('');
    return list.length?`<table class="fref-table"><thead><tr><th>Field</th><th>${col2hdr}</th><th>Accept "N/A"</th><th>Key Rule</th></tr></thead><tbody>${html}</tbody></table>`:`<div style="color:#94a3b8;font-size:13px;padding:10px 0">No fields match your search.</div>`;
  };
  const condTable=makeGroupedTable(conditional,'Required When');
  const optTable=makeGroupedTable(optional,'When to Capture');

  // ── Section 4: N/A Quick Reference ──
  const naNo=all.filter(f=>!f.acceptNA);
  const naYes=all.filter(f=>f.acceptNA);
  const naNoGroups=[...new Set(naNo.map(f=>f.group))];
  const naYesGroups=[...new Set(naYes.map(f=>f.group))];
  const naNoHtml=naNoGroups.map(grp=>{
    const items=naNo.filter(f=>f.group===grp);
    return `<div class="fref-na-group">${grp}</div>`+items.map(f=>`<div class="fref-na-item"><span>${f.field}</span><span class="fref-badge ${statusClass(f.status)}">${statusLabel(f.status)}</span></div>`).join('');
  }).join('');
  const naYesHtml=naYesGroups.map(grp=>{
    const items=naYes.filter(f=>f.group===grp);
    return `<div class="fref-na-group">${grp}</div>`+items.map(f=>`<div class="fref-na-item"><span>${f.field}</span><span class="fref-badge ${statusClass(f.status)}">${statusLabel(f.status)}</span></div>`).join('');
  }).join('');

  const searchBar=`<div class="fref-search-bar"><span style="color:#b0bac9;font-size:15px">&#128269;</span><input class="fref-search-input" id="frefSearch" type="text" placeholder="Search fields, groups, conditions…" value="${(filter||'').replace(/"/g,'&quot;')}" oninput="filterFieldRef()" autocomplete="off"><button class="fref-search-clear" onclick="document.getElementById('frefSearch').value='';filterFieldRef()" title="Clear">&#10005;</button><span class="fref-search-count">${q?`${totalVisible} of ${all.length} fields`:`${all.length} fields`}</span></div>`;

  return `<div class="fref-header"><div><div class="fref-title">📋 PBM Field Reference</div><div class="fref-meta">${all.filter(f=>f.status==='REQUIRED').length} mandatory &middot; ${all.filter(f=>f.status==='CONDITIONAL').length} conditional &middot; ${all.filter(f=>f.status==='OPTIONAL').length} optional &middot; Active scenarios (S1–S4)</div></div></div>${searchBar}<div class="fref-body">
  <div class="fref-section">
    <div class="fref-section-hdr mandatory" onclick="toggleFrefSection('mandatory')">🔴 Always Mandatory — Required in Every Active Call<button class="fref-sec-toggle" id="frefSecBtn_mandatory" onclick="event.stopPropagation();toggleFrefSection('mandatory')">${_frefSec.mandatory?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_mandatory" style="display:${_frefSec.mandatory?'':'none'}">${reqTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr conditional" onclick="toggleFrefSection('conditional')">🟡 Conditional Fields — Required Under Specific Scenarios<button class="fref-sec-toggle" id="frefSecBtn_conditional" onclick="event.stopPropagation();toggleFrefSection('conditional')">${_frefSec.conditional?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_conditional" style="display:${_frefSec.conditional?'':'none'}">${condTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr optional" onclick="toggleFrefSection('optional')">🔵 Optional Fields — Capture If Payer Mentions<button class="fref-sec-toggle" id="frefSecBtn_optional" onclick="event.stopPropagation();toggleFrefSection('optional')">${_frefSec.optional?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_optional" style="display:${_frefSec.optional?'':'none'}">${optTable}</div>
  </div>
  <div class="fref-section">
    <div class="fref-section-hdr naref" onclick="toggleFrefSection('naref')">🟢 "Not Available" Acceptance — Quick Reference<button class="fref-sec-toggle" id="frefSecBtn_naref" onclick="event.stopPropagation();toggleFrefSection('naref')">${_frefSec.naref?'▲ Collapse':'▼ Expand'}</button></div>
    <div id="frefSec_naref" style="display:${_frefSec.naref?'':'none'}">
    <div style="font-size:12px;color:#475569;margin-bottom:10px">When the payer rep says a value is "not available" — which fields must you push back on vs. which can you accept?</div>
    <div class="fref-na-grid">
      <div class="fref-na-col">
        <div class="fref-na-col-hdr no">❌ Cannot Accept "Not Available" (${naNo.length} fields)</div>
        ${naNoHtml}
      </div>
      <div class="fref-na-col">
        <div class="fref-na-col-hdr yes">✅ Can Accept "Not Available" (${naYes.length} fields)</div>
        ${naYesHtml}
      </div>
    </div>
    </div>
  </div>
  </div>`;
}

const QC_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxqt-RwuHcx_6QSR1EvKCgkGMcfkn39TKygRI_pQzL1OHCGEXpNNwuavvw-HL3LuV0P/exec";
function qcWebhookConfigured(){ return !!QC_WEBHOOK_URL && QC_WEBHOOK_URL.indexOf('PASTE_YOUR')===-1; }

// Bump this string on every push (any change is enough — date+counter is a
// convenient scheme). qcCheckForUpdate() below polls version.txt and prompts
// a reload when it no longer matches what this page loaded with — otherwise
// a tab left open across a deploy keeps running stale code (e.g. hitting an
// old QC_WEBHOOK_URL/Apps Script deployment) with no way to notice.
const APP_VERSION = "2026-07-16.9";

// ── Google Sign-In (real, domain-verified server-side — see Code.gs) ──
const QC_GOOGLE_CLIENT_ID = "872194684059-892v6oe8jktuij9m0gbefte2cdbp5oim.apps.googleusercontent.com";
function qcAuthConfigured(){ return !!QC_GOOGLE_CLIENT_ID && QC_GOOGLE_CLIENT_ID.indexOf('PASTE_YOUR')===-1; }

let qcAuthToken=null, qcAuthEmail=null, qcAuthExp=0;
(function qcLoadStoredAuth(){
  try{
    const raw=sessionStorage.getItem('qc_google_auth');
    if(!raw)return;
    const saved=JSON.parse(raw);
    if(saved.exp && saved.exp*1000 > Date.now()){
      qcAuthToken=saved.token; qcAuthEmail=saved.email; qcAuthExp=saved.exp;
    }
  }catch(e){}
})();

function qcIsSignedIn(){ return !!qcAuthToken && qcAuthExp*1000 > Date.now(); }

function qcInitGoogleAuth(){
  if(!qcAuthConfigured() || typeof google==='undefined' || !google.accounts) return;
  google.accounts.id.initialize({client_id:QC_GOOGLE_CLIENT_ID, callback:qcHandleCredential});
}

function qcHandleCredential(response){
  try{
    const b64=response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const payload=JSON.parse(decodeURIComponent(escape(atob(b64))));
    qcAuthToken=response.credential; qcAuthEmail=payload.email; qcAuthExp=payload.exp;
    sessionStorage.setItem('qc_google_auth', JSON.stringify({token:qcAuthToken,email:qcAuthEmail,exp:qcAuthExp}));
  }catch(e){}
  qcRefreshAuthUI();
}

function qcSignOut(){
  qcAuthToken=null; qcAuthEmail=null; qcAuthExp=0;
  sessionStorage.removeItem('qc_google_auth');
  qcRefreshAuthUI();
}

function qcRefreshAuthUI(){
  const el=document.getElementById('qcAuthContainer');
  if(!el || !qcAuthConfigured()) return;
  if(qcIsSignedIn()){
    el.innerHTML=`<span class="qc-signedin-chip">&#10003; ${escHtml(qcAuthEmail)}<button class="qc-signout-btn" onclick="qcSignOut()" title="Sign out">&times;</button></span>`;
    return;
  }
  el.innerHTML='';
  if(typeof google!=='undefined' && google.accounts){
    google.accounts.id.renderButton(el, {theme:'filled_blue', size:'medium', text:'signin', width:180});
  }
}

function qcBuildSavePayload(){
  const c=qcState.case||{};
  const p=programs.find(x=>x.id===c.program);
  const r=qcRecalc();
  const headers=['Agent Name','SR / Case Number','Auditor Name','Audit Date','Payer Name','Payer Type','Program','Type','Team Leader','Overall Score (%)','# of Errors','Scored','Total'];
  const values=[c.agentName||'',c.srNumber||'',c.auditorName||'',c.auditDate||'',c.payerName||'',c.payerType||'',p?p.label:'',c.type||'',c.teamLeader||'',r.pct===null?'':r.pct,r.errCount,r.scoredCount,r.totalCount];
  QC_SECTIONS.forEach((sec,si)=>{
    sec.items.forEach((it,ii)=>{
      const st=qcState.scores[si+'_'+ii]||{};
      headers.push(sec.title+' — '+it.label+' — Asked');
      headers.push(sec.title+' — '+it.label+' — Documented');
      headers.push(sec.title+' — '+it.label+' — Comment');
      values.push(st.asked||'',st.documented||'',st.comment||'');
    });
  });
  return {kind:currentQCKind,idToken:qcAuthToken,headers,values};
}

function qcRequiredCaseFields(){
  return [
    {k:'program',label:QC_KIND_META[currentQCKind].shortLabel+' Program'},
    {k:'type',label:'Type'},

    {k:'agentName',label:'Agent Name'},
    {k:'srNumber',label:'SR / Case Number'},
    {k:'auditorName',label:'Auditor Name'},
    {k:'auditDate',label:'Audit Date'},
    {k:'payerName',label:'Payer Name'},

  ];
}

function qcValidateCaseInfo(){
  const c=qcState.case||{};
  document.querySelectorAll('[data-field].qc-field-error').forEach(el=>el.classList.remove('qc-field-error'));
  const missing=qcRequiredCaseFields().filter(f=>!String(c[f.k]||'').trim());
  missing.forEach(f=>{
    const el=document.querySelector('[data-field="'+f.k+'"]');
    if(el) el.classList.add('qc-field-error');
  });
  return missing;
}

async function qcSaveToSheet(){
  const btns=[...document.querySelectorAll('[data-role="qc-save-btn"]')];
  const statusEls=[...document.querySelectorAll('[data-role="qc-save-status"]')];
  const setStatus=(text,cls)=>{ statusEls.forEach(el=>{el.textContent=text;el.className='qc-save-status'+(cls?' '+cls:'');}); };
  if(!qcWebhookConfigured()){
    setStatus('⚠ Save endpoint not configured — see google-apps-script/Code.gs','err');
    return;
  }
  if(!qcAuthConfigured()){
    setStatus('⚠ Google Sign-In not configured — see google-apps-script/Code.gs','err');
    return;
  }
  if(!qcIsSignedIn()){
    setStatus('⚠ Please sign in with your Google account first (top right) before saving.','err');
    if(typeof google!=='undefined' && google.accounts) google.accounts.id.prompt();
    return;
  }
  const missingFields=qcValidateCaseInfo();
  if(missingFields.length){
    setStatus('⚠ Please fill in: '+missingFields.map(f=>f.label).join(', '),'err');
    return;
  }
  const payload=qcBuildSavePayload();
  btns.forEach(btn=>{btn.disabled=true;btn.textContent='Saving…';});
  setStatus('','');
  try{
    const res=await fetch(QC_WEBHOOK_URL,{method:'POST',body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.status==='ok') setStatus('✓ Saved to '+data.sheet+' (row '+data.row+')','ok');
    else setStatus('✗ Save failed: '+(data.message||'Unknown error'),'err');
  }catch(err){
    setStatus('✗ Save failed: '+err.message,'err');
  }finally{
    btns.forEach(btn=>{btn.disabled=false;btn.innerHTML='&#9729; Save to Sheet';});
  }
}

async function qcLoadAnalytics(kind){
  const bodyEl=document.getElementById('qcAnalyticsBody');
  if(!bodyEl)return;
  const cached=_qcAnalyticsCache[kind];
  const FRESH_MS=5*60*1000;
  if(cached&&(Date.now()-cached.ts)<FRESH_MS){
    bodyEl.innerHTML=renderQCAnalyticsBody(cached.data);
    return;
  }
  if(!qcWebhookConfigured()){
    bodyEl.innerHTML=`<div style="padding:40px;text-align:center;color:#94a3b8">&#9888; Save endpoint not configured yet — see google-apps-script/Code.gs</div>`;

    return;

  bodyEl.innerHTML=`<div style="padding:40px;text-align:center;color:#94a3b8">Loading…</div>`;
  try{
    const res=await fetch(QC_WEBHOOK_URL,{method:'POST',body:JSON.stringify({action:'list',kind,idToken:qcAuthToken})});
    const data=await res.json();
    if(data.status!=='ok')throw new Error(data.message||'Unknown error');
    _qcAnalyticsCache[kind]={data:data.audits,ts:Date.now()};
    bodyEl.innerHTML=renderQCAnalyticsBody(data.audits);

    bodyEl.innerHTML=`<div style="padding:40px;text-align:center;color:#dc2626">&#10005; Could not load analytics: ${escHtml(err.message)}</div>`;
  }
}

function qcAggregateBy(audits,key){
  const groups={};
  audits.forEach(a=>{
    const k=(a[key]||'(unknown)').toString();
    if(!groups[k])groups[k]={name:k,count:0,scoreSum:0,scoreCount:0,errorSum:0,errorByDate:{},failedFields:[],askedFails:0,documentedFails:0};
    groups[k].count++;
    const score=parseFloat(a.overallScore);
    if(!isNaN(score)){groups[k].scoreSum+=score;groups[k].scoreCount++;}
    const errs=parseFloat(a.errorCount);
    if(!isNaN(errs)){
      groups[k].errorSum+=errs;
      // Bucket by calendar date — each point on the multi-day trend line is
      // that day's AVERAGE errors per audit (sum/count), not a running total,
      // so a day with 1 audit isn't visually equated with a day with 5.
      const d=a.auditDate||'(no date)';
      if(!groups[k].errorByDate[d])groups[k].errorByDate[d]={sum:0,count:0};
      groups[k].errorByDate[d].sum+=errs;
      groups[k].errorByDate[d].count++;
    }
    if(Array.isArray(a.failedFields)) groups[k].failedFields.push.apply(groups[k].failedFields,a.failedFields);
    if(typeof a.askedFails==='number') groups[k].askedFails+=a.askedFails;
    if(typeof a.documentedFails==='number') groups[k].documentedFails+=a.documentedFails;
  });
  // No fixed sort here — callers sort differently depending on purpose (best/worst
  // performer first for the main list, highest-errors-first for a bar breakdown,
  // chronological for a date-keyed breakdown), so sorting here would fight them.
  return Object.values(groups).map(g=>({
    name:g.name,count:g.count,
    avgScore:g.scoreCount?Math.round(g.scoreSum/g.scoreCount):null,
    avgErrors:g.count?+(g.errorSum/g.count).toFixed(1):0,
    totalErrors:Math.round(g.errorSum),
    errorTrend:Object.keys(g.errorByDate).sort().map(d=>({date:d,errors:+(g.errorByDate[d].sum/g.errorByDate[d].count).toFixed(1)})),
    failedFields:g.failedFields,
    askedFails:g.askedFails,
    documentedFails:g.documentedFails
  }));
}

// Same aggregation as qcAggregateBy, but collapsed into a single group
// covering every audit passed in — used for the workflow (MM/PBM) overview
// card, which needs the exact same shape (errorTrend, failedFields, etc.)
// as a Program/Team Leader/Agent card, just scoped to "everything."
function qcAggregateAll(audits,label){
  const tagged=audits.map(a=>Object.assign({},a,{__all:label}));
  return qcAggregateBy(tagged,'__all')[0]||{name:label,count:0,avgScore:null,avgErrors:0,totalErrors:0,errorTrend:[],failedFields:[],askedFails:0,documentedFails:0};
}

// Tallies how often each specific question was marked "fail" (across Asked +
// Documented) within a scope, and returns the most common as a % of that
// scope's total fail occurrences — answers "what are we failing on most?"
// which the trend/breakdown boxes above don't show on their own.
//
// Case Disposition is a forced exception: it always occupies #1 — even
// showing a 0 when it has no failures — rather than being omitted like a
// normal field would be with zero occurrences, since getting the case
// disposition wrong matters regardless of how often other fields fail and
// this box should always make it visible whether that's currently a problem
// or not. Only flagged critical (red styling) when its count is actually >0.
const QC_CRITICAL_ERROR_FIELD='Case Disposition';
function qcAnalyticsTopErrorFields(failedFields,limit){
  limit=limit||5;
  const counts={};
  failedFields.forEach(f=>{ counts[f]=(counts[f]||0)+1; });
  const total=failedFields.length;
  const toEntry=label=>({label,count:counts[label]||0,pct:total?Math.round((counts[label]||0)/total*100):0});
  const criticalCount=counts[QC_CRITICAL_ERROR_FIELD]||0;
  const rest=Object.keys(counts)
    .filter(label=>label!==QC_CRITICAL_ERROR_FIELD)
    .map(toEntry)
    .sort((a,b)=>b.count-a.count);
  const result=[Object.assign(toEntry(QC_CRITICAL_ERROR_FIELD),{critical:criticalCount>0})];
  result.push(...rest.slice(0,Math.max(limit-result.length,0)));
  return result;
}
function qcSortByScoreDesc(items){
  return items.slice().sort((a,b)=>(b.avgScore===null?-1:b.avgScore)-(a.avgScore===null?-1:a.avgScore));
}
function qcSortByErrorsDesc(items){
  return items.slice().sort((a,b)=>b.totalErrors-a.totalErrors);
}
function qcSortByNameAsc(items){
  return items.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

const QC_MONTH_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Parses a plain "yyyy-MM-dd" string by hand rather than `new Date(d)` —
// the latter parses as UTC midnight then reformats in the *viewer's* local
// timezone, which can silently roll the date back a day west of UTC. This
// is purely string slicing, so it can never drift.
function qcShortDate(d){
  const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(d||'');
  if(!m) return d||'—';
  return QC_MONTH_ABBR[parseInt(m[2],10)-1]+' '+parseInt(m[3],10);
}
function qcTruncateLabel(s,maxChars){
  s=s||'';
  return s.length>maxChars ? s.slice(0,maxChars-1)+'…' : s;
}
// Rounds an axis max up to a "nice" number (1/2/5×10^n) and picks a matching
// step, so ticks read like 0,5,10,15 instead of 0,4.33,8.66,13 — mirrors
// what D3/most charting libraries call "nice" tick generation.
// Multiplying/dividing floats like 3*0.2 produces binary-floating-point
// noise (0.6000000000000001) — round it away before it ever reaches a tick
// label. 6 decimal places is far past any scale this chart ever plots at.
function qcRoundClean(n){
  return Math.round(n*1e6)/1e6;
}
function qcNiceAxisMax(rawMax){
  if(rawMax<=0) return {max:4,step:1};
  const rough=rawMax/4;
  const mag=Math.pow(10,Math.floor(Math.log10(rough)));
  const norm=rough/mag;
  const niceNorm=norm<=1?1:norm<=2?2:norm<=5?5:10;
  const step=qcRoundClean(niceNorm*mag);
  return {max:qcRoundClean(Math.ceil(rawMax/step)*step),step};
}

// SVG line graph of a group's error count trend, one point per calendar
// date (see qcAggregateBy) with a real axis — Y-axis ticks/gridlines on the
// left, date labels along the bottom — rather than a bare unlabeled squiggle.
// Used both inline (small opts) and in the expand modal (large opts).
// points: [{label, value}] — a generic x/y pair (not necessarily a date; see
// qcAnalyticsTrendPoints below, which decides whether "label" is a date, a
// team leader/agent name, or an individual audit depending on the level and
// whether a single day or a range is selected).
function qcAnalyticsLineChartSvg(points,cls,opts){
  opts=opts||{};
  const w=opts.width||220,h=opts.height||120;
  // marginT is taller than the axis strictly needs — the value label sitting
  // above each dot needs headroom too, or a point at/near the axis max would
  // get its label clipped off the top of the chart.
  const marginL=opts.marginL||26,marginB=opts.marginB||18,marginT=opts.marginT||22,marginR=opts.marginR||10;
  const plotW=w-marginL-marginR,plotH=h-marginT-marginB;
  const fontSize=opts.fontSize||8.5;
  const dotR=opts.dotR||6,hitR=Math.max(opts.hitR||7,dotR+2),strokeWidth=opts.strokeWidth||1;
  const strokeColor={pass:'#22c55e',warn:'#f59e0b',fail:'#ef4444',na:'#cbd5e1'}[cls]||'#94a3b8';

  if(!points||points.length===0){
    return `<svg class="qc-analytics-linechart" viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" font-size="${fontSize+1}" fill="#b6bfd1">No data</text></svg>`;
  }
  const vals=points.map(p=>p.value);
  const rawMax=Math.max.apply(null,vals);
  const {max:axisMax,step}=qcNiceAxisMax(rawMax);
  const tickCount=Math.round(axisMax/step);
  const yAt=v=>marginT+plotH-(axisMax>0?(v/axisMax)*plotH:0);

  let axisSvg='';
  for(let t=0;t<=tickCount;t++){
    const val=qcRoundClean(t*step),y=yAt(val);
    axisSvg+=`<line x1="${marginL}" y1="${y.toFixed(1)}" x2="${w-marginR}" y2="${y.toFixed(1)}" stroke="#eef1f8" stroke-width="1"/>`;
    axisSvg+=`<text x="${marginL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="${fontSize}" fill="#94a3b8">${val}</text>`;
  }
  axisSvg+=`<line x1="${marginL}" y1="${marginT}" x2="${marginL}" y2="${h-marginB}" stroke="#e2e6f0" stroke-width="1"/>`;
  axisSvg+=`<line x1="${marginL}" y1="${h-marginB}" x2="${w-marginR}" y2="${h-marginB}" stroke="#e2e6f0" stroke-width="1"/>`;

  const n=points.length;
  const xAt=i=>marginL+(n>1?i*(plotW/(n-1)):plotW/2);
  // Thin out x labels so they don't overlap when there are many points —
  // always keep the first and last so the range's boundaries stay visible.
  const minSpacing=opts.minLabelSpacing||30;
  const maxLabels=Math.max(2,Math.floor(plotW/minSpacing));
  const labelEvery=Math.max(1,Math.ceil(n/maxLabels));
  let xLabelsSvg='';
  points.forEach((p,i)=>{
    if(i%labelEvery===0||i===n-1){
      xLabelsSvg+=`<text x="${xAt(i).toFixed(1)}" y="${h-3}" text-anchor="middle" font-size="${fontSize}" fill="#94a3b8">${escHtml(qcTruncateLabel(p.label,opts.xLabelMaxChars||8))}</text>`;
    }
  });

  const dotLabel=p=>p.label+': '+p.value+' error'+(p.value!==1?'s':'');
  const valueLabelAt=(x,y,v)=>`<text x="${x.toFixed(1)}" y="${(y-dotR-4).toFixed(1)}" text-anchor="middle" font-size="${fontSize}" font-weight="700" fill="${strokeColor}">${v}</text>`;
  if(n===1){
    const y=yAt(points[0].value);
    return `<svg class="qc-analytics-linechart" viewBox="0 0 ${w} ${h}">${axisSvg}
      <line x1="${marginL}" y1="${y.toFixed(1)}" x2="${w-marginR}" y2="${y.toFixed(1)}" stroke="${strokeColor}" stroke-width="${strokeWidth}"/>
      <circle cx="${xAt(0).toFixed(1)}" cy="${y.toFixed(1)}" r="${hitR}" fill="transparent"><title>${dotLabel(points[0])}</title></circle>
      <circle cx="${xAt(0).toFixed(1)}" cy="${y.toFixed(1)}" r="${dotR}" fill="${strokeColor}" style="pointer-events:none"/>
      ${valueLabelAt(xAt(0),y,points[0].value)}
      ${xLabelsSvg}
    </svg>`;
  }
  const coords=points.map((p,i)=>[xAt(i),yAt(p.value)]);
  const path=coords.map((c,i)=>(i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const dots=coords.map((c,i)=>`<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${hitR}" fill="transparent"><title>${dotLabel(points[i])}</title></circle><circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="${dotR}" fill="${strokeColor}" style="pointer-events:none"/>`).join('');
  const valueLabels=coords.map((c,i)=>valueLabelAt(c[0],c[1],points[i].value)).join('');
  return `<svg class="qc-analytics-linechart" viewBox="0 0 ${w} ${h}">${axisSvg}
    <path d="${path}" fill="none" stroke="${strokeColor}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${valueLabels}
    ${xLabelsSvg}
  </svg>`;
}

// SVG bar chart with the same left-side Y-axis treatment as the line chart
// above, generalized over {label,value} pairs so it serves the "Errors by
// X" breakdown, the Agent-level "by Audit Date" breakdown, AND the 2-bar
// Asked-vs-Documented box — one renderer instead of three near-duplicates.
function qcAnalyticsBarChartSvg(bars,opts){
  opts=opts||{};
  const w=opts.width||220,h=opts.height||120;
  // marginT leaves headroom for the value label sitting above each bar — a
  // bar reaching the axis max would otherwise have its label clipped off.
  const marginL=opts.marginL||26,marginB=opts.marginB||26,marginT=opts.marginT||18,marginR=opts.marginR||10;
  const plotW=w-marginL-marginR,plotH=h-marginT-marginB;
  const fontSize=opts.fontSize||8.5;
  const barColor=opts.barColor||'#6366f1';
  const labelMaxChars=opts.labelMaxChars||9;

  if(!bars||!bars.length){
    return `<svg class="qc-analytics-barchart" viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" font-size="${fontSize+1}" fill="#b6bfd1">No data</text></svg>`;
  }
  const rawMax=Math.max.apply(null,bars.map(b=>b.value))||0;
  const {max:axisMax,step}=qcNiceAxisMax(rawMax);
  const tickCount=Math.round(axisMax/step);

  let axisSvg='';
  for(let t=0;t<=tickCount;t++){
    const val=qcRoundClean(t*step),y=marginT+plotH-(axisMax>0?(val/axisMax)*plotH:0);
    axisSvg+=`<line x1="${marginL}" y1="${y.toFixed(1)}" x2="${w-marginR}" y2="${y.toFixed(1)}" stroke="#eef1f8" stroke-width="1"/>`;
    axisSvg+=`<text x="${marginL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="${fontSize}" fill="#94a3b8">${val}</text>`;
  }
  axisSvg+=`<line x1="${marginL}" y1="${marginT}" x2="${marginL}" y2="${h-marginB}" stroke="#e2e6f0" stroke-width="1"/>`;
  axisSvg+=`<line x1="${marginL}" y1="${h-marginB}" x2="${w-marginR}" y2="${h-marginB}" stroke="#e2e6f0" stroke-width="1"/>`;

  const n=bars.length;
  const slot=plotW/n;
  const barW=Math.min(slot*0.55,opts.maxBarWidth||30);
  let barsSvg='',labelsSvg='';
  bars.forEach((b,i)=>{
    const cx=marginL+slot*(i+0.5);
    const barH=axisMax>0?(b.value/axisMax)*plotH:0;
    const y=marginT+plotH-barH;
    barsSvg+=`<rect x="${(cx-barW/2).toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(barH,1).toFixed(1)}" rx="2" fill="${barColor}"><title>${escHtml(b.label)}: ${b.value} error${b.value!==1?'s':''}</title></rect>`;
    barsSvg+=`<text x="${cx.toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="${fontSize}" font-weight="700" fill="${barColor}">${b.value}</text>`;
    labelsSvg+=`<text x="${cx.toFixed(1)}" y="${h-marginB+13}" text-anchor="middle" font-size="${fontSize}" fill="#94a3b8">${escHtml(qcTruncateLabel(b.label,labelMaxChars))}</text>`;
  });
  return `<svg class="qc-analytics-barchart" viewBox="0 0 ${w} ${h}">${axisSvg}${barsSvg}${labelsSvg}</svg>`;
}

function qcAnalyticsMultiSelectDropdownHtml(id,triggerId,label,items,selectedSet,registerFn,toggleFnName){
  const n=selectedSet.size;
  const optionsHtml=items.length?items.map(name=>{
    const idx=registerFn(name);
    return `<label class="qc-analytics-dropdown-option">
      <input type="checkbox" onchange="${toggleFnName}(${idx},this.checked)"${selectedSet.has(name)?' checked':''}>
      <span>${escHtml(name)}</span>
    </label>`;
  }).join(''):`<div class="qc-analytics-dropdown-empty">No items</div>`;
  return `<div class="qc-analytics-multiselect" id="${id}">
    <button type="button" class="qc-btn" id="${triggerId}" onclick="qcAnalyticsToggleDropdown('${id}')">${escHtml(label)} (${n}) &#9662;</button>
    <div class="qc-analytics-dropdown-panel">${optionsHtml}</div>
  </div>`;
}
// Only one dropdown panel open at a time; clicking its own trigger again closes it.
function qcAnalyticsToggleDropdown(id){
  const panel=document.querySelector('#'+id+' .qc-analytics-dropdown-panel');
  if(!panel) return;
  const wasOpen=panel.classList.contains('open');
  document.querySelectorAll('.qc-analytics-dropdown-panel.open').forEach(p=>p.classList.remove('open'));
  if(!wasOpen) panel.classList.add('open');
}
document.addEventListener('click',function(e){
  if(e.target.closest('.qc-analytics-multiselect')) return;
  document.querySelectorAll('.qc-analytics-dropdown-panel.open').forEach(p=>p.classList.remove('open'));
});

function qcAnalyticsToggleProgramSelect(idx,checked){
  const name=_qcAnalyticsProgramCheckboxTargets[idx];
  if(name==null) return;
  if(checked) _qcAnalyticsSelectedPrograms.add(name);
  else _qcAnalyticsSelectedPrograms.delete(name);
  const n=_qcAnalyticsSelectedPrograms.size;
  const trigger=document.getElementById('qcProgramDropdownTrigger');
  if(trigger) trigger.textContent='Select Programs ('+n+') ▾';
  const btn=document.getElementById('qcAnalyticsViewSelectedBtn');
  if(btn){ btn.style.display=n>0?'':'none'; btn.textContent='View Analytics for Selected ('+n+') ›'; }
  qcAnalyticsApplyCardFilters();
}
function qcAnalyticsViewSelectedPrograms(){
  if(_qcAnalyticsSelectedPrograms.size===0) return;
  _qcAnalyticsDrill={level:'multi',programs:Array.from(_qcAnalyticsSelectedPrograms),program:null,teamLeader:null,agent:null};
  const bodyEl=document.getElementById('qcAnalyticsBody');
  const cached=_qcAnalyticsCache[_qcAnalyticsKind];

}

// Pure DOM filter, not a re-render — re-rendering the whole body on every
// keystroke/checkbox click would blow away the search input's focus/cursor
// position. A card shows only if it matches the current search text AND
// (if anything is checked) is among the checked entities — checking boxes
// never rebuilds the cards, so a still-visible card's click-to-drill
// behavior is completely unaffected by filtering.
function qcAnalyticsApplyCardFilters(){
  const searchInput=document.querySelector('.qc-analytics-search-input');
  const q=(searchInput?searchInput.value:'').trim().toLowerCase();
  const isWorkflowAgentTab=_qcAnalyticsDrill.level==='kind'&&_qcAnalyticsWorkflowTab==='agent';
  const selectedSet=_qcAnalyticsDrill.level==='agent'?_qcAnalyticsSelectedAgents
    :isWorkflowAgentTab?_qcAnalyticsSelectedWorkflowAgents
    :_qcAnalyticsSelectedPrograms;
  document.querySelectorAll('.qc-analytics-card[data-entity-name]').forEach(card=>{
    const name=card.getAttribute('data-entity-name')||'';
    const matchesSearch=!q||name.toLowerCase().includes(q);
    const matchesSelection=selectedSet.size===0||selectedSet.has(name);
    // Team leader filter only applies on the workflow-level "By Agent" list —
    // an agent's card is tagged with every distinct team leader across their
    // audits (they can differ per program), so it stays visible if ANY of
    // its team leaders is checked.
    const matchesTL=!isWorkflowAgentTab||_qcAnalyticsWorkflowTLFilter.size===0
      ||(card.getAttribute('data-team-leaders')||'').split('|').some(tl=>_qcAnalyticsWorkflowTLFilter.has(tl));
    card.style.display=(matchesSearch&&matchesSelection&&matchesTL)?'':'none';
  });
}

function qcAnalyticsRowClick(idx){
  const t=_qcAnalyticsRowTargets[idx];
  if(!t)return;
  // Entering a team leader's Agent list fresh — clear any agent selection
  // left over from a previously-viewed team leader/program, since agent
  // names there could otherwise be misread as applying to this different scope.
  if(t.level==='agent') _qcAnalyticsSelectedAgents=new Set();
  _qcAnalyticsDrill={level:t.level,program:t.program||null,teamLeader:t.teamLeader||null,agent:t.agent||null};
  const bodyEl=document.getElementById('qcAnalyticsBody');
  const cached=_qcAnalyticsCache[_qcAnalyticsKind];
  if(bodyEl&&cached) bodyEl.innerHTML=renderQCAnalyticsBody(cached.data);
}

function qcAnalyticsSetDateMode(mode){
  _qcAnalyticsDateFilter.mode=mode;
  const bodyEl=document.getElementById('qcAnalyticsBody');
  const cached=_qcAnalyticsCache[_qcAnalyticsKind];
  if(bodyEl&&cached) bodyEl.innerHTML=renderQCAnalyticsBody(cached.data);
}

function qcAnalyticsSetCustomDate(which,val){
  _qcAnalyticsDateFilter[which]=val;

  const cached=_qcAnalyticsCache[_qcAnalyticsKind];
  if(bodyEl&&cached) bodyEl.innerHTML=renderQCAnalyticsBody(cached.data);
}

function qcAnalyticsFilterByDate(audits){
  const f=_qcAnalyticsDateFilter;
  if(f.mode==='all') return audits;
  const today=new Date(); today.setHours(0,0,0,0);
  let from=null,to=null;
  if(f.mode==='today'){ from=new Date(today); to=new Date(today); }
  else if(f.mode==='7d'){ from=new Date(today); from.setDate(from.getDate()-6); to=new Date(today); }
  else if(f.mode==='30d'){ from=new Date(today); from.setDate(from.getDate()-29); to=new Date(today); }
  else if(f.mode==='custom'){
    if(f.from) from=new Date(f.from+'T00:00:00');
    if(f.to) to=new Date(f.to+'T00:00:00');
  }
  return audits.filter(a=>{
    if(!a.auditDate) return false;
    const d=new Date((''+a.auditDate).slice(0,10)+'T00:00:00');
    if(isNaN(d.getTime())) return false;
    if(from&&d<from) return false;
    if(to&&d>to) return false;
    return true;
  });
}

// "Today" or a custom range narrowed to one date both mean the Error Trend
// box should switch from a per-day trend to a within-that-day breakdown
// (see qcAnalyticsTrendPoints) — everything else (All Time/7d/30d/a wider
// custom range) keeps the per-day trend.
function qcAnalyticsIsSingleDayFilter(){
  const f=_qcAnalyticsDateFilter;
  if(f.mode==='today') return true;
  if(f.mode==='custom'&&f.from&&f.to&&f.from===f.to) return true;
  return false;
}

function qcAnalyticsDateControlsHtml(){
  const f=_qcAnalyticsDateFilter;
  const modes=[['all','All Time'],['today','Today'],['7d','Last 7 Days'],['30d','Last 30 Days'],['custom','Custom']];
  const buttons=modes.map(([m,label])=>`<button class="qc-btn${f.mode===m?' primary':''}" style="padding:5px 10px;font-size:11.5px" onclick="qcAnalyticsSetDateMode('${m}')">${label}</button>`).join('');
  const customInputs=f.mode==='custom'?`
    <input type="date" value="${escHtml(f.from)}" onchange="qcAnalyticsSetCustomDate('from',this.value)">
    <span style="color:#94a3b8;font-size:12px">to</span>
    <input type="date" value="${escHtml(f.to)}" onchange="qcAnalyticsSetCustomDate('to',this.value)">
  `:'';
  return `<div class="qc-analytics-date-controls">${buttons}${customInputs}</div>`;
}

function qcAnalyticsBreadcrumbHtml(){
  const d=_qcAnalyticsDrill;
  const items=[];
  const kindLabel=QC_KIND_META[_qcAnalyticsKind].shortLabel;
  const kindIdx=qcAnalyticsRegisterTarget({level:'kind'});
  items.push(`<span class="qc-breadcrumb-item${d.level==='kind'?' active':''}" onclick="qcAnalyticsRowClick(${kindIdx})">${escHtml(kindLabel)}</span>`);
  // Reached via the workflow-level "By Agent" tab, which flattens every
  // program for this kind — there's no single "All Programs" node in this
  // path, so show a "By Agent" crumb pointing back to the kind level instead
  // (the workflow tab stays 'agent' since qcAnalyticsRowClick doesn't touch it).
  const isWorkflowAgentPath=d.level==='workflowAgentDetail'||d.level==='workflowMultiAgent';
  if(d.level!=='kind'&&!isWorkflowAgentPath){
    const rootIdx=qcAnalyticsRegisterTarget({level:'program'});
    items.push(`<span class="qc-breadcrumb-item${d.level==='program'?' active':''}" onclick="qcAnalyticsRowClick(${rootIdx})">All Programs</span>`);
  }
  if(isWorkflowAgentPath){
    items.push(`<span class="qc-breadcrumb-item" onclick="qcAnalyticsRowClick(${kindIdx})">By Agent</span>`);
  }
  if(d.level==='multi'){
    items.push(`<span class="qc-breadcrumb-item active">Selected Programs (${(d.programs||[]).length})</span>`);
  }
  if(d.level==='workflowMultiAgent'){
    items.push(`<span class="qc-breadcrumb-item active">Selected Agents (${(d.agents||[]).length})</span>`);
  }
  if(d.program){
    const idx=qcAnalyticsRegisterTarget({level:'teamLeader',program:d.program});
    items.push(`<span class="qc-breadcrumb-item${d.level==='teamLeader'?' active':''}" onclick="qcAnalyticsRowClick(${idx})">${escHtml(d.program)}</span>`);
  }
  if(d.teamLeader){
    const idx=qcAnalyticsRegisterTarget({level:'agent',program:d.program,teamLeader:d.teamLeader});
    items.push(`<span class="qc-breadcrumb-item${d.level==='agent'?' active':''}" onclick="qcAnalyticsRowClick(${idx})">${escHtml(d.teamLeader)}</span>`);
  }
  if(d.level==='multiAgent'){
    items.push(`<span class="qc-breadcrumb-item active">Selected Agents (${(d.agents||[]).length})</span>`);
  }
  if(d.agent){
    items.push(`<span class="qc-breadcrumb-item active">${escHtml(d.agent)}</span>`);
  }
  return `<div class="qc-breadcrumb">${items.join('<span class="qc-breadcrumb-sep">&#8250;</span>')}</div>`;
}

function qcAnalyticsSummaryStrip(audits,groupCount,groupLabel){
  const scored=audits.map(a=>parseFloat(a.overallScore)).filter(n=>!isNaN(n));
  const avg=scored.length?Math.round(scored.reduce((s,n)=>s+n,0)/scored.length):null;
  const cls=avg===null?'na':avg<70?'fail':avg<90?'warn':'pass';
  return `<div class="qc-score-strip">
    <div class="qc-score-big"><div class="qc-score-num pass">${audits.length}</div><div class="qc-score-caption">Audits (filtered)</div></div>
    <div class="qc-score-divider"></div>
    <div class="qc-score-big"><div class="qc-score-num ${cls}">${avg===null?'—':avg+'%'}</div><div class="qc-score-caption">Avg Score</div></div>
    <div class="qc-score-divider"></div>
    <div class="qc-score-big"><div class="qc-score-num na">${groupCount}</div><div class="qc-score-caption">${escHtml(groupLabel)}</div></div>
  </div>`;
}

function qcAnalyticsEmptyRow(){
  return `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12.5px">No audits match this date range.</div>`;
}

// Builds the {label,value} points the Error Trend box plots. Rule: a single
// selected day breaks down by whatever's one level further down (Team
// Leader/Agent/individual audit) so you can see who/what drove that day's
// errors; a multi-day range (or All Time) shows the per-day average instead,
// so day-to-day trend isn't skewed by days with more or fewer audits.
function qcAnalyticsTrendFromDates(errorTrend){
  return errorTrend.map(p=>({label:qcShortDate(p.date),value:p.errors}));
}
function qcAnalyticsTrendFromChildren(children){
  return children.map(c=>({label:c.name,value:c.avgErrors}));
}
function qcAnalyticsTrendFromAudits(auditsForEntity){
  const sorted=auditsForEntity.slice().sort((a,b)=>(Date.parse(a.timestamp)||0)-(Date.parse(b.timestamp)||0));
  return sorted.map((a,i)=>({label:'#'+(i+1),value:parseFloat(a.errorCount)||0}));
}

// One card per entity (Program / Team Leader / Agent): a header with name +
// score + audit count, and four boxes underneath — the error trend (see
// above), a bar breakdown of total errors by whichever grouping is one level
// further down, the 5 questions most often marked "fail", and an Asked vs
// Documented fail-type comparison.
// meta is optional and only used by the workflow-level "By Agent" list today —
// {subtitle: text shown next to the name (e.g. team leader(s)), teamLeaders:
// array stamped as a data-team-leaders attribute for the live TL filter to
// read}. Every other call site omits it and gets the plain card unchanged.
function qcAnalyticsCardHtml(item,childItems,childLabel,trendPoints,trendLabel,target,meta){
  const pct=item.avgScore===null?0:item.avgScore;
  const cls=item.avgScore===null?'na':pct<70?'fail':pct<90?'warn':'pass';
  let clickAttr='',arrow='';
  if(target){
    const idx=qcAnalyticsRegisterTarget(target);
    clickAttr=` onclick="qcAnalyticsRowClick(${idx})"`;
    arrow='<span class="qc-analytics-arrow">&#8250;</span>';
  }
  const subtitleHtml=meta&&meta.subtitle?`<span class="qc-analytics-card-subtitle">${escHtml(meta.subtitle)}</span>`:'';
  const tlAttr=meta&&meta.teamLeaders&&meta.teamLeaders.length?` data-team-leaders="${escHtml(meta.teamLeaders.join('|'))}"`:'';
  const trendIdx=qcAnalyticsRegisterChart({type:'trend',points:trendPoints,cls,title:item.name+' — '+trendLabel});
  const barsIdx=qcAnalyticsRegisterChart({type:'bars',bars:childItems.map(c=>({label:c.name,value:c.totalErrors})),title:item.name+' — Errors by '+childLabel});
  const axisIdx=qcAnalyticsRegisterChart({type:'bars',bars:[{label:'Asked',value:item.askedFails||0},{label:'Documented',value:item.documentedFails||0}],title:item.name+' — Asked vs Documented Fails'});
  const topFieldsIdx=qcAnalyticsRegisterChart({type:'topfields',failedFields:item.failedFields,title:item.name+' — Top 10 Error Fields'});
  const expandBtn=idx=>`<span class="qc-analytics-expand-btn" onclick="event.stopPropagation();qcAnalyticsExpandChart(${idx})">&#10530; Expand</span>`;
  return `<div class="qc-analytics-card${target?' qc-analytics-card-clickable':''}" data-entity-name="${escHtml(item.name)}"${tlAttr}${clickAttr}>
    <div class="qc-analytics-card-hdr">
      <span class="qc-analytics-card-title" title="${escHtml(item.name)}">${escHtml(item.name)}</span>
      ${subtitleHtml}
      <span class="qc-analytics-score ${cls}">${item.avgScore===null?'—':item.avgScore+'%'}</span>
      <span class="qc-analytics-meta">${item.count} audit${item.count!==1?'s':''} &middot; ${item.avgErrors} avg errors</span>
      ${arrow}
    </div>
    <div class="qc-analytics-card-boxes">
      <div class="qc-analytics-card-box">
        <div class="qc-analytics-card-box-label">${escHtml(trendLabel)}${expandBtn(trendIdx)}</div>
        <div class="qc-analytics-spark-wrap">${qcAnalyticsLineChartSvg(trendPoints,cls)}</div>
      </div>
      <div class="qc-analytics-card-box">
        <div class="qc-analytics-card-box-label">Errors by ${escHtml(childLabel)}${expandBtn(barsIdx)}</div>
        ${qcAnalyticsMiniBarChartHtml(childItems,childLabel)}
      </div>
      <div class="qc-analytics-card-box">
        <div class="qc-analytics-card-box-label">Top 5 Error Fields${expandBtn(topFieldsIdx)}</div>
        ${qcAnalyticsTopFieldsBoxHtml(item.failedFields)}
      </div>
      <div class="qc-analytics-card-box">
        <div class="qc-analytics-card-box-label">Asked vs Documented Fails${expandBtn(axisIdx)}</div>
        ${qcAnalyticsAxisBarChartHtml(item.askedFails,item.documentedFails)}
      </div>
    </div>
  </div>`;
}

// Whether errors mostly came from not asking the question at all (Asked
// fail) or from asking it but not writing it down (Documented fail) changes
// the coaching — the two need very different fixes — so this is its own box
// rather than folded into the field-level breakdown above.
function qcAnalyticsAxisBarChartHtml(askedFails,documentedFails){
  askedFails=askedFails||0; documentedFails=documentedFails||0;
  if(!askedFails&&!documentedFails) return `<div class="qc-analytics-chart-empty">No errors recorded</div>`;
  return qcAnalyticsBarChartSvg([{label:'Asked',value:askedFails},{label:'Documented',value:documentedFails}]);
}

// Shared row markup for both the compact (top 5) box and the expand modal
// (top 10) — count of occurrences over whatever date range is selected, not
// a percentage, since "failed 12 times" is the actionable number; the % of
// total was relative to a shrinking/growing denominator as the range changed
// and read as more precise than it actually was.
function qcAnalyticsTopFieldsListHtml(top){
  if(!top.length) return `<div class="qc-analytics-chart-empty">No errors recorded</div>`;
  return `<div class="qc-analytics-topfields-list">${top.map((f,i)=>`
    <div class="qc-analytics-topfields-row${f.critical?' qc-analytics-topfields-critical':''}" title="${escHtml(f.label)}${f.critical?' — always shown when present':''}">
      <span class="qc-analytics-topfields-rank">${i+1}</span>
      <span class="qc-analytics-topfields-label">${escHtml(f.label)}</span>
      <span class="qc-analytics-topfields-count">${f.count}</span>
    </div>`).join('')}</div>`;
}
function qcAnalyticsTopFieldsBoxHtml(failedFields){
  return qcAnalyticsTopFieldsListHtml(qcAnalyticsTopErrorFields(failedFields||[],5));
}

function qcAnalyticsMiniBarChartHtml(children,childLabel){
  if(!children||!children.length) return `<div class="qc-analytics-chart-empty">No ${escHtml(childLabel.toLowerCase())} data</div>`;
  return qcAnalyticsBarChartSvg(children.map(c=>({label:c.name,value:c.totalErrors})));
}

let _qcAnalyticsChartTargets=[];
function qcAnalyticsRegisterChart(target){
  _qcAnalyticsChartTargets.push(target);
  return _qcAnalyticsChartTargets.length-1;
}
// Compact inline charts trade detail for space; the expand modal re-renders
// the exact same data at a much larger size with roomier fonts/margins so
// every date/label/tick is actually legible instead of a squint-and-guess.
function qcAnalyticsExpandChart(idx){
  const t=_qcAnalyticsChartTargets[idx];
  if(!t) return;
  const bigOpts={width:760,height:360,marginL:44,marginB:36,fontSize:12,strokeWidth:1.5,dotR:3,hitR:11,minLabelSpacing:60,labelMaxChars:20,maxBarWidth:60};
  const chartHtml=t.type==='trend'
    ? qcAnalyticsLineChartSvg(t.points,t.cls,bigOpts)
    : t.type==='topfields'
    ? qcAnalyticsTopFieldsListHtml(qcAnalyticsTopErrorFields(t.failedFields||[],10))
    : qcAnalyticsBarChartSvg(t.bars,bigOpts);
  const overlay=document.createElement('div');
  overlay.id='qcChartModalOverlay';
  overlay.onclick=function(e){ if(e.target===overlay) qcAnalyticsCloseChartModal(); };
  overlay.innerHTML=`<div class="qc-chart-modal-box">
    <div class="qc-chart-modal-hdr"><span>${escHtml(t.title)}</span><button onclick="qcAnalyticsCloseChartModal()">&#10005;</button></div>
    <div class="qc-chart-modal-body">${chartHtml}</div>
  </div>`;
  document.body.appendChild(overlay);
}
function qcAnalyticsCloseChartModal(){
  const el=document.getElementById('qcChartModalOverlay');
  if(el) el.remove();
}

function renderQCAnalyticsBody(rawAudits){
  _qcAnalyticsRowTargets=[];
  _qcAnalyticsChartTargets=[];
  _qcAnalyticsProgramCheckboxTargets=[];
  _qcAnalyticsAgentCheckboxTargets=[];
  _qcAnalyticsWorkflowAgentCheckboxTargets=[];
  _qcAnalyticsWorkflowTLCheckboxTargets=[];
  if(!rawAudits||!rawAudits.length){
    return `${qcAnalyticsDateControlsHtml()}<div style="padding:40px;text-align:center;color:#94a3b8">No saved audits yet for this program type.</div>`;
  }
  const audits=qcAnalyticsFilterByDate(rawAudits);
  const drill=_qcAnalyticsDrill;
  const dateControls=qcAnalyticsDateControlsHtml();
  const breadcrumb=qcAnalyticsBreadcrumbHtml();
  const isSingleDay=qcAnalyticsIsSingleDayFilter();

  if(drill.level==='kind'){
    const kindLabel=QC_KIND_META[_qcAnalyticsKind].shortLabel;
    // One agent can work across multiple programs — the "By Program" tab is
    // today's single kind-wide Overview card; "By Agent" flattens every
    // agent in this workflow (regardless of which program(s) they're on)
    // into its own list, mirroring the "By Program"/"By Agent" list pattern
    // used one level down, just scoped to the whole kind instead of one program.
    const workflowTabsHtml=`<div class="tabs" style="margin-bottom:14px">
      <div class="tab${_qcAnalyticsWorkflowTab==='program'?' active-mm':''}" onclick="qcAnalyticsSetWorkflowTab('program')">By Program</div>
      <div class="tab${_qcAnalyticsWorkflowTab==='agent'?' active-mm':''}" onclick="qcAnalyticsSetWorkflowTab('agent')">By Agent</div>
    </div>`;
    if(_qcAnalyticsWorkflowTab==='agent'){
      const byAgent=qcSortByScoreDesc(qcAggregateBy(audits,'agent'));
      const cards=byAgent.map(item=>{
        const ownAudits=audits.filter(a=>(a.agent||'')===item.name);
        const children=qcSortByErrorsDesc(qcAggregateBy(ownAudits,'program'));
        const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
        const trendLabel=isSingleDay?'Avg Errors by Program':'Avg Errors by Day';
        // An agent can report to different team leaders on different
        // programs — collect every distinct one they've had, rather than
        // assuming a single fixed TL, so the badge never silently drops one.
        const teamLeaders=Array.from(new Set(ownAudits.map(a=>a.teamLeader).filter(Boolean))).sort();
        const subtitle=teamLeaders.length?'TL: '+teamLeaders.join(', '):'';
        return qcAnalyticsCardHtml(item,children,'Program',trendPoints,trendLabel,{level:'workflowAgentDetail',agent:item.name},{subtitle,teamLeaders});
      }).join('');
      const agentNames=byAgent.map(a=>a.name);
      const agentDropdown=qcAnalyticsMultiSelectDropdownHtml('qcWorkflowAgentDropdown','qcWorkflowAgentDropdownTrigger','Select Agents',agentNames,_qcAnalyticsSelectedWorkflowAgents,qcAnalyticsRegisterWorkflowAgentCheckbox,'qcAnalyticsToggleWorkflowAgentSelect');
      const selectedCount=_qcAnalyticsSelectedWorkflowAgents.size;
      const allTeamLeaders=Array.from(new Set(audits.map(a=>a.teamLeader).filter(Boolean))).sort();
      const tlDropdown=qcAnalyticsMultiSelectDropdownHtml('qcWorkflowTLDropdown','qcWorkflowTLDropdownTrigger','Filter by Team Leader',allTeamLeaders,_qcAnalyticsWorkflowTLFilter,qcAnalyticsRegisterWorkflowTLCheckbox,'qcAnalyticsToggleWorkflowTLFilterSelect');
      return `${dateControls}${breadcrumb}${workflowTabsHtml}${qcAnalyticsSummaryStrip(audits,byAgent.length,'Agents')}
      <div class="qc-analytics-search-row">
        <input type="text" class="qc-analytics-search-input" placeholder="Search agents by name…" oninput="qcAnalyticsApplyCardFilters()">
        ${agentDropdown}
        ${tlDropdown}
        <button id="qcAnalyticsViewSelectedWorkflowAgentsBtn" class="qc-btn primary" style="display:${selectedCount>0?'':'none'}" onclick="qcAnalyticsViewSelectedWorkflowAgents()">View Analytics for Selected (${selectedCount}) &rsaquo;</button>
        <button class="qc-btn" onclick="printToPDF('qcAnalytics')">&#128196; Download PDF</button>
      </div>
      <div class="section"><div class="section-header hdr-benefit" onclick="toggleSection(this)"><span>By Agent (All Programs)</span><span class="chevron open">&#9654;</span></div>
        <div class="section-body">${byAgent.length?cards:qcAnalyticsEmptyRow()}</div>
      </div>`;
    }
    const item=qcAggregateAll(audits,kindLabel);
    const children=qcSortByErrorsDesc(qcAggregateBy(audits,'program'));
    const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
    const trendLabel=isSingleDay?'Avg Errors by Program':'Avg Errors by Day';
    const card=qcAnalyticsCardHtml(item,children,'Program',trendPoints,trendLabel,{level:'program'});
    return `${dateControls}${breadcrumb}${workflowTabsHtml}${qcAnalyticsSummaryStrip(audits,children.length,'Programs')}
    <div class="section"><div class="section-header hdr-plan" onclick="toggleSection(this)"><span>${escHtml(kindLabel)} Overview</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${card}</div>
    </div>`;
  }

  if(drill.level==='teamLeader'){
    const scoped=audits.filter(a=>(a.program||'')===drill.program);
    const byTL=qcSortByScoreDesc(qcAggregateBy(scoped,'teamLeader'));
    const cards=byTL.map(item=>{
      const children=qcSortByErrorsDesc(qcAggregateBy(scoped.filter(a=>(a.teamLeader||'')===item.name),'agent'));
      const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
      const trendLabel=isSingleDay?'Avg Errors by Agent':'Avg Errors by Day';
      return qcAnalyticsCardHtml(item,children,'Agent',trendPoints,trendLabel,{level:'agent',program:drill.program,teamLeader:item.name});
    }).join('');
    return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(scoped,byTL.length,'Team Leaders')}
    <div class="qc-analytics-search-row"><button class="qc-btn" onclick="printToPDF('qcAnalytics')">&#128196; Download PDF</button></div>
    <div class="section"><div class="section-header hdr-opening" onclick="toggleSection(this)"><span>By Team Leader</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${byTL.length?cards:qcAnalyticsEmptyRow()}</div>
    </div>`;
  }

  if(drill.level==='agent'){
    const scoped=audits.filter(a=>(a.program||'')===drill.program&&(a.teamLeader||'')===drill.teamLeader);
    const byAgent=qcSortByScoreDesc(qcAggregateBy(scoped,'agent'));
    const cards=byAgent.map(item=>{
      const ownAudits=scoped.filter(a=>(a.agent||'')===item.name);
      // Sort by the raw "yyyy-MM-dd" name first (sorts correctly chronologically),
      // then reformat to "Jul 15" for display — reformatting before sorting would
      // sort alphabetically and put "Jul 15" before "Jul 5".
      const children=qcSortByNameAsc(qcAggregateBy(ownAudits,'auditDate'))
        .map(c=>({...c,name:qcShortDate(c.name)}));
      // Agent is the bottom of the drill hierarchy — there's no further named
      // grouping to break a single day down by, so it breaks down by each
      // individual audit instead (chronological within the day), rather than
      // by team leader/agent the way Program/Team Leader do.
      const trendPoints=isSingleDay?qcAnalyticsTrendFromAudits(ownAudits):qcAnalyticsTrendFromDates(item.errorTrend);
      const trendLabel=isSingleDay?'Errors Throughout the Day':'Avg Errors by Day';
      return qcAnalyticsCardHtml(item,children,'Audit Date',trendPoints,trendLabel,{level:'detail',program:drill.program,teamLeader:drill.teamLeader,agent:item.name});
    }).join('');
    const agentNames=byAgent.map(a=>a.name);
    const agentDropdown=qcAnalyticsMultiSelectDropdownHtml('qcAgentDropdown','qcAgentDropdownTrigger','Select Agents',agentNames,_qcAnalyticsSelectedAgents,qcAnalyticsRegisterAgentCheckbox,'qcAnalyticsToggleAgentSelect');
    const selectedAgentCount=_qcAnalyticsSelectedAgents.size;
    return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(scoped,byAgent.length,'Agents')}
    <div class="qc-analytics-search-row">
      <input type="text" class="qc-analytics-search-input" placeholder="Search agents by name…" oninput="qcAnalyticsApplyCardFilters()">
      ${agentDropdown}
      <button id="qcAnalyticsViewSelectedAgentsBtn" class="qc-btn primary" style="display:${selectedAgentCount>0?'':'none'}" onclick="qcAnalyticsViewSelectedAgents()">View Analytics for Selected (${selectedAgentCount}) &rsaquo;</button>
      <button class="qc-btn" onclick="printToPDF('qcAnalytics')">&#128196; Download PDF</button>
    </div>
    <div class="section"><div class="section-header hdr-benefit" onclick="toggleSection(this)"><span>By Agent</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${byAgent.length?cards:qcAnalyticsEmptyRow()}</div>
    </div>`;
  }

  if(drill.level==='detail'){
    const scoped=audits.filter(a=>(a.program||'')===drill.program&&(a.teamLeader||'')===drill.teamLeader&&(a.agent||'')===drill.agent)
      .slice().sort((a,b)=>(b.auditDate||'').localeCompare(a.auditDate||''));
    const auditRows=scoped.map(a=>{
      const score=a.overallScore===''||a.overallScore==null?null:Math.round(parseFloat(a.overallScore));
      const cls=score===null?'na':score<70?'fail':score<90?'warn':'pass';
      const erroredFields=Array.isArray(a.failedFields)?Array.from(new Set(a.failedFields)):[];
      const erroredFieldsText=erroredFields.length?erroredFields.join(', '):'—';

    // hierarchy node, so there's nowhere further to drill from here.

    <div class="section"><div class="section-header hdr-plan" onclick="toggleSection(this)"><span>Selected Programs</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${card}</div>
    </div>`;
  }

  if(drill.level==='multiAgent'){
    const selected=new Set(drill.agents||[]);
    const scoped=audits.filter(a=>(a.program||'')===drill.program&&(a.teamLeader||'')===drill.teamLeader&&selected.has(a.agent||''));
    const label='Selected Agents ('+selected.size+')';
    const item=qcAggregateAll(scoped,label);
    const children=qcSortByErrorsDesc(qcAggregateBy(scoped,'agent'));
    const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
    const trendLabel=isSingleDay?'Avg Errors by Agent':'Avg Errors by Day';
    // No target — an arbitrary multi-agent selection isn't a real hierarchy
    // node, so there's nowhere further to drill from here.
    const card=qcAnalyticsCardHtml(item,children,'Agent',trendPoints,trendLabel,null);
    return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(scoped,children.length,'Agents')}
    <div class="section"><div class="section-header hdr-opening" onclick="toggleSection(this)"><span>Selected Agents</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${card}</div>
    </div>`;
  }

  if(drill.level==='workflowAgentDetail'){
    // Not scoped to a single program/team leader — this agent's full history
    // spans every program they've worked on, which is the entire point of
    // the workflow-level "By Agent" view, so the table adds a Program column.
    const scoped=audits.filter(a=>(a.agent||'')===drill.agent)
      .slice().sort((a,b)=>(b.auditDate||'').localeCompare(a.auditDate||''));
    const auditRows=scoped.map(a=>{
      const score=a.overallScore===''||a.overallScore==null?null:Math.round(parseFloat(a.overallScore));
      const cls=score===null?'na':score<70?'fail':score<90?'warn':'pass';
      const erroredFields=Array.isArray(a.failedFields)?Array.from(new Set(a.failedFields)):[];
      const erroredFieldsText=erroredFields.length?erroredFields.join(', '):'—';
      return `<div class="qc-analytics-detail-row-wf">
        <div>${escHtml(a.auditDate||'—')}</div>
        <div title="${escHtml(a.program||'')}">${escHtml(a.program||'—')}</div>
        <div title="${escHtml(a.srNumber||'')}">${escHtml(a.srNumber||'—')}</div>
        <div title="${escHtml(a.payer||'')}">${escHtml(a.payer||'—')}</div>
        <div class="qc-analytics-score ${cls}">${score===null?'—':score+'%'}</div>
        <div>${a.errorCount===''||a.errorCount==null?'—':a.errorCount}</div>
        <div title="${escHtml(erroredFieldsText)}">${escHtml(erroredFieldsText)}</div>
        <div title="${escHtml(a.savedBy||'')}">${escHtml(a.auditor||'—')}</div>
      </div>`;
    }).join('');
    return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(scoped,scoped.length,'Audits')}
    <div class="section"><div class="section-header hdr-closing" onclick="toggleSection(this)"><span>Audit History — ${escHtml(drill.agent)} (All Programs)</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">
        <div class="qc-analytics-detail-hdr-wf"><span>Audit Date</span><span>Program</span><span>SR / Case #</span><span>Payer</span><span>Score</span><span># Errors</span><span>Errored Fields</span><span>Auditor</span></div>
        ${auditRows||qcAnalyticsEmptyRow()}
      </div>
    </div>`;
  }

  if(drill.level==='workflowMultiAgent'){
    const selected=new Set(drill.agents||[]);
    const scoped=audits.filter(a=>selected.has(a.agent||''));
    const label='Selected Agents ('+selected.size+')';
    const item=qcAggregateAll(scoped,label);
    const children=qcSortByErrorsDesc(qcAggregateBy(scoped,'agent'));
    const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
    const trendLabel=isSingleDay?'Avg Errors by Agent':'Avg Errors by Day';
    // No target — an arbitrary multi-agent selection isn't a real hierarchy
    // node, so there's nowhere further to drill from here.
    const card=qcAnalyticsCardHtml(item,children,'Agent',trendPoints,trendLabel,null);
    return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(scoped,children.length,'Agents')}
    <div class="section"><div class="section-header hdr-opening" onclick="toggleSection(this)"><span>Selected Agents (All Programs)</span><span class="chevron open">&#9654;</span></div>
      <div class="section-body">${card}</div>
    </div>`;
  }

  // level === 'program' (top of the hierarchy)
  const byProgram=qcSortByScoreDesc(qcAggregateBy(audits,'program'));
  const cards=byProgram.map(item=>{
    const children=qcSortByErrorsDesc(qcAggregateBy(audits.filter(a=>(a.program||'')===item.name),'teamLeader'));
    const trendPoints=isSingleDay?qcAnalyticsTrendFromChildren(children):qcAnalyticsTrendFromDates(item.errorTrend);
    const trendLabel=isSingleDay?'Avg Errors by Team Leader':'Avg Errors by Day';
    return qcAnalyticsCardHtml(item,children,'Team Leader',trendPoints,trendLabel,{level:'teamLeader',program:item.name});
  }).join('');
  const selectedCount=_qcAnalyticsSelectedPrograms.size;
  const programNames=byProgram.map(p=>p.name);
  const programDropdown=qcAnalyticsMultiSelectDropdownHtml('qcProgramDropdown','qcProgramDropdownTrigger','Select Programs',programNames,_qcAnalyticsSelectedPrograms,qcAnalyticsRegisterProgramCheckbox,'qcAnalyticsToggleProgramSelect');
  return `${dateControls}${breadcrumb}${qcAnalyticsSummaryStrip(audits,byProgram.length,'Programs')}
  <div class="qc-analytics-search-row">
    <input type="text" class="qc-analytics-search-input" placeholder="Search programs by name…" oninput="qcAnalyticsApplyCardFilters()">
    ${programDropdown}
    <button id="qcAnalyticsViewSelectedBtn" class="qc-btn primary" style="display:${selectedCount>0?'':'none'}" onclick="qcAnalyticsViewSelectedPrograms()">View Analytics for Selected (${selectedCount}) &rsaquo;</button>
    <button class="qc-btn" onclick="printToPDF('qcAnalytics')">&#128196; Download PDF</button>
  </div>
  <div class="section"><div class="section-header hdr-plan" onclick="toggleSection(this)"><span>By Program</span><span class="chevron open">&#9654;</span></div>
    <div class="section-body">${byProgram.length?cards:qcAnalyticsEmptyRow()}</div>

function qcFormatPoints(n){
  const r=Math.round(n*10)/10;
  return Number.isInteger(r)?String(r):r.toFixed(1);
}

function qcSectionBand(pct){
  if(pct>=90) return {label:'High',cls:'high'};
  if(pct>=70) return {label:'Medium',cls:'medium'};
  if(pct>=50) return {label:'Low',cls:'low'};
  return {label:'Fail',cls:'fail'};
}

// Certain named "critical" items are scored (Pass/Fail/N/A, shown in the
// UI like any other row) but excluded entirely from normal per-section
// weighted scoring — passing or failing one costs zero points through the
// ordinary mechanism. Their only effect on the score is the flat deduction
// below, applied straight to the clean total from every other item, so a
// critical failure never double-costs (once via its own weight, again via
// the deduction).
const QC_CRITICAL_ITEM_LABELS=new Set(['Data Fabrication','HIPAA Verification','Opening Statement','Data Manipulation','Case Disposition','Representation Protocol','Program Specific Pushback']);

// Groups are checked worst-first (100 → 50 → 30 → 5); within a group, EVERY
// failed item applies that group's percentage as its own separate
// multiplicative hit — two 30%-group items both failing is two ×0.7
// multiplications (≈49% of the original), not one. Order across groups
// doesn't change the final number (multiplication commutes) but keeps the
// banner's trail readable worst-first.
const QC_DEDUCTION_GROUPS=[
  {pct:100,labels:['Data Fabrication','HIPAA Verification','Opening Statement']},
  {pct:50,labels:['Data Manipulation']},
  {pct:30,labels:['Case Disposition','Representation Protocol']},
  {pct:5,labels:['Program Specific Pushback']},
];
function qcItemFailedByLabel(label){
  for(let si=0;si<QC_SECTIONS.length;si++){
    const items=QC_SECTIONS[si].items;
    for(let ii=0;ii<items.length;ii++){
      if(items[ii].label===label){
        const st=qcState.scores[si+'_'+ii];
        return !!(st&&(st.asked==='fail'||st.documented==='fail'));
      }
    }
  }
  return false;
}

function qcRecalc(){
  // Two-level scoring: each section computes its own 0-100% sub-score first
  // (item weights 1/2/4 rank importance *within* that section, N/A excluded,
  // same math as before) — then the Overall Score is the weighted average of
  // every section's sub-score, weighted by that section's fixed weightPct.
  // A section with no scored (non-N/A) items yet is skipped and the other
  // sections' percentages are proportionally rescaled, so the score stays
  // meaningful mid-audit instead of only once everything is filled in.
  let errCount=0,scoredCount=0,totalCount=0,fatalFail=false;
  let weightedNum=0,weightedDenPct=0;
  QC_SECTIONS.forEach((sec,si)=>{
    let secNum=0,secDen=0;
    sec.items.forEach((it,ii)=>{
      totalCount+=2; // asked + documented
      const st=qcState.scores[si+'_'+ii];
      const half=it.w*0.5;
      // Critical items still show/score normally in the UI (and still count
      // toward "# of Errors" / progress) but never touch secNum/secDen —
      // they cost nothing through ordinary weighting, only through the flat
      // deduction below.
      const excluded=QC_CRITICAL_ITEM_LABELS.has(it.label);
      ['asked','documented'].forEach(axis=>{
        const sc=st&&st[axis];
        if(sc==='pass'){if(!excluded){secNum+=half;secDen+=half;}scoredCount++;}
        else if(sc==='fail'){if(!excluded){secDen+=half;}errCount++;scoredCount++;if(it.fatal)fatalFail=true;}
        else if(sc==='na'){scoredCount++;}
      });
    });
    const scoreEl=document.getElementById('qcSecScore_'+si);
    const labelEl=document.getElementById('qcSecLabel_'+si);
    if(secDen>0){
      const secPct=secNum/secDen*100;
      const w=sec.weightPct||0;
      weightedNum+=secPct*w;
      weightedDenPct+=w;
      if(scoreEl) scoreEl.textContent=qcFormatPoints(secNum)+'/'+qcFormatPoints(secDen);
      if(labelEl){
        const band=qcSectionBand(secPct);
        labelEl.textContent=band.label;
        labelEl.className='qc-section-label '+band.cls;
      }
    } else {
      if(scoreEl) scoreEl.textContent='—/—';
      if(labelEl){ labelEl.textContent=''; labelEl.className='qc-section-label'; }
    }
  });
  const rawPct=weightedDenPct>0?Math.min(100,Math.max(0,Math.round(weightedNum/weightedDenPct))):null;

  // Every individual failed critical item applies its own group's percentage
  // as a separate multiplicative hit on the clean rawPct (which no longer
  // includes these items at all — see QC_CRITICAL_ITEM_LABELS above). Two
  // items failing from the same group means two separate multiplications,
  // not one — deliberately more punishing than treating the group as a
  // single yes/no flag. Order across groups (worst-first) doesn't change the
  // final number (multiplication commutes) but keeps the banner readable.
  // Detect triggered deductions regardless of whether rawPct exists yet — an
  // auditor might score a critical item before scoring anything else, in
  // which case every section still has zero non-critical items scored and
  // rawPct is null. The banner should still name the failed field right
  // away rather than falling back to a vague generic message just because
  // there's no score yet to apply the deduction to.
  let pct=rawPct;
  const triggeredDeductions=[];
  QC_DEDUCTION_GROUPS.forEach(g=>{
    g.labels.forEach(label=>{
      if(qcItemFailedByLabel(label)){
        if(pct!==null) pct=pct*(1-g.pct/100);
        triggeredDeductions.push({pct:g.pct,label});
      }
    });
  });
  if(pct!==null) pct=Math.max(0,Math.round(pct));

  const numEl=document.getElementById('qcOverallScore');
  if(numEl){
    numEl.textContent=pct===null?'—':pct+'%';
    numEl.className='qc-score-num '+(pct===null?'na':pct<70?'fail':pct<90?'warn':'pass');
  }
  const errEl=document.getElementById('qcErrorCount');if(errEl)errEl.textContent=errCount;
  const progressEl=document.getElementById('qcProgress');if(progressEl)progressEl.textContent=`${scoredCount} / ${totalCount} scored`;
  const banner=document.getElementById('qcFatalBanner');
  if(banner){
    if(triggeredDeductions.length){
      banner.style.display='';
      const parts=triggeredDeductions.map(d=>escHtml(d.label)+' ('+d.pct+'% deduction)').join(', ');
      banner.innerHTML=rawPct===null
        ? '&#9888; '+parts+' — this will be deducted from the overall score once the rest of the audit is scored.'
        : '&#9888; '+parts+' — overall score reduced from '+rawPct+'% to '+pct+'%.';
    } else if(fatalFail){
      banner.style.display='';
      banner.innerHTML='&#9888; A fatal item is marked Fail. This is counted in the score and error count like any other item, but flagged here for visibility.';
    } else {
      banner.style.display='none';
    }
  }
  return {pct,rawPct,errCount,scoredCount,totalCount,fatalFail,triggeredDeductions};
}

function qcResetAudit(){
  if(!confirm('Start a new QC audit? This will clear all case info, scores, and comments currently entered.'))return;
  qcState={case:{},scores:qcDefaultScores(QC_SECTIONS)};
  qcSaveState();
  showQCDashboard(currentQCKind);
}

function filterQC(val){
  const q=(val||'').trim().toLowerCase();
  const sections=document.querySelectorAll('#main .qc-sections-wrap .section');
  if(!q){
    sections.forEach(sec=>{
      sec.classList.remove('search-hidden');
      sec.querySelectorAll('.qc-row').forEach(r=>r.classList.remove('search-hidden'));
    });
    return;
  }
  sections.forEach(sec=>{
    const titleEl=sec.querySelector('.section-header span');
    const titleMatch=!!(titleEl&&titleEl.textContent.toLowerCase().includes(q));
    const rows=sec.querySelectorAll('.qc-row');
    let anyRowMatch=false;
    rows.forEach(row=>{
      const label=(row.querySelector('.qc-row-label')||{}).textContent||'';
      const question=(row.querySelector('.qc-row-question')||{}).textContent||'';
      const match=titleMatch||(label+' '+question).toLowerCase().includes(q);
      if(match){row.classList.remove('search-hidden');anyRowMatch=true;}
      else row.classList.add('search-hidden');
    });
    if(titleMatch||anyRowMatch){
      sec.classList.remove('search-hidden');
      const chevron=sec.querySelector('.chevron');
      const body=sec.querySelector('.section-body');
      if(chevron&&!chevron.classList.contains('open')){chevron.classList.add('open');if(body)body.style.display='';}
    } else {
      sec.classList.add('search-hidden');
    }
  });
}

function qcExpandAll(){
  document.querySelectorAll('#main .qc-sections-wrap .section').forEach(sec=>{
    const chevron=sec.querySelector('.chevron');
    const body=sec.querySelector('.section-body');
    if(chevron&&!chevron.classList.contains('open')){chevron.classList.add('open');if(body)body.style.display='';}
  });
}

function qcCollapseAll(){
  document.querySelectorAll('#main .qc-sections-wrap .section').forEach(sec=>{
    const chevron=sec.querySelector('.chevron');
    const body=sec.querySelector('.section-body');
    if(chevron&&chevron.classList.contains('open')){chevron.classList.remove('open');if(body)body.style.display='none';}
  });
}

function qcScoreSelectHtml(si,ii,axis,val){
  const axisLabel=axis==='asked'?'Asked':'Documented';

  return `<div class="qc-score-cell"><span class="qc-score-mini-label">${axisLabel}</span><select class="qc-score-select v-${v}" onchange="qcUpdateScore(${si},${ii},'${axis}',this.value,this)">
    <option value="na" ${v==='na'?'selected':''}>N/A</option>
    <option value="pass" ${v==='pass'?'selected':''}>Pass</option>
    <option value="fail" ${v==='fail'?'selected':''}>Fail</option>
  </select></div>`;
}

function renderQCDashboard(){
  const meta=QC_KIND_META[currentQCKind];
  const c=qcState.case;
  const kindProgs=programs.filter(meta.progFilter);
  const progOptions=`<option value="">&#8212; Select Program &#8212;</option>`+kindProgs.map(p=>`<option value="${p.id}" ${c.program===p.id?'selected':''}>${p.label}</option>`).join('');
  const fields=[
    {k:'agentName',label:'Agent Name',type:'text'},
    {k:'srNumber',label:'SR / Case Number',type:'text'},
    {k:'auditorName',label:'Auditor Name',type:'text'},
    {k:'auditDate',label:'Audit Date',type:'date'},
    {k:'payerName',label:'Payer Name',type:'text'},
    {k:'payerType',label:'Payer Type',type:'text'},
  ];
  const fieldsHtml=fields.map(f=>`<div class="qc-field"><label>${f.label}<span class="qc-required-star">*</span></label><input data-field="${f.k}" type="${f.type}" value="${escHtml((c[f.k]||'').toString())}" oninput="qcUpdateCase('${f.k}',this.value)"></div>`).join('');
  const programField=`<div class="qc-field"><label>${meta.shortLabel} Program<span class="qc-required-star">*</span></label><select data-field="program" onchange="qcUpdateCase('program',this.value)">${progOptions}</select></div>`;
  const QC_TYPE_OPTIONS=['MM','PBM','Transportation'];
  const QC_TEAM_LEADER_OPTIONS=['Hosni','Karthik','Jeswanth','Sudeesh','Basudeb','Rohan','Ezekeil'];
  const typeOptionsHtml=`<option value="">&#8212; Select &#8212;</option>`+QC_TYPE_OPTIONS.map(v=>`<option value="${v}" ${c.type===v?'selected':''}>${v}</option>`).join('');
  const teamLeaderOptionsHtml=`<option value="">&#8212; Select &#8212;</option>`+QC_TEAM_LEADER_OPTIONS.map(v=>`<option value="${v}" ${c.teamLeader===v?'selected':''}>${v}</option>`).join('');
  const typeField=`<div class="qc-field"><label>Type<span class="qc-required-star">*</span></label><select data-field="type" onchange="qcUpdateCase('type',this.value)">${typeOptionsHtml}</select></div>`;
  const teamLeaderField=`<div class="qc-field"><label>Team Leader<span class="qc-required-star">*</span></label><select data-field="teamLeader" onchange="qcUpdateCase('teamLeader',this.value)">${teamLeaderOptionsHtml}</select></div>`;

  const totalItems=QC_SECTIONS.reduce((a,s)=>a+s.items.length,0)*2;
  const sectionsHtml=QC_SECTIONS.map((sec,si)=>{
    const rows=sec.items.map((it,ii)=>{
      const key=si+'_'+ii;
      const st=qcState.scores[key]||{};
      const commentVal=escHtml((st.comment||'').toString());
      return `<div class="qc-row">
        <div class="qc-row-label">${it.label}</div>
        <div class="qc-row-question">${it.q}${it.fatal?'<span class="fatal-tag">Fatal</span>':''}</div>
        ${qcScoreSelectHtml(si,ii,'asked',st.asked||'')}

    <div class="qc-fields-grid">${programField}${typeField}${teamLeaderField}${fieldsHtml}</div>
  </div>
  <div id="qcFatalBanner" class="qc-egregious-banner" style="display:none">&#9888; A fatal item is marked Fail. This is counted in the score and error count like any other item, but flagged here for visibility.</div>
  <div class="qc-score-strip">

  </div>
  <div class="script-search-wrap"><span style="color:#b0bac9;font-size:15px">&#128269;</span><input class="script-search" id="qcSearchInput" type="text" placeholder="Search sections or questions..." oninput="filterQC(this.value)" autocomplete="off"><button class="script-search-clear" onclick="document.getElementById('qcSearchInput').value='';filterQC('')" title="Clear">&#10005;</button><div class="script-search-divider"></div><button class="btn-sec-toggle" onclick="qcExpandAll()" title="Expand all sections">&#8661; Expand All</button><button class="btn-sec-toggle" onclick="qcCollapseAll()" title="Collapse all sections">&#8661; Collapse All</button></div>

function stripHtml(html){
  return (html||'').replace(/<[^>]*>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ')
    .replace(/&middot;/g,'·').replace(/&#8211;/g,'–').replace(/&#8212;/g,'—')
    .replace(/&#9654;/g,'').replace(/→/g,'→').trim();
}

function toggleDlMenu(btn){
  const menu=btn.nextElementSibling;
  const isOpen=menu.classList.contains('open');
  closeDlMenus();
  if(!isOpen) menu.classList.add('open');
}
function closeDlMenus(){
  document.querySelectorAll('.dl-menu.open').forEach(m=>m.classList.remove('open'));
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.dl-dropdown')) closeDlMenus();
});

function downloadExcel(type){
  if(typeof XLSX==='undefined'){
    alert('Excel library not loaded.\nPlease check your internet connection and reload the page.');
    return;
  }
  const wb=XLSX.utils.book_new();
  const today=new Date().toISOString().slice(0,10);

  if(type==='script'){
    const p=programs.find(x=>x.id===currentProgId);
    if(!p){alert('No script selected.');return;}
    const script=currentTab==='pbm'?p.pbm:currentTab==='other'?p.other:p.mm;
    if(!script){alert('No script available for this tab.');return;}
    const aoa=[['Section #','Section Title','Step #','Type','Label','Text','Field / Answer']];
    script.forEach((sec,si)=>{
      sec.steps.forEach((step,ti)=>{
        aoa.push([si+1,sec.title||'',ti+1,step.type||'',stripHtml(step.label||''),stripHtml(step.text||''),step.field||'']);
      });
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[10,28,8,12,14,70,35].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,(p.label+' '+currentTab.toUpperCase()).slice(0,31));
    XLSX.writeFile(wb,'Valeris_'+p.label.replace(/[^a-z0-9]/gi,'_')+'_'+currentTab.toUpperCase()+'_'+today+'.xlsx');
  }
  else if(type==='drugref'){
    const drugData=getDrugData();
    const aoa=[drugData.columns,...drugData.rows.map(r=>r.cells.map(c=>c||''))];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[20,18,18,30,30,18,12,14,16,12,10,18].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Drug Reference');
    XLSX.writeFile(wb,'Valeris_Drug_Reference_'+today+'.xlsx');
  }
  else if(type==='terms'){
    const termsData=getTermsData();
    const aoa=[['Category','Name','Acronym','Definition','Context / Script']];
    termsData.terms.forEach(t=>{
      aoa.push([t.category||'',t.name||'',t.acronym||'',stripHtml(t.def||''),stripHtml(t.context||'')]);
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[20,30,14,55,55].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,'Terminologies');
    XLSX.writeFile(wb,'Valeris_Terminologies_'+today+'.xlsx');
  }
  else if(type==='qc'){
    const meta=QC_KIND_META[currentQCKind];
    const c=qcState.case||{};
    const p=programs.find(x=>x.id===c.program);
    const r=qcRecalc();
    const aoa=[
      [meta.title],
      [],
      ['Audit Type','QC Internal Audit',meta.shortLabel+' Program',p?p.label:''],
      ['SR / Case Number',c.srNumber||'','Agent Name',c.agentName||''],
      ['Auditor Name',c.auditorName||'','Audit Date',c.auditDate||''],
      ['Payer Name',c.payerName||'','Payer Type',c.payerType||''],
      ['Type',c.type||'','Team Leader',c.teamLeader||''],
      ['# of Errors',r.errCount,'Overall Score',r.pct===null?'N/A':r.pct+'%'],
      ['Scored',`${r.scoredCount} / ${r.totalCount}`,'',''],
      [],
    ];
    const lbl=v=>v==='pass'?'Pass':v==='fail'?'Fail':v==='na'?'N/A':'';
    QC_SECTIONS.forEach((sec,si)=>{
      aoa.push([sec.title.toUpperCase(),'','ASKED','DOCUMENTED','WEIGHT','COMMENTS']);
      sec.items.forEach((it,ii)=>{
        const st=qcState.scores[si+'_'+ii]||{};
        aoa.push([it.label,it.q,lbl(st.asked),lbl(st.documented),it.w,st.comment||'']);
      });
    });
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[24,60,10,10,8,40].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,meta.title.slice(0,31));
    XLSX.writeFile(wb,'Valeris_'+meta.shortLabel+'_QC_'+(c.srNumber||'audit').replace(/[^a-z0-9]/gi,'_')+'_'+today+'.xlsx');
  }
}
