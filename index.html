<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valeris — Call Script Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f1729'/><rect x='18' y='18' width='64' height='64' rx='8' fill='%234263eb'/><rect x='30' y='30' width='40' height='40' rx='4' fill='%230f1729'/><rect x='38' y='38' width='24' height='24' rx='2' fill='%23f1f5f9'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f8;color:#111827;display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{background:#0f1729;color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:-.1px;color:#f1f5f9}
.topbar span{font-size:12px;color:#64748b;border-left:1px solid #1e293b;padding-left:16px;letter-spacing:.1px}
.search-bar{margin-left:auto;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:7px 14px;color:#e2e8f0;font-size:13px;width:220px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s}
.search-bar:focus{border-color:#4f6ef7;background:#243044}
.search-bar::placeholder{color:#4b5563}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:248px;background:#fff;border-right:1px solid #e5e9f2;overflow-y:auto;flex-shrink:0;padding:10px 0}
.main{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sidebar-group{margin-bottom:2px}
.sidebar-group-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;padding:14px 18px 5px;letter-spacing:1px}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:13px;color:#4b5563;border-left:3px solid transparent;transition:all .12s;line-height:1.4}
.sidebar-item:hover{background:#f5f7ff;color:#111827}
.sidebar-item.active{background:#eff2ff;border-left-color:#4263eb;color:#3451d1;font-weight:600}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:auto;white-space:nowrap;letter-spacing:.1px}
.badge-mm{background:#dbeafe;color:#1d4ed8}
.badge-pbm{background:#fef3c7;color:#b45309}
.badge-both{background:#dcfce7;color:#15803d}

/* ── SIDEBAR NAV ── */
.sidebar-nav-section{border-bottom:1px solid #f1f4fb;margin-bottom:4px;padding-bottom:4px}
.sidebar-nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;font-weight:600;color:#4b5563;border-left:3px solid transparent;transition:all .12s}
.sidebar-nav-item:hover{background:#f5f7ff;color:#111827}
.sidebar-nav-item.active{background:#eff2ff;border-left-color:#4263eb;color:#3451d1}
.sidebar-nav-parent{justify-content:space-between}
.sidebar-nav-parent .nav-chevron{font-size:10px;color:#94a3b8;transition:transform .15s;flex-shrink:0}
.sidebar-nav-parent .nav-chevron.open{transform:rotate(90deg)}
.sidebar-nav-children{overflow:hidden}
.sidebar-nav-child{padding-left:34px!important;font-size:12.5px}

/* ── PROGRAM HEADER ── */
.program-header{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:18px;border:1px solid #e5e9f2;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.program-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.program-title{font-size:19px;font-weight:700;color:#111827;letter-spacing:-.2px}
.program-subtitle{font-size:12px;color:#6b7280;margin-top:3px;line-height:1.5}
.prog-info-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.prog-jcode-chip{display:inline-flex;align-items:center;gap:3px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.prog-cb-chip{display:inline-flex;align-items:center;gap:3px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;white-space:nowrap}

/* ── TABS ── */
.tabs{display:flex;gap:3px;margin-bottom:18px;background:#fff;border-radius:10px;padding:5px;border:1px solid #e5e9f2;width:fit-content;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tab{padding:7px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280;transition:all .14s}
.tab:hover{color:#111827;background:#f5f7ff}
.tab.active-mm{background:#1d4ed8;color:#fff;box-shadow:0 2px 7px rgba(29,78,216,.28)}
.tab.active-pbm{background:#b45309;color:#fff;box-shadow:0 2px 7px rgba(180,83,9,.25)}
.tab.active-other{background:#047857;color:#fff;box-shadow:0 2px 7px rgba(4,120,87,.25)}
.tab.active-log{background:#0f1729;color:#fff;box-shadow:0 2px 7px rgba(15,23,41,.28)}
.tab.active-full{background:#7c3aed;color:#fff;box-shadow:0 2px 7px rgba(124,58,237,.28)}

/* ── SECTIONS ── */
.section{background:#fff;border-radius:10px;border:1px solid #e5e9f2;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.section-header{padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;color:#1f2937;letter-spacing:-.1px}
.section-header:hover{background:#fafbff}
.section-header .chevron{margin-left:auto;font-size:10px;transition:transform .18s;color:#9ca3af}
.section-header .chevron.open{transform:rotate(90deg)}
.section-body{padding:14px 18px 18px;border-top:1px solid #f1f4fb}

/* ── SECTION HEADER COLOR BANDS ── */
.hdr-opening{background:linear-gradient(90deg,#eef2ff 0,#f5f7ff 100%)}
.hdr-plan{background:linear-gradient(90deg,#fffbeb 0,#fefce8 100%)}
.hdr-coverage{background:linear-gradient(90deg,#f0fdf4 0,#f7fef8 100%)}
.hdr-benefit{background:linear-gradient(90deg,#fdf2f8 0,#fef6fb 100%)}
.hdr-auth{background:linear-gradient(90deg,#f5f3ff 0,#faf8ff 100%)}
.hdr-closing{background:linear-gradient(90deg,#f0f9ff 0,#f5fafe 100%)}
.hdr-drug{background:linear-gradient(90deg,#f7fef0 0,#fafff5 100%)}
.hdr-compliance{background:linear-gradient(90deg,#fff8f5 0,#fffaf8 100%)}
.hdr-pharmacy{background:linear-gradient(90deg,#fff8f0 0,#fffaf5 100%)}
.hdr-transport{background:linear-gradient(90deg,#f0f8ff 0,#f5fafe 100%)}

/* ── FULL SCRIPT (read-only) ── */
.fullscript-container{display:flex;flex-direction:column;gap:8px}
.fullscript-container .step{padding-left:14px}
.fullscript-papread{border-left:3px solid #4263eb;background:#f0f4ff;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:8px}
.fullscript-papread-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#4263eb;margin-bottom:10px;opacity:.8}
.fullscript-papread-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
@media(max-width:680px){.fullscript-papread-grid{grid-template-columns:1fr}}
.fullscript-papread-col{background:#fff;border:1px solid #c7d2fe;border-radius:8px;overflow:hidden}
.fullscript-papread-col-hdr{background:#4263eb;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:6px 12px}
.fullscript-papread-scenario{padding:7px 12px;border-top:1px solid #f3f4f6}
.fullscript-papread-scenario-title{font-size:11.5px;font-weight:700;color:#1f2937;margin-bottom:3px}
.fullscript-papread-fields{list-style:none;margin:0;padding:0}
.fullscript-papread-fields li{font-size:11.5px;color:#4b5563;padding:1.5px 0 1.5px 14px;position:relative;line-height:1.4}
.fullscript-papread-fields li::before{content:"·";position:absolute;left:4px;color:#9ca3af;font-weight:700}
.fullscript-papread-note{font-size:11px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:5px;padding:4px 8px;margin-top:4px;line-height:1.4}

/* ── STEP BASE ── */
.step{position:relative;margin-bottom:8px;padding:11px 14px 11px 14px;border-radius:8px;border-left:3px solid;transition:box-shadow .14s,border-top .1s,border-bottom .1s;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.step-statement{background:#f8f9ff;border-color:#4263eb}
.step-question{background:#fffbf0;border-color:#f59e0b}
.step-instruction{background:#f0fdf5;border-color:#10b981}
.step-warning{background:#fff1f2;border-color:#f43f5e}
.step-branch{background:#faf5ff;border-color:#8b5cf6}
.step-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;opacity:.6}
.step-text{font-size:13px;line-height:1.6;padding-right:28px;color:#1f2937}
.step-field{font-size:11.5px;color:#6b7280;margin-top:4px;font-style:italic;padding-right:28px;line-height:1.4;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.step-answer-wrap{margin-top:8px;padding-right:28px}
.step-answer{width:100%;padding:6px 10px;font-size:12.5px;font-family:'Inter',sans-serif;color:#1f2937;background:#fff;border:1.5px solid #d1d5db;border-radius:6px;outline:none;resize:none;line-height:1.5;min-height:32px;box-sizing:border-box;transition:border-color .14s,box-shadow .14s}
.step-answer:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.step-answer::placeholder{color:#c4c9d4;font-style:italic}
.step-yn-select{margin-top:8px;padding:6px 10px;width:180px;font-size:12.5px;font-family:'Inter',sans-serif;color:#1f2937;background:#fff;border:1.5px solid #d1d5db;border-radius:6px;outline:none;cursor:pointer;transition:border-color .14s,box-shadow .14s}
.step-yn-select:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.step-question.step-answered .step-yn-select,.step-branch.step-answered .step-yn-select{border-color:#22c55e}
.btn-clear-answers{background:#fff0f0;color:#dc2626;border:1.5px solid #fca5a5;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:600;padding:4px 12px;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .12s,color .12s}
.btn-clear-answers:hover{background:#dc2626;color:#fff;border-color:#dc2626}
.step-question.step-answered,.step-branch.step-answered{background:#f0fdf4;border-color:#22c55e}
.step-question.step-answered .step-answer:focus,.step-branch.step-answered .step-answer:focus{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.12)}
/* ── PA / PRE-D DYNAMIC SELECTOR ── */
.step-pa-pread{background:#f0f4ff;border-color:#4263eb;border-radius:10px;padding:14px 16px}
.step-pa-pread.step-answered{background:#f0fdf4;border-color:#22c55e}
.pa-pread-dropdowns{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0 14px}
.pa-pread-dd-wrap{display:flex;flex-direction:column;gap:4px;flex:1;min-width:190px}
.pa-pread-dd-label{font-size:10.5px;font-weight:700;color:#4263eb;text-transform:uppercase;letter-spacing:.5px}
.pa-pread-dd{padding:7px 10px;border:1.5px solid #c7d2fe;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#111827;outline:none;cursor:pointer;transition:border-color .14s}
.pa-pread-dd:focus{border-color:#4263eb;box-shadow:0 0 0 3px rgba(66,99,235,.12)}
.pa-pread-field-list{background:#fff;border-radius:8px;border:1px solid #e0e7ff;padding:14px 16px;margin-top:2px}
.pa-pread-scenario-badge{display:inline-block;font-size:11px;font-weight:700;background:#4263eb;color:#fff;border-radius:6px;padding:3px 12px;margin-bottom:12px;letter-spacing:.2px}
.pa-pread-scenario-badge.badge-approved{background:#16a34a}
.pa-pread-scenario-badge.badge-denied{background:#dc2626}
.pa-pread-scenario-badge.badge-pending{background:#d97706}
.pa-pread-scenario-badge.badge-not_on_file{background:#6b7280}
.pa-pread-field-row{display:flex;flex-direction:row;gap:12px;align-items:flex-start;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #eef0ff}
.pa-pread-field-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.pa-pread-field-q{flex:3;min-width:0;font-size:13px;font-weight:500;color:#1f2937;line-height:1.55;padding-top:5px}
.pa-pread-field-label{flex:2;min-width:0;font-size:11px;font-weight:700;color:#4263eb;letter-spacing:.2px;padding-top:7px;line-height:1.4}
.pa-pread-field-row .step-answer{flex:2;min-width:0}
.pa-pread-yn-select{flex:2;min-width:0;padding:6px 10px;border:1.5px solid #d1d5db;border-radius:6px;font-size:13px;font-family:'Inter',sans-serif;background:#fff;color:#1f2937;outline:none;cursor:pointer;transition:border-color .14s}
.pa-pread-yn-select:focus{border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.pa-pread-no-fields{padding:10px 0 2px;font-size:12.5px;color:#9ca3af;font-style:italic}
.pa-pread-notes{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pa-pread-note{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:7px;font-size:12px;line-height:1.5}
.pa-pread-note.note-warn{background:#fef3c7;border:1px solid #f59e0b;color:#78350f}
.pa-pread-note.note-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af}
.pa-pread-note-icon{flex-shrink:0;margin-top:1px;font-size:13px}
.na-accept-badge{font-style:normal;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;white-space:nowrap;letter-spacing:.2px;flex-shrink:0}
.na-accept-badge.na-ok{background:#dcfce7;color:#15803d}
.na-accept-badge.na-no{background:#fee2e2;color:#991b1b}
.placeholder{background:#fef9c3;padding:1px 5px;border-radius:3px;font-style:italic;color:#92400e;font-weight:500}
.hl-program{background:#dbeafe;color:#1d4ed8;border-radius:3px;padding:1px 5px;font-weight:700}
.hl-recorded{background:#fee2e2;color:#991b1b;border-radius:3px;padding:1px 5px;font-weight:500}

/* ── DRAG HANDLE ── */
.drag-handle{cursor:grab;color:#a5b4fc;font-size:15px;letter-spacing:-2px;user-select:none;padding:5px 6px;flex-shrink:0;align-self:center;background:rgba(66,99,235,.08);border:1px solid rgba(66,99,235,.15);border-radius:6px;transition:background .15s,color .15s,transform .1s;line-height:1}
.drag-handle:hover{background:rgba(66,99,235,.15);color:#4263eb;transform:scale(1.05)}
.drag-handle:active{cursor:grabbing;transform:scale(.96)}
.step-body{flex:1;min-width:0}
.copy-btn{flex-shrink:0;align-self:center;background:none;border:none;cursor:pointer;font-size:15px;color:#cbd5e1;padding:3px 6px;border-radius:4px;transition:color .15s,background .15s;opacity:0}
.step:hover .copy-btn{opacity:1}
.copy-btn:hover{color:#4263eb;background:#eff2ff}
.step.dragging{opacity:.3;border-style:dashed}
.step.drag-over-top{border-top:2px solid #4263eb}
.step.drag-over-bottom{border-bottom:2px solid #4263eb}
.section-drag-handle{cursor:grab;color:#cbd5e1;font-size:13px;letter-spacing:-1px;opacity:0;transition:opacity .14s;user-select:none;margin-right:2px;padding:2px 3px;flex-shrink:0}
.section-header:hover .section-drag-handle{opacity:.65}
.section-drag-handle:active{cursor:grabbing}
.section.dragging-section{opacity:.3;border:1px dashed #d1d5db !important}
.section.sec-drag-over-top{border-top:2px solid #4263eb !important}
.section.sec-drag-over-bottom{border-bottom:2px solid #4263eb !important}
.btn-reset-order{padding:5px 11px;background:#f5f7ff;color:#4263eb;border:1px solid #c7d2fe;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-reset-order:hover{background:#eef2ff}

/* ── SECTION CONTROLS ── */
.section-remove-btn{width:22px;height:22px;border-radius:5px;border:1px solid #fecaca;background:#fef2f2;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#dc2626;transition:opacity .14s;flex-shrink:0;padding:0;line-height:1;opacity:0}
.section-header:hover .section-remove-btn{opacity:1}
.section-remove-btn:hover{background:#fee2e2;border-color:#dc2626}
.sec-title-edit-btn{width:20px;height:20px;border-radius:4px;border:1px solid #c7d2fe;background:#eff2ff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#4263eb;transition:opacity .14s;flex-shrink:0;padding:0;line-height:1;opacity:0}
.section-header:hover .sec-title-edit-btn{opacity:1}
.sec-title-edit-btn:hover{background:#e0e7ff;border-color:#4263eb}
.sec-title-edited-badge{font-size:9px;font-weight:700;background:#eff2ff;color:#4263eb;border-radius:5px;padding:1px 6px;letter-spacing:.2px;flex-shrink:0}
.sec-title-input{font-size:13px;font-weight:600;padding:3px 8px;border:1.5px solid #4263eb;border-radius:5px;background:#eff2ff;color:#111827;outline:none;min-width:120px;flex:1;font-family:'Inter',sans-serif}
.sec-title-save-btn{width:22px;height:22px;border-radius:4px;border:none;background:#10b981;color:#fff;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;padding:0;line-height:1}
.sec-title-save-btn:hover{background:#059669}
.sec-title-cancel-btn{width:22px;height:22px;border-radius:4px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;padding:0;line-height:1}
.sec-title-cancel-btn:hover{background:#dc2626}

/* ── RESTORE BARS ── */
.script-search-wrap{display:flex;align-items:center;background:#fff;border:1.5px solid #e2e8f4;border-radius:8px;padding:0 12px;margin-bottom:12px;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.script-search{flex:1;border:none;outline:none;padding:9px 0;font-size:13.5px;font-family:'Inter',sans-serif;color:#2d3a55;background:transparent}
.script-search::placeholder{color:#b0bac9}
.script-search-clear{background:none;border:none;cursor:pointer;color:#b0bac9;font-size:14px;padding:2px 4px;border-radius:4px;line-height:1;font-family:'Inter',sans-serif}
.script-search-clear:hover{color:#4263eb;background:#f0f2f8}
.script-search-divider{width:1px;height:20px;background:#e2e8f4;flex-shrink:0;margin:0 2px}
.btn-sec-toggle{background:none;border:1px solid #e2e8f4;border-radius:6px;cursor:pointer;color:#5a6a85;font-size:11.5px;font-weight:600;padding:4px 10px;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .12s,color .12s}
.btn-sec-toggle:hover{background:#4263eb;color:#fff;border-color:#4263eb}
.section.search-hidden{display:none!important}
.step.search-hidden{display:none!important}
.qc-row.search-hidden{display:none!important}

/* ── EDIT BUTTON ── */
.edited-badge{font-size:9px;font-weight:700;background:#4263eb;color:#fff;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}
.step.editing{box-shadow:0 0 0 2px #4263eb;background:#f8f9ff !important}
.edit-textarea{width:100%;min-height:60px;padding:8px 10px;border:1.5px solid #e5e9f2;border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;line-height:1.55;resize:vertical;outline:none;color:#111827;margin-bottom:6px;background:#fff}
.edit-textarea:focus{border-color:#4263eb}
.edit-input{width:100%;padding:7px 10px;border:1.5px solid #e5e9f2;border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:#374151;background:#fff;margin-bottom:6px}
.edit-input:focus{border-color:#4263eb}
.edit-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}
.btn-save{padding:5px 14px;background:#4263eb;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-save:hover{background:#3451d1}
.btn-cancel{padding:5px 14px;background:#f3f4f6;color:#374151;border:1px solid #e5e9f2;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-cancel:hover{background:#e8eaed}
.btn-reset{padding:5px 10px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-reset:hover{background:#fee2e2}
.edit-field-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af;letter-spacing:.5px;margin-bottom:3px}

/* ── ADD STEP ── */
.add-step-form{background:#f8f9ff;border:1px solid #c7d2fe;border-radius:9px;padding:12px 14px;margin-top:8px}
.add-step-form .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.add-step-form select{padding:6px 9px;border:1.5px solid #e5e9f2;border-radius:7px;font-size:12px;color:#374151;background:#fff;outline:none;font-family:'Inter',sans-serif}
.added-badge{font-size:9px;font-weight:700;background:#10b981;color:#fff;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}

/* ── DRUG TABLE ── */
.drug-table{width:100%;border-collapse:collapse;min-width:700px}
.drug-table-wrap{background:#fff;border-radius:12px;border:1px solid #e5e9f2;overflow:auto;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.drug-table thead tr{background:#f8f9ff}
.drug-table th{padding:11px 14px;font-size:10.5px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.55px;border-bottom:2px solid #e5e9f2;border-right:1px solid #edf0f7;white-space:nowrap;position:relative;min-width:110px}
.drug-table th.th-action{min-width:36px;width:36px;border-right:none}
.drug-table td{padding:9px 14px;font-size:12.5px;color:#374151;border-bottom:1px solid #f1f4fb;border-right:1px solid #f3f5fb;vertical-align:top;max-width:220px;word-break:break-word}
.drug-table td.td-action{border-right:none;width:36px;text-align:center;vertical-align:middle}
.drug-table tbody tr:last-child td{border-bottom:none}
.drug-table tbody tr:hover td{background:#f8f9ff}
.th-inner{display:flex;align-items:center;gap:4px}
.th-label{flex:1;cursor:pointer;user-select:none}
.th-label:hover{color:#4263eb;text-decoration:underline dotted}
.th-acts{display:flex;gap:2px;opacity:0;transition:opacity .14s;flex-shrink:0}
.drug-table th:hover .th-acts{opacity:1}
.th-btn{width:16px;height:16px;border:none;border-radius:3px;cursor:pointer;font-size:9px;padding:0;display:inline-flex;align-items:center;justify-content:center;line-height:1}
.th-btn-del{background:#fef2f2;color:#dc2626}
.th-btn-del:hover{background:#fecaca}
.dt-cell-val{cursor:pointer;min-height:18px;display:block;border-radius:4px;padding:1px 4px;margin:-1px -4px;transition:background .1s}
.dt-cell-val:hover{background:#eff2ff}
.dt-cell-val.empty-cell{color:#d1d5db;font-style:italic;font-size:12px}
.dt-cell-input{width:100%;padding:4px 8px;border:1.5px solid #4263eb;border-radius:5px;font-size:12.5px;background:#eff2ff;color:#111827;outline:none;box-sizing:border-box;font-family:'Inter',sans-serif}
.th-input{width:100%;padding:3px 6px;border:1.5px solid #4263eb;border-radius:4px;font-size:10px;background:#eff2ff;color:#111827;outline:none;font-weight:700;text-transform:uppercase;letter-spacing:.5px;box-sizing:border-box;font-family:'Inter',sans-serif}
.dt-row-del{width:22px;height:22px;border:1px solid #fecaca;background:#fef2f2;border-radius:5px;cursor:pointer;color:#dc2626;font-size:10px;opacity:0;transition:opacity .14s;display:inline-flex;align-items:center;justify-content:center;padding:0}
.drug-table tbody tr:hover .dt-row-del{opacity:1}
.dt-row-del:hover{background:#fee2e2;border-color:#dc2626}
.drug-empty-row td{text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px;border:none !important}

/* ── DRUG INFO VIEW ── */
.drug-info-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.drug-info-title{font-size:20px;font-weight:700;color:#111827;letter-spacing:-.2px}
.drug-info-meta{font-size:12px;color:#6b7280;margin-top:2px}
.btn-add-drug-row{padding:7px 16px;background:#4263eb;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .14s}
.btn-add-drug-row:hover{background:#3451d1}
.btn-add-drug-col{padding:6px 14px;background:#f5f7ff;color:#4263eb;border:1.5px solid #c7d2fe;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .14s}
.btn-add-drug-col:hover{background:#eff2ff}
.drug-info-note{font-size:11px;color:#9ca3af;margin-top:8px;text-align:center}
.drug-col-add-form{display:none;background:#fff;border-radius:12px;border:1px solid #e5e9f2;padding:14px 18px;margin-bottom:16px;gap:10px;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.drug-col-add-form.show{display:flex}
.drug-col-add-input{flex:1;padding:8px 12px;border:1.5px solid #4263eb;border-radius:8px;font-size:13px;background:#f0f4ff;color:#111827;outline:none;font-family:'Inter',sans-serif}

/* ── SEARCH BARS ── */
.drug-search-bar,.term-search-bar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;border:1px solid #e5e9f2;padding:10px 16px;margin-bottom:14px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.drug-search-inner,.term-search-inner{display:flex;align-items:center;gap:6px;flex:1;min-width:220px;background:#f8fafc;border:1.5px solid #e5e9f2;border-radius:8px;padding:7px 12px;transition:border-color .14s}
.drug-search-inner:focus-within,.term-search-inner:focus-within{border-color:#4263eb;background:#fff}
.drug-search-icon{color:#9ca3af;font-size:14px;flex-shrink:0}
.drug-search-input,.term-search-input{border:none;background:transparent;font-size:13px;color:#111827;outline:none;flex:1;min-width:160px;font-family:'Inter',sans-serif}
.drug-search-input::placeholder,.term-search-input::placeholder{color:#9ca3af}
.drug-search-clear,.term-search-clear{background:none;border:none;cursor:pointer;color:#d1d5db;font-size:14px;padding:0;line-height:1;flex-shrink:0;display:none}
.drug-search-clear:hover,.term-search-clear:hover{color:#4263eb}
.drug-search-count,.term-search-count{font-size:12px;color:#9ca3af;white-space:nowrap;margin-left:auto}

/* ── DAILY LOG ── */
.log-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.log-count{font-size:12px;color:#9ca3af}
.btn-add-log{padding:8px 18px;background:#0f1729;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:background .14s}
.btn-add-log:hover{background:#1e293b}
.log-add-form{background:#fff;border-radius:12px;border:1px solid #e5e9f2;padding:18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.log-cat-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.log-cat-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #e5e9f2;background:#f8fafc;font-size:12px;font-weight:600;cursor:pointer;color:#6b7280;transition:all .14s}
.log-cat-btn.selected{background:#0f1729;color:#fff;border-color:#0f1729}
.log-entry{background:#fff;border-radius:12px;border:1px solid #e5e9f2;padding:15px 18px;margin-bottom:10px;position:relative;transition:box-shadow .14s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.log-entry:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.log-entry-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.log-entry-date{font-size:12px;font-weight:700;color:#111827}
.log-entry-time{font-size:11px;color:#9ca3af}
.log-entry-author{font-size:11px;font-weight:700;background:#eff2ff;color:#4263eb;border-radius:20px;padding:2px 9px}
.log-entry-cat{font-size:10px;font-weight:700;border-radius:20px;padding:2px 9px;text-transform:uppercase;letter-spacing:.4px}
.log-cat-call{background:#dbeafe;color:#1d4ed8}
.log-cat-pa{background:#dcfce7;color:#15803d}
.log-cat-note{background:#fef9c3;color:#92400e}
.log-cat-update{background:#f3e8ff;color:#7c3aed}
.log-cat-issue{background:#fee2e2;color:#dc2626}
.log-entry-text{font-size:13px;color:#374151;line-height:1.6;white-space:pre-wrap}
.log-delete-btn{position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:5px;border:1px solid #fecaca;background:#fef2f2;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#dc2626;opacity:0;transition:opacity .14s}
.log-entry:hover .log-delete-btn{opacity:1}
.log-empty{text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px}

/* ── COMPLIANCE ── */
.compliance-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.compliance-item{background:#f8f9ff;border-radius:10px;padding:12px 14px;position:relative;border:1px solid #edf0f7}
.compliance-item h4{font-size:11px;font-weight:700;margin-bottom:5px;color:#4263eb;text-transform:uppercase;letter-spacing:.5px;padding-right:44px}
.compliance-item p{font-size:12.5px;color:#374151;line-height:1.5}
.comp-item-btns{position:absolute;top:8px;right:10px;display:flex;gap:3px;opacity:0;transition:opacity .14s}
.compliance-item:hover .comp-item-btns{opacity:1}
.comp-edit-btn,.comp-remove-btn{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.comp-edit-btn{background:#eff2ff;color:#4263eb;border:1px solid #c7d2fe}
.comp-edit-btn:hover{background:#e0e7ff}
.comp-remove-btn{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.comp-remove-btn:hover{background:#fee2e2}
.compliance-item.comp-editing{background:#f0f4ff;border:1.5px solid #4263eb;grid-column:1/-1}
.comp-edit-heading{width:100%;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#4263eb;border:1.5px solid #c7d2fe;border-radius:6px;padding:5px 7px;background:#fff;margin-bottom:6px;outline:none;box-sizing:border-box;font-family:'Inter',sans-serif}
.comp-edit-text{width:100%;font-size:12.5px;color:#374151;line-height:1.5;border:1.5px solid #c7d2fe;border-radius:6px;padding:5px 7px;background:#fff;resize:vertical;outline:none;font-family:'Inter',sans-serif;box-sizing:border-box}
.comp-save-btn{flex:1;padding:5px 10px;background:#10b981;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.comp-save-btn:hover{background:#059669}
.comp-cancel-btn{padding:5px 10px;background:#6b7280;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.comp-cancel-btn:hover{background:#4b5563}
.comp-restore-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fef2f2;border:1px dashed #fca5a5;border-radius:7px;margin-bottom:10px;font-size:12px;color:#dc2626}
.btn-restore-comp{padding:3px 10px;background:#ef4444;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;font-family:'Inter',sans-serif}
.btn-restore-comp:hover{background:#dc2626}

/* ── TERMINOLOGY VIEW ── */
.term-view-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.term-view-title{font-size:20px;font-weight:700;color:#111827;letter-spacing:-.2px}
.term-view-meta{font-size:12px;color:#6b7280;margin-top:2px}
.term-cat-section{margin-bottom:28px}
.term-cat-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;padding:10px 0 8px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #f1f4fb;margin-bottom:14px}
.term-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.term-cat-label{color:#4b5563}
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.term-card{background:#fff;border-radius:12px;border:1px solid #e5e9f2;padding:16px 18px;transition:box-shadow .14s,border-color .14s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.term-card:hover{box-shadow:0 4px 18px rgba(66,99,235,.09);border-color:#c7d2fe}
.term-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.term-name{font-size:14px;font-weight:700;color:#111827;flex:1;line-height:1.3}
.term-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.term-acronym-badge{font-size:10px;font-weight:700;background:#eff2ff;color:#4263eb;border-radius:6px;padding:2px 7px;white-space:nowrap}
.term-card-acts{display:flex;gap:3px;opacity:0;transition:opacity .14s}
.term-card:hover .term-card-acts{opacity:1}
.term-act-btn{width:22px;height:22px;border-radius:5px;border:1px solid #e5e9f2;background:#f8fafc;cursor:pointer;font-size:11px;color:#6b7280;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1}
.term-act-btn:hover{background:#e0e7ff;border-color:#4263eb;color:#4263eb}
.term-act-btn.del:hover{background:#fee2e2;border-color:#dc2626;color:#dc2626}
.term-def{font-size:13px;color:#374151;line-height:1.6;margin-bottom:10px}
.term-context-box{font-size:12px;color:#374151;background:#f8f9ff;border-left:3px solid #4263eb;border-radius:0 7px 7px 0;padding:8px 12px;line-height:1.55}
.term-context-box strong{color:#4263eb}
.btn-add-term{padding:7px 16px;background:#4263eb;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .14s;font-family:'Inter',sans-serif}
.btn-add-term:hover{background:#3451d1}
.term-no-results{text-align:center;padding:50px 20px;color:#9ca3af;font-size:13px}

/* ── TERM MODAL ── */
.term-modal-overlay{position:fixed;inset:0;background:rgba(15,23,41,.55);display:flex;align-items:center;justify-content:center;z-index:1001;opacity:0;pointer-events:none;transition:opacity .18s}
.term-modal-overlay.open{opacity:1;pointer-events:all}
.term-modal-box{background:#fff;border-radius:16px;padding:30px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.16)}
.term-modal-title{font-size:16px;font-weight:700;color:#111827;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.term-modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:#9ca3af;line-height:1;padding:0}
.term-modal-close:hover{color:#374151}
.term-modal-label{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block;margin-top:16px}
.term-modal-label:first-of-type{margin-top:0}
.term-modal-input,.term-modal-select{width:100%;padding:9px 12px;border:1.5px solid #e5e9f2;border-radius:8px;font-size:13px;color:#111827;outline:none;font-family:'Inter',sans-serif;box-sizing:border-box;background:#fff}
.term-modal-input:focus,.term-modal-select:focus{border-color:#4263eb;background:#f8fafc}
.term-modal-textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e9f2;border-radius:8px;font-size:13px;color:#111827;outline:none;font-family:'Inter',sans-serif;box-sizing:border-box;resize:vertical;min-height:80px;background:#fff}
.term-modal-textarea:focus{border-color:#4263eb;background:#f8fafc}
.term-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px}


/* ── DOWNLOAD BUTTON & DROPDOWN ── */
.btn-pdf{padding:6px 14px;background:#f1f5f9;color:#4263eb;border:1.5px solid #c7d2fe;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .14s;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-pdf:hover{background:#eff2ff;border-color:#4263eb}
.dl-dropdown{position:relative;display:inline-block}
.btn-dl{padding:6px 14px;background:#0f1729;color:#f1f5f9;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .14s;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-dl:hover{background:#1e293b}
.dl-menu{display:none;position:absolute;right:0;top:calc(100% + 5px);background:#fff;border:1px solid #e5e9f2;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.11);min-width:175px;z-index:500;overflow:hidden}
.dl-menu.open{display:block}
.dl-menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border:none;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#374151;text-align:left;transition:background .12s;font-family:'Inter',sans-serif}
.dl-menu-item:hover{background:#f8f9ff;color:#111827}
.dl-menu-item+.dl-menu-item{border-top:1px solid #f1f4fb}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 24px;color:#9ca3af}
.empty-state h2{font-size:22px;margin-bottom:10px;color:#d1d5db;font-weight:600}
.empty-state p{font-size:13px;color:#9ca3af;line-height:1.6}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}
/* ── N/A ACCEPTANCE PANEL (inline in PBM scripts) ── */
.na-legend{display:flex;align-items:center;flex-wrap:wrap;gap:16px;background:#f8faff;border:1.5px solid #e2e8f4;border-radius:8px;padding:8px 14px;margin-bottom:10px;font-size:11.5px;color:#4b5563}
.na-legend-label{font-weight:700;color:#374151;margin-right:2px;white-space:nowrap}
.na-legend-item{display:flex;align-items:center;gap:7px;white-space:nowrap}
.na-legend-desc{color:#6b7280}
.na-panel{background:#fff;border:1.5px solid #e2e8f4;border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.na-panel-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;background:#f8faff;transition:background .12s}
.na-panel-hdr:hover{background:#eff2ff}
.na-panel-title{font-size:13px;font-weight:700;color:#3451d1}
.na-panel-sub{font-size:11.5px;color:#94a3b8;margin-left:4px}
.na-panel-toggle{margin-left:auto;font-size:11px;font-weight:600;color:#4263eb;background:#e0e7ff;padding:2px 10px;border-radius:20px;white-space:nowrap;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.na-panel-body{padding:14px 16px;border-top:1px solid #e5e9f2}
.na-panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.na-pcol{border-radius:8px;overflow:hidden;border:1px solid #e5e9f2}
.na-pcol-hdr{padding:7px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.na-pcol-hdr.no{background:#fee2e2;color:#991b1b}
.na-pcol-hdr.yes{background:#dcfce7;color:#15803d}
.na-pcol-grp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;padding:5px 12px 2px;background:#fafbff;border-top:1px solid #f1f4fb}
.na-pcol-item{padding:5px 12px;font-size:12px;color:#334155;border-top:1px solid #f8f9ff;display:flex;align-items:center;justify-content:space-between;gap:8px}
.na-pcol-item:hover{background:#f8f9ff}
.na-badge-m{font-size:10px;font-weight:600;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.na-badge-c{font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
/* ── PBM FIELD REFERENCE ── */
.fref-header{display:flex;align-items:flex-start;gap:16px;padding:20px 24px 14px;background:#fff;border-bottom:1px solid #e5e9f2;flex-wrap:wrap}
.fref-title{font-size:20px;font-weight:700;color:#1e293b}
.fref-meta{font-size:12.5px;color:#94a3b8;margin-top:2px}

<div class="topbar">

  <div id="qcAuthContainer" style="margin-left:12px;display:flex;gap:6px"></div>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>

    <div class="empty-state"><h2>Select a Program</h2><p>Choose a program from the left sidebar to view its call script.</p></div>

<script>
// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
//  ANSWER STORE  (session-only, never persisted)
// ══════════════════════════════════════════════════════════════
const answerStore={};
function saveAnswer(key,val,el){
  answerStore[key]=val;
  const step=el?el.closest('.step'):null;
  if(step) step.classList.toggle('step-answered',val.trim().length>0);
}
function getAnswer(key){ return answerStore[key]||''; }
function clearAllAnswers(){
  Object.keys(answerStore).forEach(k=>delete answerStore[k]);
  document.querySelectorAll('.step-answer').forEach(el=>{
    el.value='';
    el.style.height='auto';
    const step=el.closest('.step');
    if(step) step.classList.remove('step-answered');
  });
  document.querySelectorAll('.step-yn-select').forEach(el=>{
    el.value='';
    const step=el.closest('.step');
    if(step) step.classList.remove('step-answered');
  });
  // Reset pa-pread dropdowns and clear field panels
  document.querySelectorAll('.pa-pread-dd').forEach(el=>{el.value='';});
  document.querySelectorAll('.step-pa-pread').forEach(el=>{
    const key=el.dataset.key;
    const fd=key?document.getElementById('papread_fields_'+CSS.escape(key)):null;
    if(fd) fd.innerHTML='';
    el.classList.remove('step-answered');
  });
}

// ══════════════════════════════════════════════════════════════
//  EDIT STORE  (localStorage persistence)
// ══════════════════════════════════════════════════════════════
const STORE_KEY = "valeris_edits_v2";
let editStore = {};
try { editStore = JSON.parse(localStorage.getItem(STORE_KEY)||"{}"); } catch(e){}
// Clear stale editStore keys when MM script schema changes (bumping MM_SCHEMA_VERSION forces a reset)
(function(){
  const MM_SCHEMA_VERSION="10";
  const MM_SCHEMA_KEY="__mm_schema_v";
  const staleKeys=["ipsen__mm__0__0","ipsen__pbm__0__0","ocular__mm__0__0"];
  let changed=false;
  staleKeys.forEach(k=>{ if(editStore[k]){delete editStore[k];changed=true;} });
  if(editStore[MM_SCHEMA_KEY]!==MM_SCHEMA_VERSION){
    const mmProgs=["ipsen__mm__","jj-imm__mm__","jj-pap__mm__","jj-oncology__mm__","vyepti__mm__","ocular__mm__","sandoz__mm__"];
    Object.keys(editStore).forEach(k=>{
      if(mmProgs.some(p=>k.startsWith(p))){ delete editStore[k]; changed=true; }
    });
    editStore[MM_SCHEMA_KEY]=MM_SCHEMA_VERSION;
    changed=true;
  }
  if(changed){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(editStore)); }catch(e){} }
})();
function persistStore(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(editStore)); }catch(e){} }

    {type:"question",label:"PA ✗",text:"What is the standard and urgent turnaround time for a prior authorization review?",field:"→ Standard TAT | Urgent TAT"},

    // -- PA ON FILE: PENDING --
    {type:"branch",label:"PA ON FILE — Status: PENDING",text:""},
    {type:"statement",label:"Script",text:`Thank you for letting me know the authorization is currently pending. Could you please help me with some details?`},

    // -- PA NOT ON FILE --
    {type:"branch",label:"PA NOT ON FILE",text:""},
    {type:"statement",label:"Script",text:`I see there is no prior authorization on file. I'd like to get the details needed to initiate one.`},
    {type:"question",label:"PA",text:"Can you please provide the name of the department that handles prior authorization?",field:"→ PA Dept Name"},

    {type:"question",label:"PA",text:"What is the standard and urgent turnaround time for a prior authorization review?",field:"→ Standard TAT | Urgent TAT"},

    // ── STEP 12 — APPEAL (IF PA NOT REQUIRED) ─────────────────
    {type:"instruction",label:"If PA NOT Required",text:"If prior authorization is <strong>not required</strong> — check for appeal availability:"},

    {type:"question",label:"Appeal",text:"Can you please confirm the current appeal status?",field:"→ Appeal Status: Approved / Denied / Pending / Not on File"},

    // -- APPEAL: APPROVED --
    {type:"branch",label:"APPEAL — Status: APPROVED",text:""},
    {type:"statement",label:"Script",text:`That's great news — the appeal has been approved. Could you help me with a few details?`},
    {type:"question",label:"Appeal ✓",text:"Can you please provide the reference number for the approved appeal?",field:"→ Reference #"},
    {type:"question",label:"Appeal ✓",text:"What date was the appeal submitted?",field:"→ Submitted On"},
    {type:"question",label:"Appeal ✓",text:"How many appeals are available under this plan?",field:"→ Available Appeal Count"},
    {type:"question",label:"Appeal ✓",text:"How many appeals have been submitted so far?",field:"→ Submitted Appeal Count"},

    // -- APPEAL: DENIED --
    {type:"branch",label:"APPEAL — Status: DENIED",text:""},
    {type:"statement",label:"Script",text:`I understand the appeal has been denied. I'd like to document the details for our records.`},
    {type:"question",label:"Appeal ✗",text:"Can you please provide the reference number for the denied appeal?",field:"→ Reference #"},
    {type:"question",label:"Appeal ✗",text:"What date was the appeal submitted?",field:"→ Submitted On"},
    {type:"question",label:"Appeal ✗",text:"On what date was the appeal denied?",field:"→ Denied On"},
    {type:"question",label:"Appeal ✗",text:"What was the reason for the denial?",field:"→ Denial Reason"},
    {type:"question",label:"Appeal ✗",text:"How many appeals are available under this plan?",field:"→ Available Appeal Count"},
    {type:"question",label:"Appeal ✗",text:"How many appeals have been submitted?",field:"→ Submitted Appeal Count"},

    // -- APPEAL: PENDING --
    {type:"branch",label:"APPEAL — Status: PENDING",text:""},
    {type:"statement",label:"Script",text:`Thank you — I see the appeal is currently pending. A few more questions to document this properly.`},
    {type:"question",label:"Appeal ⏳",text:"Can you please provide the reference number for the pending appeal?",field:"→ Reference #"},
    {type:"question",label:"Appeal ⏳",text:"What date was the appeal submitted?",field:"→ Submitted On"},
    {type:"question",label:"Appeal ⏳",text:"How will the provider be notified once a decision has been made?",field:"→ Notification Method"},
    {type:"question",label:"Appeal ⏳",text:"Is there a website or portal where the appeal status can be tracked?",field:"→ Contact Website / Portal URL"},

    {type:"question",label:"Appeal ⏳",text:"How many appeals have been submitted so far?",field:"→ Submitted Appeal Count"},

    // -- APPEAL: NOT ON FILE --
    {type:"branch",label:"APPEAL — Not on File",text:""},
    {type:"statement",label:"Script",text:`I see there is no appeal on file currently. Let me get the details to help the provider move forward.`},
    {type:"question",label:"Appeal",text:"How will the provider be notified once an appeal is filed and a decision is made?",field:"→ Notification Method"},
    {type:"question",label:"Appeal",text:"Is there a website or portal where the appeal can be submitted or tracked?",field:"→ Contact Website / Portal URL"},
    {type:"question",label:"Appeal",text:"How many appeals are available under this plan?",field:"→ Available Appeal Count"},
    {type:"question",label:"Appeal",text:"How many appeals have been submitted so far?",field:"→ Submitted Appeal Count"},
  ]};
}

function nemtScript(){

    {title:"Call Flow Overview",hdr:"hdr-transport",steps:[
      {type:"instruction",label:"Flow Map",text:`<strong>START</strong><br>↓ Opening + Verification<br>↓ Plan Status<br>&nbsp;&nbsp;├── Inactive → Termination Date → Close<br>↓ Coverage Exists?<br>&nbsp;&nbsp;├── No → Close<br>↓ Model Type?<br>&nbsp;&nbsp;├── <strong>Vendor Only</strong> → Limits → Medical Qual → Vendor + Scheduling → Cost → Travel Support → Close<br>&nbsp;&nbsp;├── <strong>Reimbursement Only</strong> → Medical Qual → Geographic → Travel Support → Reimbursement → Close<br>&nbsp;&nbsp;└── <strong>Both (Hybrid)</strong> → Full Vendor Flow + Reimbursement → Close`},
    ]},
    {title:"1. Opening (Mandatory)",hdr:"hdr-opening",steps:[
      {type:"statement",label:"Script",text:`Hi, this is <span class='placeholder'>[Insert Program Representative name]</span> calling from a <strong>Johnson & Johnson Innovative Medicine sponsored patient support program</strong> on behalf of <span class='placeholder'>[Insert Provider office/pharmacy/patient name, as applicable]</span> to verify insurance benefits for <span class='placeholder'>[patient name]</span> with date of birth <span class='placeholder'>[DOB]</span>. Before we begin, I need to inform you that this call is being recorded for quality assurance and training purposes.`},

    ]},

      {type:"statement",label:"Script",text:`Before I go into transportation, can I confirm — is the member's plan active as of today?`},
      {type:"branch",label:"If NOT active",text:`"Got it — can I get the termination date on file?" → Skip to Record Keeping + Close`},
      {type:"question",label:"Q (if active)",text:"What type of plan is this — Medicaid, Medicare Advantage, or commercial?",field:"→ Plan Type"},

      {type:"question",label:"9A",text:"Is there a copay or coinsurance for transportation rides? Does cost vary by type?",field:"→ Copay $ | Coinsurance % | Variation by type"},

      {type:"question",label:"10A",text:"Are meals covered during travel?",field:"→ Meal allowance | Caregiver included?"},
      {type:"question",label:"10A",text:"Is local transportation reimbursed at the destination?",field:"→ Local transport: Yes/No"},
    ]},
    {title:"PATH B — Reimbursement Only",hdr:"hdr-coverage",steps:[
      {type:"question",label:"6B",text:"Is there an approval required for reimbursement?",field:"→ Yes/No | TAT"},
      {type:"question",label:"7B",text:"Are there any geographic restrictions?",field:"→ In-state only / distance limit"},
      {type:"question",label:"8B",text:"Is lodging covered?",field:"→ Coverage amount | Receipts"},
      {type:"question",label:"8B",text:"Are meals covered? Is local transport reimbursed?",field:"→ Meal allowance | Local transport: Yes/No"},

      {type:"question",label:"9B",text:"Can a caregiver also be reimbursed, or is it patient only?",field:"→ Caregiver reimbursement: Yes/No"},
    ]},
    {title:"PATH C — Hybrid (Both)",hdr:"hdr-coverage",steps:[
      {type:"instruction",label:"Flow",text:"Run full Vendor Flow (PATH A: 6A→10A), then run Reimbursement Section (PATH B: 9B)"},
    ]},
    {title:"Record Keeping & Wrap-Up",hdr:"hdr-closing",steps:[
      {type:"question",label:"Q",text:"Can you please spell your first name and last initial? Do you have a reference number for this call?",field:"→ Rep name | Reference #"},

    ]},
  ];
}

let currentTab="mm", currentProgId="", currentView="programs";
function selectProgram(id){
  currentView="programs";
  document.querySelectorAll(".sidebar-nav-item").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(`.sidebar-item[data-id="${id}"]`).forEach(el=>el.classList.add("active"));
  const p=programs.find(x=>x.id===id);
  if(!p)return;
  currentProgId=id;
  currentTab=p.type==="pbm"?"pbm":p.type==="other"?"other":"mm";
  renderProgram(p);
}

function renderProgram(p){
  const main=document.getElementById("main");
  const colors={Ipsen:"#e8f4ff","J&J":"#fff0e8",Lundbeck:"#f0e8ff","Ocular Therapeutix":"#e8fff4","Sumitomo Pharma":"#fff8e8",Sandoz:"#e8f8ff"};
  const iconBg=colors[p.company]||"#f5f5ff";
  // ── J-code chips ──
  const jcodes=p.drugs?[...new Set(p.drugs.map(d=>d.jcode).filter(j=>j&&j!=="—"))]:[];
  // ── Callback chips (deduplicated) ──
  let cbNums=[];
  if(p.callbacks&&p.callbacks.length) cbNums=[...new Set(p.callbacks.map(c=>c.number).filter(Boolean))];
  else if(p.programPhone) cbNums=[p.programPhone];
  const jcodePills=jcodes.map(j=>`<span class="prog-jcode-chip">&#128137; ${j}</span>`).join("");
  const cbPills=cbNums.map(n=>`<span class="prog-cb-chip">&#128222; ${n}</span>`).join("");
  const infoStrip=(jcodePills||cbPills)?`<div class="prog-info-strip">${jcodePills}${cbPills}</div>`:"";
  let html=`<div class="program-header">
    <div class="program-icon" style="background:${iconBg}">${p.icon}</div>
    <div><div class="program-title">${p.label}</div><div class="program-subtitle">${p.subtitle}</div>${infoStrip}</div>
    <div style="margin-left:auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <div>
        <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.5px">Program</div>
        <div style="font-size:13px;font-weight:600;color:#445">${p.programName}</div>
        ${p.programPhone?`<div style="font-size:11px;color:#667">&#128222; ${p.programPhone}&nbsp; | &nbsp;Fax: ${p.programFax}</div>`:""}
      </div>
      <div class="dl-dropdown"><button class="btn-dl" onclick="toggleDlMenu(this)">&#8659; Download &#9662;</button><div class="dl-menu"><button class="dl-menu-item" onclick="printToPDF('script');closeDlMenus()">&#128196;&nbsp; PDF</button><button class="dl-menu-item" onclick="downloadExcel('script');closeDlMenus()">&#128202;&nbsp; Excel</button></div></div>
    </div>
  </div>`;
  // Tabs
  const logTab=`<div class="tab ${currentTab==="log"?"active-log":""}" onclick="switchTab('log','${p.id}')">&#128203; Daily Log</div>`;
  const fullTab=p.mm?`<div class="tab ${currentTab==="full"?"active-full":""}" onclick="switchTab('full','${p.id}')">&#128196; Full Script MM</div>`:'';
  if(p.type==="both"){
    html+=`<div class="tabs">
      <div class="tab ${currentTab==="mm"?"active-mm":""}" onclick="switchTab('mm','${p.id}')">Medical Benefit (MM)</div>
      ${fullTab}
      <div class="tab ${currentTab==="pbm"?"active-pbm":""}" onclick="switchTab('pbm','${p.id}')">&#128138; Pharmacy Benefit (PBM)</div>
      <div class="tab ${currentTab==="compliance"?"active-other":""}" onclick="switchTab('compliance','${p.id}')">&#9432; Compliance</div>
      ${logTab}
    </div>`;
  } else if(p.type==="mm"){
    html+=`<div class="tabs">
      <div class="tab ${currentTab==="mm"?"active-mm":""}" onclick="switchTab('mm','${p.id}')">Medical Benefit (MM)</div>
      ${fullTab}
      <div class="tab ${currentTab==="compliance"?"active-other":""}" onclick="switchTab('compliance','${p.id}')">&#9432; Compliance</div>
      ${logTab}
    </div>`;
  } else if(p.type==="pbm"){
    html+=`<div class="tabs">
      <div class="tab ${currentTab==="pbm"?"active-pbm":""}" onclick="switchTab('pbm','${p.id}')">&#128138; Pharmacy Benefit (PBM)</div>
      <div class="tab ${currentTab==="compliance"?"active-other":""}" onclick="switchTab('compliance','${p.id}')">&#9432; Compliance</div>
      ${logTab}
    </div>`;
  } else {
    html+=`<div class="tabs">
      <div class="tab ${currentTab==="other"?"active-other":""}" onclick="switchTab('other','${p.id}')">&#128652; Call Flow</div>
      <div class="tab ${currentTab==="compliance"?"active-other":""}" onclick="switchTab('compliance','${p.id}')">&#9432; Compliance</div>
      ${logTab}
    </div>`;
  }
  if(currentTab==="compliance"){
    html+=renderCompliance();
  } else if(currentTab==="log"){
    html+=renderDailyLog(p);
  } else if(currentTab==="full"){
    if(p.mm) html+=renderFullScript(p.mm,p.id);
    else html+=`<div class="section"><div class="section-body" style="color:#aaa;text-align:center;padding:30px">No MM script available for this program.</div></div>`;
  } else {
    const script=currentTab==="pbm"?p.pbm:currentTab==="other"?p.other:p.mm;
    if(script) html+=renderScript(script,p.id,currentTab);
    else html+=`<div class="section"><div class="section-body" style="color:#aaa;text-align:center;padding:30px">No ${currentTab.toUpperCase()} script for this program.</div></div>`;
  }
  main.innerHTML=html;
  document.querySelectorAll(".section-header").forEach(h=>h.querySelector(".chevron").classList.add("open"));
}

function switchTab(tab,id){
  if(tab!=="compliance"){_editingCompIdx=null;_editingCompType=null;}
  currentTab=tab;const p=programs.find(x=>x.id===id);if(p)renderProgram(p);
}

let _naPanelOpen=false;
function toggleNAPanel(){
  _naPanelOpen=!_naPanelOpen;
  const body=document.getElementById('naPanelBody');
  const icon=document.getElementById('naPanelToggleIcon');
  if(body) body.style.display=_naPanelOpen?'':'none';
  if(icon) icon.textContent=_naPanelOpen?'▲ Collapse':'▼ Expand';
}
function renderNAPanel(){
  const ref=typeof FIELD_REF!=='undefined'?FIELD_REF:[];
  if(!ref.length) return '';
  const noList=ref.filter(f=>!f.acceptNA);
  const yesList=ref.filter(f=>f.acceptNA);
  const uniq=arr=>[...new Set(arr.map(f=>f.group))];
  const makeCol=list=>uniq(list).map(grp=>{
    const items=list.filter(f=>f.group===grp);
    return `<div class="na-pcol-grp">${grp}</div>`+items.map(f=>`<div class="na-pcol-item"><span>${f.field}</span><span class="${f.status==='REQUIRED'?'na-badge-m':'na-badge-c'}">${f.status==='REQUIRED'?'Mandatory':'Conditional'}</span></div>`).join('');
  }).join('');
  const bodyContent=`<div class="na-panel-grid"><div class="na-pcol"><div class="na-pcol-hdr no">❌ Cannot Accept "Not Available" (${noList.length})</div>${makeCol(noList)}</div><div class="na-pcol"><div class="na-pcol-hdr yes">✅ Can Accept "Not Available" (${yesList.length})</div>${makeCol(yesList)}</div></div>`;
  return `<div class="na-panel">
    <div class="na-panel-hdr" onclick="toggleNAPanel()">
      <span class="na-panel-title">📋 N/A Acceptance Reference</span>
      <span class="na-panel-sub">Which fields accept "not available" from payer?</span>
      <button class="na-panel-toggle" id="naPanelToggleIcon" onclick="event.stopPropagation();toggleNAPanel()">${_naPanelOpen?'▲ Collapse':'▼ Expand'}</button>
    </div>
    <div class="na-panel-body" id="naPanelBody" style="display:${_naPanelOpen?'':'none'}">${bodyContent}</div>
  </div>`;
}

function renderScript(sections,progId,tabType){
  const removedSecKey=`${progId}__${tabType}__removed_sections`;
  const removedSec=new Set(editStore[removedSecKey]||[]);
  const hiddenSecCount=removedSec.size;
  // ── Section order ──
  const secOrderKey=`${progId}__${tabType}__section_order`;
  const storedSecOrder=editStore[secOrderKey];
  const allSecIdx=sections.map((_,i)=>i).filter(i=>!removedSec.has(i));
  let orderedSecIdx;
  if(storedSecOrder&&storedSecOrder.length){
    const valid=new Set(allSecIdx);
    orderedSecIdx=storedSecOrder.filter(i=>valid.has(i));
    const inOrd=new Set(orderedSecIdx);
    allSecIdx.forEach(i=>{if(!inOrd.has(i))orderedSecIdx.push(i);});
  } else { orderedSecIdx=allSecIdx; }
  const hasCustomSecOrder=!!(storedSecOrder&&storedSecOrder.length);
  // Count edited section titles
  const editedTitleCount=allSecIdx.filter(i=>!!editStore[`${progId}__${tabType}__${i}__title`]).length;
  const restoreBar='';
  const sectionsHtml=orderedSecIdx.map((si,displayIdx)=>{
    const sec=sections[si];
    const removedStepKey=`${progId}__${tabType}__${si}__removed_steps`;
    const removedSteps=new Set(editStore[removedStepKey]||[]);
    const hiddenStepCount=removedSteps.size;
    const addKey=`${progId}__${tabType}__${si}__added`;
    const added=editStore[addKey]||[];
    const visibleItems=[];
    sec.steps.forEach((s,idx)=>{if(!removedSteps.has(idx))visibleItems.push({kind:'orig',idx,data:s});});
    added.forEach((s,idx)=>visibleItems.push({kind:'add',idx,data:s}));
    const orderKey=`${progId}__${tabType}__${si}__order`;
    const storedOrder=editStore[orderKey];
    let orderedItems;
    if(storedOrder&&storedOrder.length){
      const idMap=new Map(visibleItems.map(it=>[`${it.kind}-${it.idx}`,it]));
      orderedItems=storedOrder.filter(id=>idMap.has(id)).map(id=>idMap.get(id));
      const inOrder=new Set(storedOrder);
      visibleItems.forEach(it=>{if(!inOrder.has(`${it.kind}-${it.idx}`))orderedItems.push(it);});
    } else { orderedItems=visibleItems; }
    const hasCustomOrder=!!(storedOrder&&storedOrder.length);
    const resetBtn=hasCustomOrder?`<button class="btn-reset-order" onclick="resetStepOrder('${progId}','${tabType}',${si})">&#8645; Reset Step Order</button>`:"";
    const allStepsHtml=orderedItems.map(it=>{
      const itemId=`${it.kind}-${it.idx}`;
      const dAttrs=`draggable="true" data-itemid="${itemId}" ondragstart="dragStartStep(event,'${progId}','${tabType}',${si},'${itemId}')" ondragover="dragOverStep(event)" ondragend="dragEndStep(event)"`;
      return it.kind==='orig'
        ?renderStep(it.data,`${progId}__${tabType}__${si}__${it.idx}`,dAttrs)
        :renderAddedStep(it.data,progId,tabType,si,it.idx,dAttrs);
    }).join("");
    const areaId=CSS.escape(`addarea__${progId}__${tabType}__${si}`);
    const titleKey=`${progId}__${tabType}__${si}__title`;
    const displayTitle=editStore[titleKey]||sec.title;
    const titleEdited=!!editStore[titleKey];
    const titleEditedBadge=titleEdited?`<span class="sec-title-edited-badge">Edited</span>`:"";
    return `
    <div class="section" data-secidx="${si}"
         ondragover="dragOverSection(event)">
      <div class="section-header ${sec.hdr}" onclick="toggleSection(this)">
        <span style="color:#667;font-size:12px">${displayIdx+1}</span>
        <span id="sectitle_${progId}_${tabType}_${si}" style="margin-left:6px">${displayTitle}</span>
        <span class="chevron">&#9654;</span>
      </div>
      <div class="section-body" ondragover="event.preventDefault()" ondrop="dropStep(event,'${progId}','${tabType}',${si})">
        ${allStepsHtml}
        <div id="${areaId}" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${resetBtn}
        </div>
      </div>
    </div>`;
  }).join("");
  const searchBar=`<div class="script-search-wrap"><span style="color:#b0bac9;font-size:15px">&#128269;</span><input class="script-search" id="scriptSearchInput" type="text" placeholder="Search sections or questions..." oninput="filterScript(this.value)" autocomplete="off"><button class="script-search-clear" onclick="document.getElementById('scriptSearchInput').value='';filterScript('')" title="Clear">&#10005;</button><div class="script-search-divider"></div><button class="btn-sec-toggle" onclick="expandAllSections()" title="Expand all sections">&#8661; Expand All</button><button class="btn-sec-toggle" onclick="collapseAllSections()" title="Collapse all sections">&#8661; Collapse All</button><div class="script-search-divider"></div><button class="btn-clear-answers" onclick="clearAllAnswers()" title="Erase all typed answers">&#10005; Clear Answers</button></div>`;
  const naPanel=tabType==='pbm'?renderNAPanel():'';
  const naLegend=tabType==='pbm'?`<div class="na-legend"><span class="na-legend-label">Badge Legend:</span><div class="na-legend-item"><span class="na-accept-badge na-ok">✓ N/A OK</span><span class="na-legend-desc">Payer saying "not available" is acceptable — record and move on</span></div><div class="na-legend-item"><span class="na-accept-badge na-no">✗ N/A</span><span class="na-legend-desc">Must obtain a value — "not available" is not acceptable for this field</span></div></div>`:'';
  return naLegend+naPanel+searchBar+restoreBar+`<div class="script-container" ondragover="event.preventDefault()" ondrop="dropSection(event,'${progId}','${tabType}')">${sectionsHtml}</div>`;

// ── Full Script (read-only, no interactive elements) ──
function renderFullScript(sections,progId){
  const tabType='mm';
  const removedSec=new Set(editStore[`${progId}__${tabType}__removed_sections`]||[]);
  const storedSecOrder=editStore[`${progId}__${tabType}__section_order`];
  const allSecIdx=sections.map((_,i)=>i).filter(i=>!removedSec.has(i));
  let orderedSecIdx=allSecIdx;
  if(storedSecOrder&&storedSecOrder.length){
    const valid=new Set(allSecIdx);
    orderedSecIdx=storedSecOrder.filter(i=>valid.has(i));
    const inOrd=new Set(orderedSecIdx);
    allSecIdx.forEach(i=>{if(!inOrd.has(i))orderedSecIdx.push(i);});
  }
  const sectionsHtml=orderedSecIdx.map((si,displayIdx)=>{
    const sec=sections[si];
    const secTitle=editStore[`${progId}__${tabType}__${si}__title`]||sec.title;
    const removedSteps=new Set(editStore[`${progId}__${tabType}__${si}__removed_steps`]||[]);
    const added=editStore[`${progId}__${tabType}__${si}__added`]||[];
    const visibleItems=[];
    sec.steps.forEach((s,idx)=>{if(!removedSteps.has(idx))visibleItems.push({kind:'orig',idx,data:s});});
    added.forEach((s,idx)=>visibleItems.push({kind:'add',idx,data:s}));
    const storedOrder=editStore[`${progId}__${tabType}__${si}__order`];
    let orderedItems=visibleItems;
    if(storedOrder&&storedOrder.length){
      const idMap=new Map(visibleItems.map(it=>[`${it.kind}-${it.idx}`,it]));
      orderedItems=storedOrder.filter(id=>idMap.has(id)).map(id=>idMap.get(id));
      const inOrder=new Set(storedOrder);
      visibleItems.forEach(it=>{if(!inOrder.has(`${it.kind}-${it.idx}`))orderedItems.push(it);});
    }
    const stepsHtml=orderedItems.map(it=>{
      let s=it.data;
      if(it.kind==='orig'){const saved=editStore[`${progId}__${tabType}__${si}__${it.idx}`];if(saved)s={...s,text:saved.text!==undefined?saved.text:s.text,field:saved.field!==undefined?saved.field:s.field};}
      return renderFullStepClean(s);
    }).join('');
    return `<div class="section">
      <div class="section-header ${sec.hdr||'hdr-plan'}" onclick="toggleSection(this)">
        <span style="color:#667;font-size:12px">${displayIdx+1}</span>
        <span style="margin-left:6px">${secTitle}</span>
        <span class="chevron open">&#9654;</span>
      </div>
      <div class="section-body">${stepsHtml}</div>
    </div>`;
  }).join('');
  return `<div class="fullscript-container">${sectionsHtml}</div>`;
}

function renderFullStepClean(s){
  if(s.type==='pa-pread') return renderFullPAPread();
  const typeClass={statement:"step-statement",question:"step-question",instruction:"step-instruction",warning:"step-warning",branch:"step-branch"}[s.type]||"step-question";
  const displayText=applyScriptHL(s.text||'',s.type);
  const fieldHtml=s.field?`<div class="step-field">${s.field}</div>`:'';
  return `<div class="step ${typeClass}">
    <div class="step-label">${s.label||''}</div>
    <div class="step-text">${displayText}</div>
    ${fieldHtml}
  </div>`;
}

function renderFullPAPread(){
  const SCENS={
    pa:[
      {badge:'approved',hdr:'Approved on File'},
      {badge:'denied',hdr:'Denied'},
      {badge:'pending',hdr:'Pending'},
      {badge:'not_on_file',hdr:'Not on File'},
    ],
    pred:[
      {badge:'approved',hdr:'Approved on File'},
      {badge:'denied',hdr:'Denied'},
      {badge:'pending',hdr:'Pending'},
      {badge:'not_on_file',hdr:'Not on File'},
    ],
  };
  const makeCol=(colHdr,typeKey)=>{
    const scenHtml=SCENS[typeKey].map(sc=>{
      const fields=(PA_PREAD_FIELDS[typeKey]||{})[sc.badge]||[];
      const notes=(PA_PREAD_NOTES[`${typeKey}_${sc.badge}`]||[]).filter(n=>n.type==='warn');
      const fieldsHtml=fields.map(f=>`<li>${f.q?`<span style="display:block;font-weight:500;color:#1f2937">${f.q}</span>`:''}→ ${f.label}</li>`).join('');
      const notesHtml=notes.map(n=>`<div class="fullscript-papread-note">⚠ ${n.text.replace(/^[⚠ℹ]\s*/,'')}</div>`).join('');
      return `<div class="fullscript-papread-scenario">
        <div class="fullscript-papread-scenario-title">${sc.hdr}</div>
        ${fields.length?`<ul class="fullscript-papread-fields">${fieldsHtml}</ul>`:'<span style="font-size:11px;color:#9ca3af;font-style:italic">No additional fields required.</span>'}
        ${notesHtml}
      </div>`;
    }).join('');
    return `<div class="fullscript-papread-col">
      <div class="fullscript-papread-col-hdr">${colHdr}</div>
      ${scenHtml}
    </div>`;
  };
  return `<div class="fullscript-papread">
    <div class="fullscript-papread-title">PA / Pre-D Details — Collect based on scenario</div>
    <div class="fullscript-papread-grid">
      ${makeCol('Prior Authorization',  'pa')}
      ${makeCol('Pre-Determination','pred')}
    </div>
  </div>`;
}

function renderAddedStep(s,progId,tabType,si,ai,dAttrs=''){
  const addedKey=`${progId}__${tabType}__${si}__added__${ai}`;
  const typeClass={statement:"step-statement",question:"step-question",instruction:"step-instruction",warning:"step-warning",branch:"step-branch"}[s.type]||"step-question";
  const cap=s.type.charAt(0).toUpperCase()+s.type.slice(1);
  const addedAnswerKey=`ans__${addedKey}`;
  const _addedSavedVal=getAnswer(addedAnswerKey);
  const _addedIsYN=s.type==='question'&&s.field&&/yes\s*\/\s*no/i.test(s.field);
  const addedAnswerHtml=(s.type==='question'||s.type==='branch')
    ?(_addedIsYN
      ?`<select class="step-yn-select" onchange="saveAnswer('${addedAnswerKey}',this.value,this)"><option value="">— Select —</option><option value="Yes"${_addedSavedVal==='Yes'?' selected':''}>Yes</option><option value="No"${_addedSavedVal==='No'?' selected':''}>No</option><option value="Unknown"${_addedSavedVal==='Unknown'?' selected':''}>Unknown</option></select>`
      :`<div class="step-answer-wrap"><textarea class="step-answer" rows="1" placeholder="Type answer here…" oninput="saveAnswer('${addedAnswerKey}',this.value,this);this.style.height='auto';this.style.height=this.scrollHeight+'px'">${escHtml(_addedSavedVal)}</textarea></div>`)
    :'';
  return `<div class="step ${typeClass}" ${dAttrs} id="addstep_${CSS.escape(addedKey)}">
    <div class="step-label">${s.label||cap} <span class="added-badge">Added</span></div>
    <div class="step-text step-content-text">${applyScriptHL(s.text,s.type)}</div>
    ${(()=>{const isPBM=tabType==='pbm';const ns=isPBM&&s.type==='question'?getPBMNAInfo(s.field,s.text):null;const nb=ns===true?`<span class="na-accept-badge na-ok">✓ N/A OK</span>`:ns===false?`<span class="na-accept-badge na-no">✗ N/A</span>`:'';return s.field?`<div class="step-field step-content-field"><span>${s.field}</span>${nb}</div>`:nb?`<div class="step-field">${nb}</div>`:''})()}
    ${addedAnswerHtml}
    <button class="copy-btn" onclick="(function(btn){const el=btn.closest('.step');if(!el)return;const textEl=el.querySelector('.step-content-text');const fieldEl=el.querySelector('.step-content-field span');let txt='';if(textEl)txt+=textEl.innerText||textEl.textContent||'';if(fieldEl)txt+='\\n'+(fieldEl.innerText||fieldEl.textContent||'');navigator.clipboard.writeText(txt.trim()).then(()=>{const orig=btn.innerHTML;btn.innerHTML='✓ Copied';btn.style.color='#10b981';setTimeout(()=>{btn.innerHTML=orig;btn.style.color='';},1500)});})(this)" title="Copy question">&#128203;</button>
  </div>`;
}

function applyScriptHL(html,type){
  if(!html) return html;
  if(type==='statement'){
    // 1. Program names inside <strong> tags (fresh / un-edited text)
    html=html.replace(/<strong>([^<]+)<\/strong>/g,(m,txt)=>{
      if(txt.includes(':')||txt.includes('=')||/^(If |SOC|POS|PA |START|BCBS|ALWAYS|NOTE|ASC|I |Vendor|Reimbursement|Both|Hybrid)/.test(txt.trim())||txt.trim().length<3) return m;
      return '<strong><span class="hl-program">'+txt+'</span></strong>';
    });
    // 2. Program names in plain text (saved/edited steps where <strong> was stripped)
    if(!html.includes('hl-program')){
      ['IpsenCares Program','Orgovyx support Team','OcuCare Service Program','Lundbeck Support Center','Sandoz One Source™','Johnson & Johnson Innovative Medicine support program','Johnson &amp; Johnson Innovative Medicine support program','Johnson & Johnson Innovative Medicine sponsored patient support program','Johnson &amp; Johnson Innovative Medicine sponsored patient support program'].forEach(p=>{
        html=html.replace(new RegExp(p.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<span class="hl-program">'+p+'</span>');
      });
    }
    // 3. Recording notice
    html=html.replace(/(on a recorded line)/gi,'<span class="hl-recorded">$1</span>');
    html=html.replace(/(this call is being recorded[^<]*?(?:training|assurance)[^<.]*?purposes)/gi,'<span class="hl-recorded">$1</span>');
  }
  // 4. [Bracket] fill-in items — applied to ALL step types
  html=html.replace(/<span\s[^>]*class=['"]placeholder['"][^>]*>(\[[^\]]*\])<\/span>/g,'$1');
  html=html.replace(/\[([^\]]{1,80})\]/g,'<span class="placeholder">[$1]</span>');
  return html;
}

// Returns true (N/A ok), false (N/A not ok), or null (not a tracked PBM field)
function getPBMNAInfo(field,text){
  if(!field) return null;
  const f=field.toLowerCase();
  const t=(text||'').replace(/<[^>]+>/g,'').toLowerCase();
  // Plan Info
  if(f==='→ insurance type'||f==='→ plan type') return false;
  if(f==='→ plan name') return true;
  if(f.includes('plan effective date')||f==='→ plan effective date') return true;
  if(f.includes('plan term')||f.includes('term/end date')) return true;
  if(f.includes('benefit year type')||f.includes('renewal date')) return true;
  if(f.includes('lis:')&&f.includes('lis level')) return false;
  if(f.includes('lis level:')) return true;
  // BIN / PCN / Group
  if(f.includes('rx bin')||f.includes('pcn')||f.includes('rx group')) return true;
  // Coverage
  if(f.includes('is drug covered')||f.includes('drug name, strength')) return false;
  if(f.includes('prior auth or formulary')) return false;
  if(f.includes('pa/fe on file')) return false;
  if(f.includes('pa approval #')) return false;
  if(f.includes('pa effective dates')) return false;
  if(f.includes('→ pa on file')) return false;
  if(f.includes('authorization status')) return false;
  if(f.includes('pa ref id')) return false;
  if(f.includes('preferred sp |')||f.includes('preferred sp name')) return false;
  if(f.includes('sp name | sp phone')) return false;
  // Benefit Details
  if(f.includes('drug tier')) return true;
  if(f.includes('estimated copay')) return true;
  if(f.includes('copay $')||f.includes('coinsurance %')) return false;
  if(f==='→ yes/no'&&(t.includes('accumulator')||t.includes('maximizer'))) return true;
  if(f.includes('individual deductible:')||f.includes('indiv. deductible')) return false;
  if(f.includes('family deductible:')) return true;
  if(f==='→ yes/no'&&t.includes('deductible')&&(t.includes('oop')||t.includes('out-of-pocket'))) return true;
  if(f.includes('indiv. oop max')) return false;
  if(f.includes('troop:')) return false;
  if(f.includes('pharmacy cap:')) return true;
  if(f.includes('step therapy required')||f.includes('step therapy drug')) return true;
  if(f.includes('call ref#')||f.includes('call ref #')) return false;
  if(f.includes('standard tat')||f.includes('urgent tat')) return true;
  // PA not-covered flow
  if(f==='→ pa required: yes / no') return false;
  if(f==='→ pa on file: yes / no') return false;
  if(f.includes('pa dept phone')) return true;
  if(f.includes('pa dept name')||f==='→ pa dept name') return true;
  if(f==='→ submission method') return true;
  if(f.includes('phone: _____')) return false; // PA submission methods
  // PA reference / dates (in approved/pending context — both false)
  if(f==='→ pa ref id') return false;
  if(f==='→ effective date') return false;
  if(f==='→ end date') return false;
  if(f==='→ reference #') return false; // appeal or PA ref#, both false
  // Appeal
  if(f==='→ appeal available: yes / no') return false;
  if(f.includes('appeal status:')) return false;
  if(f.includes('available appeal count')) return true;
  if(f.includes('submitted appeal count')) return true;
  if(f==='→ denied on') return true;
  if(f==='→ denial reason') return true;
  if(f==='→ notification method') return false;
  if(f==='→ submitted on') return false; // appeal/PA submission date — false
  // Sandoz-specific
  if(f.includes('payer rep name')) return false;
  if(f.includes('call reference #')) return false;
  if(f.includes('commercial / medicare advantage')||f.includes('ppo / hmo')) return false;
  if(f.includes('plan name | group #')) return true;
  if(f.includes('effective date | term date')) return true;
  if(f.includes('calendar / fiscal')||f.includes('renewal month')) return true;
  return null;
}

function _buildPAPreadFields(key,tv,sv){
  if(!tv||tv==='no'||tv==='unknown')return`<div class="pa-pread-no-fields">No PA / Pre-D questions required for this selection.</div>`;
  if(!sv||sv==='no'||sv==='unknown')return`<div class="pa-pread-no-fields">No further details required for this status.</div>`;
  const fields=PA_PREAD_FIELDS[tv]&&PA_PREAD_FIELDS[tv][sv];
  if(!fields)return'';
  const typeLabel=tv==='pa'?'Prior Authorization':'Pre-Determination';
  const statusLabel={approved:'Approved on file',denied:'Denied',pending:'Pending',not_on_file:'Not on file'}[sv]||sv;
  const badgeClass=`badge-${sv}`;
  const notes=PA_PREAD_NOTES[`${tv}_${sv}`]||[];
  const notesHtml=notes.length?`<div class="pa-pread-notes">${notes.map(n=>`<div class="pa-pread-note note-${n.type}"><span class="pa-pread-note-icon">${n.type==='warn'?'⚠️':'ℹ️'}</span><span>${n.text.replace(/^[⚠ℹ]\s*/,'')}</span></div>`).join('')}</div>`:'';
  return`<div class="pa-pread-field-list">
    <div class="pa-pread-scenario-badge ${badgeClass}">${typeLabel} — ${statusLabel}</div>
    ${notesHtml}
    ${fields.map((f,i)=>{
      const fKey=_papreadFKey(key,tv,sv,i);
      const fVal=answerStore[fKey]||'';
      const isYesNo=f.ph.startsWith('Yes');
      const inputHtml=isYesNo
        ?`<select class="pa-pread-yn-select" onchange="savePAPreadField('${key}','${tv}','${sv}',${i},this)">
            <option value="">— Select —</option>
            <option value="Yes"${fVal==='Yes'?' selected':''}>Yes</option>
            <option value="No"${fVal==='No'?' selected':''}>No</option>
            <option value="Unknown"${fVal==='Unknown'?' selected':''}>Unknown</option>
          </select>`
        :`<textarea class="step-answer" rows="1" placeholder="${f.ph}" oninput="savePAPreadField('${key}','${tv}','${sv}',${i},this)">${escHtml(fVal)}</textarea>`;
      return`<div class="pa-pread-field-row">
        ${f.q?`<div class="pa-pread-field-q">${f.q}</div>`:''}
        <div class="pa-pread-field-label">→ ${f.label}</div>
        ${inputHtml}
      </div>`;
    }).join('')}
  </div>`;
}
